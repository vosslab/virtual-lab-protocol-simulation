<svg xmlns="http://www.w3.org/2000/svg" id="aspirating_pipette" viewBox="0 0 16 139"><defs><clipPath id="anchor_liquid_clip"><rect x="5.5" y="21" width="5" height="96" rx="0.5" /></clipPath></defs>

	<!-- BODY: main aspirating pipette shape -->
	<g id="body">
		<!-- rubber bulb (gray plastic/silicone) -->
		<ellipse cx="8" cy="11" rx="6" ry="9" fill="#b0b0b0" stroke="#333333" stroke-width="1.5" />
		<!-- bulb highlight -->
		<ellipse cx="6" cy="7" rx="2.5" ry="3.5" fill="#cccccc" opacity="0.4" />
		<!-- tubing connection collar -->
		<rect x="5.5" y="17" width="5" height="5" rx="1" fill="#888888" stroke="#333333" stroke-width="1" />
		<!-- glass tube body -->
		<rect x="5.5" y="21" width="5" height="96" rx="0.5" fill="#f0f0f0" stroke="#999999" stroke-width="0.8" />
		<!-- inner tube glass tint -->
		<rect x="6.5" y="23" width="3" height="92" rx="0.5" fill="#f8f8f8" stroke="none" />
		<!-- glass shine -->
		<line x1="7" y1="26" x2="7" y2="111" stroke="#ffffff" stroke-width="0.4" opacity="0.6" />
		<!-- narrow tapered tip -->
		<path d="M 5.5 117 L 8 137 L 10.5 117 Z" fill="#cccccc" stroke="#999999" stroke-width="0.4" />
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root" />

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds" x="5.5" y="21" width="5" height="96" fill="none" stroke="none" display="none" />
	<rect id="anchor_highlight" x="-0.5" y="0" width="18" height="140" fill="none" stroke="none" display="none" />
	<rect id="anchor_error" x="10.5" y="0" width="12" height="12" fill="none" stroke="none" display="none" />
</svg>