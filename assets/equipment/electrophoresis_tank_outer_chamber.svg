<svg xmlns="http://www.w3.org/2000/svg" id="electrophoresis_tank_outer_chamber" viewBox="0 0 114 99">
	<defs>
		<!-- Liquid clip: outer chamber fill region -->
		<clipPath id="anchor_liquid_clip">
			<path d="M 7 12 L 7 82 Q 7 92 17 92 L 97 92 Q 107 92 107 82 L 107 12 Z" />
		</clipPath>
	</defs>

	<!-- BODY: outer chamber shape -->
	<g id="body">
		<!-- outer chamber wall (wide base), darker rim for definition -->
		<path d="M 2 7 L 2 87 Q 2 97 12 97 L 102 97 Q 112 97 112 87 L 112 7 Q 112 2 107 2 L 7 2 Q 2 2 2 7 Z" fill="#dfe6ea" stroke="#5a6b73" stroke-width="2" />
		<!-- inner surface: buffer-blue tint so the chamber reads as filled tank -->
		<path d="M 7 12 L 7 82 Q 7 92 17 92 L 97 92 Q 107 92 107 82 L 107 12 Z" fill="#cfe6f2" stroke="#7fa6b8" stroke-width="0.8" />
		<!-- standing buffer surface line near top of fill -->
		<path d="M 9 22 L 105 22" stroke="#9cc3d6" stroke-width="1" fill="none" opacity="0.7" />
		<!-- electrode hint: dark cathode bar near left wall -->
		<rect x="11" y="16" width="3" height="70" rx="1" fill="#3a3a3a" opacity="0.65" />
		<!-- electrode hint: red anode bar near right wall -->
		<rect x="100" y="16" width="3" height="70" rx="1" fill="#c0392b" opacity="0.7" />
		<!-- glass shine -->
		<ellipse cx="27" cy="32" rx="6" ry="25" fill="#ffffff" opacity="0.35" />
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root" />

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds" x="7" y="12" width="100" height="80" fill="none" stroke="none" display="none" />
	<rect id="anchor_highlight" x="-3" y="-3" width="120" height="105" fill="none" stroke="none" display="none" />
</svg>