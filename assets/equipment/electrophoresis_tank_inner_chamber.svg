<svg xmlns="http://www.w3.org/2000/svg" id="electrophoresis_tank_inner_chamber" viewBox="0 0 74 114">
	<defs>
		<!-- Liquid clip: inner chamber interior fill region -->
		<clipPath id="anchor_liquid_clip">
			<rect x="7" y="7" width="60" height="100" rx="2" />
		</clipPath>
	</defs>

	<!-- BODY: inner chamber shape -->
	<g id="body">
		<!-- chamber outer wall, darker rim for definition -->
		<rect x="2" y="2" width="70" height="110" rx="3" fill="#dfe6ea" stroke="#5a6b73" stroke-width="2" />
		<!-- chamber inner region: buffer-blue tint so it reads as a filled tank well -->
		<rect x="7" y="7" width="60" height="100" rx="2" fill="#cfe6f2" stroke="#7fa6b8" stroke-width="0.8" />
		<!-- standing buffer surface line near top of well -->
		<path d="M 9 18 L 65 18" stroke="#9cc3d6" stroke-width="1" fill="none" opacity="0.7" />
		<!-- gel cassette slot hint: vertical dark guide rails in the central well -->
		<rect x="24" y="14" width="2.5" height="88" rx="1" fill="#7a8a91" opacity="0.55" />
		<rect x="47.5" y="14" width="2.5" height="88" rx="1" fill="#7a8a91" opacity="0.55" />
		<!-- glass shine -->
		<rect x="12" y="12" width="8" height="85" fill="#ffffff" opacity="0.4" />
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root" />

	<!-- ANCHORS: invisible positioning elements -->
	<rect id="anchor_liquid_bounds" x="7" y="7" width="60" height="100" fill="none" stroke="none" display="none" />
	<rect id="anchor_highlight" x="-3" y="-3" width="80" height="120" fill="none" stroke="none" display="none" />
</svg>