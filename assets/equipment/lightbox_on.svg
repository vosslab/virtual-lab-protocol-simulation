<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 100" width="130" height="100">
  <!-- Lightbox body/frame -->
  <rect x="10" y="15" width="110" height="70" fill="#2a2a2a" stroke="#000000" stroke-width="2"/>

  <!-- Top surface (on - bright) -->
  <rect x="15" y="20" width="100" height="50" fill="#ffffcc" stroke="#ffff99" stroke-width="1"/>

  <!-- Light indicators (on - yellow) -->
  <circle cx="30" cy="30" r="2" fill="#ffff00" stroke="#ffff00" stroke-width="1"/>
  <circle cx="50" cy="30" r="2" fill="#ffff00" stroke="#ffff00" stroke-width="1"/>
  <circle cx="70" cy="30" r="2" fill="#ffff00" stroke="#ffff00" stroke-width="1"/>
  <circle cx="90" cy="30" r="2" fill="#ffff00" stroke="#ffff00" stroke-width="1"/>
  <circle cx="110" cy="30" r="2" fill="#ffff00" stroke="#ffff00" stroke-width="1"/>

  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Control panel on front -->
  <rect x="20" y="75" width="90" height="15" fill="#333333" stroke="#666666" stroke-width="1"/>

  <!-- Power button (on - green) -->
  <circle cx="35" cy="82" r="4" fill="#00cc00" stroke="#000000" stroke-width="1"/>
  <text x="35" y="84" font-family="Arial" font-size="3" fill="#ffffff" text-anchor="middle">P</text>

  <!-- Capture button (highlighted) -->
  <rect x="50" y="79" width="15" height="6" fill="#ffff00" stroke="#000000" stroke-width="1" rx="2"/>
  <text x="57" y="82" font-family="Arial" font-size="3" fill="#000000" text-anchor="middle">SNAP</text>

  <!-- Status indicator (on - green) -->
  <circle cx="100" cy="82" r="3" fill="#00ff00" stroke="#000000" stroke-width="1"/>

  <!-- Cable connection -->
  <line x1="10" y1="85" x2="5" y2="85" stroke="#333333" stroke-width="2"/>
</svg>
