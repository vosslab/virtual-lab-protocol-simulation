<svg xmlns="http://www.w3.org/2000/svg" id="sero_pipette" viewBox="0 0 16 142">
	<defs>
		<!-- Liquid clipping region: follows inner glass tube only (not cotton plug, not tip) -->
		<clipPath id="anchor_liquid_clip">
			<rect x="5.5" y="15" width="5" height="101" rx="0.5"/>
		</clipPath>
	</defs>


	<!-- BODY: main pipette shape -->
	<g id="body">
		<!-- cotton plug at top -->
		<rect x="2" y="4" width="12" height="10" rx="1" fill="#e8d4c0" stroke="#cccccc" stroke-width="0.8"/>
		<ellipse cx="8" cy="4" rx="5" ry="2" fill="#ddccb0" opacity="0.7"/>
		<!-- graduated glass tube -->
		<rect x="4" y="13" width="8" height="105" rx="1" fill="#f0f0f0" stroke="#999999" stroke-width="0.8"/>
		<!-- inner tube glass tint -->
		<rect x="5.5" y="15" width="5" height="101" rx="0.5" fill="#f8f8f8" stroke="none"/>
		<!-- glass shine -->
		<rect x="6" y="18" width="1.5" height="95" fill="#ffffff" opacity="0.5"/>
		<!-- major graduation marks -->
		<line x1="2" y1="28" x2="14" y2="28" stroke="#999999" stroke-width="0.5"/>
		<line x1="2" y1="48" x2="14" y2="48" stroke="#999999" stroke-width="0.5"/>
		<line x1="2" y1="68" x2="14" y2="68" stroke="#999999" stroke-width="0.5"/>
		<line x1="2" y1="88" x2="14" y2="88" stroke="#999999" stroke-width="0.5"/>
		<line x1="2" y1="108" x2="14" y2="108" stroke="#999999" stroke-width="0.5"/>
		<!-- minor graduation marks -->
		<line x1="4" y1="38" x2="12" y2="38" stroke="#cccccc" stroke-width="0.3"/>
		<line x1="4" y1="58" x2="12" y2="58" stroke="#cccccc" stroke-width="0.3"/>
		<line x1="4" y1="78" x2="12" y2="78" stroke="#cccccc" stroke-width="0.3"/>
		<line x1="4" y1="98" x2="12" y2="98" stroke="#cccccc" stroke-width="0.3"/>
		<!-- pointed tip at bottom -->
		<path d="M 4 118 L 8 140 L 12 118 Z" fill="#cccccc" stroke="#999999" stroke-width="0.4"/>
	</g>

	<!-- OVERLAY_ROOT: engine injects dynamic overlays here -->
	<g id="overlay_root"/>

	<!-- ANCHORS: invisible positioning elements for the engine -->
	<!-- Liquid fill region bounds (inner glass tube) -->
	<rect id="anchor_liquid_bounds" x="5.5" y="15" width="5" height="101" fill="none" stroke="none" display="none"/>
	<!-- Highlight border bounds -->
	<rect id="anchor_highlight" x="1" y="2" width="15" height="144" fill="none" stroke="none" display="none"/>
	<!-- Error indicator position -->
	<rect id="anchor_error" x="9" y="3" width="12" height="12" fill="none" stroke="none" display="none"/>
</svg>
