					<div style="color: red; padding: 20px; background: #ffe0e0; border: 1px solid red; border-radius: 4px;">

			const wellCount = document.querySelectorAll('[data-well-id]').length;

				console.log('[adapter] Current app HTML:', appContent.substring(0, 500));

		// Modal button handler
		document.getElementById('confirm-plate-intro').addEventListener('click', () => {
			document.getElementById('modal-backdrop').classList.remove('visible');
			document.getElementById('plate-intro-modal').classList.remove('visible');
			completeStep('open_plate_workspace');

		// Initialize with step 1
		renderStep1();
	</script>
