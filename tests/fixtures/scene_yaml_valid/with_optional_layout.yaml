sceneId: test_with_optional_layout
workspace: equipment_bench
capabilities:
  - itemWorkspace

items:
  - id: item_a
    label: Item A
    zone: zone_1
    depthTier: 1
    svgAsset: centrifuge
    kind: equipment
    widthScale: 0.8
    anchorY: bottom
    alignStop: left
  - id: item_b
    label: Item B
    zone: zone_1
    depthTier: 2
    svgAsset: water_bath
    kind: equipment
    widthScale: 0.9
    anchorY: bottom
    alignStop: center

zones:
  - id: zone_1
    x0: 0
    x1: 100
    baseline: 60
    gap: 2
    align: tab-stops

sceneBounds:
  left: 5
  right: 95
  top: 10
  bottom: 90

layoutRules:
  labelFontSize: 12
  labelLineHeight: 1.2
  labelOffsetY: 5
  clusterSpacingPx: 15
  tierBrightnessFactor:
    1: 1.0
    2: 0.95
  defaultAlignStop: center

accentRules:
  highlight_active:
    stroke: "#ff6b6b"
    fill: "#ffe0e0"
  highlight_used:
    stroke: "#4ecdc4"

tabStops:
  - [item_a, item_b]
