protocol_type: dev_smoke
protocol_name: select_check
entry_step: select_pbs_bottle

# WS-M5-ST select-gesture smoke. The scene presents two clickable bottles
# (ethanol_bottle, pbs_bottle). The single step asks the student to SELECT the
# correct next-step object (pbs_bottle) among the present scene objects. The
# corrected `select` semantics: selecting pbs_bottle (the interaction target)
# advances; selecting the wrong present object (ethanol_bottle) surfaces the
# wrong-order/incorrect feedback and does NOT advance. There is no answer list,
# no modal, no choice_id -- the selectable set is simply the rendered objects.
steps:
  - step_name: select_pbs_bottle
    scene: select_check
    prompt: "Select the PBS bottle among the bottles on the bench."
    sequence:
      - target: pbs_bottle
        gesture: select
        validator:
          preset: correct_choice
        response:
          scene_operations:
            - type: ObjectStateChange
              target: pbs_bottle
              state:
                material_name: pbs
          feedback:
            correct: "Correct: PBS selected."
            incorrect: "That is not the PBS bottle. Select the PBS bottle."
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
