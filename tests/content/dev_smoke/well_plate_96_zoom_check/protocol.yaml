protocol_type: dev_smoke
protocol_name: well_plate_96_zoom_check
entry_step: view_zoom_plate

steps:
  - step_name: view_zoom_plate
    prompt: "Click well E7 of the zoomed 96-well plate."
    sequence:
      - target: well_plate_96.E7
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96
              state:
                material_name: empty
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
