protocol_type: dev_smoke
protocol_name: type_check
entry_step: enter_cell_count

# WS-M5-ST type-gesture smoke. The single step asks the student to TYPE a value
# into the visible type-input affordance and commit it. The type interaction is
# validated by target_with_value: the typed text is coerced to the validator's
# declared field type (int) and compared against the expected value (42). A
# matching commit writes the value into the object via ObjectStateChange and
# advances; a wrong value surfaces the incorrect feedback and does NOT advance.
steps:
  - step_name: enter_cell_count
    scene: type_check
    prompt: "Type the cell count (42) into the input and commit."
    sequence:
      - target: cell_count_pad
        gesture: type
        validator:
          preset: target_with_value
          value:
            entered_count: 42
        response:
          scene_operations:
            - type: ObjectStateChange
              target: cell_count_pad
              state:
                entered_count: 42
          feedback:
            correct: "Correct: 42 cells recorded."
            incorrect: "That count is not correct. Enter the expected value."
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
