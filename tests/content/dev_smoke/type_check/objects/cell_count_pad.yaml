object_name: cell_count_pad
kind: equipment
label: Cell Count Pad

# Fixture-local object for the WS-M5-ST type-gesture smoke. It declares a single
# integer state field the typed value is committed into via ObjectStateChange,
# plus a static svg state so the object renders real artwork (not a placeholder).
state_fields:
  - field_name: entered_count
    type: int
    default: 0
    min: 0
    max: 1000
    description: The cell count the student typed into the visible input.
  - field_name: display_on
    type: bool
    default: true
    description: Whether the counter display is lit. Drives the static svg case.

visual_states:
  entered_count:
    kind: overlay
    formula: 'label(state(entered_count), format="count {value}")'
  display_on:
    kind: svg
    cases:
      - when: false
        output: { asset_name: cell_counter_instrument }
      - when: true
        output: { asset_name: cell_counter_instrument }

capabilities: [clickable]

layout:
  default_width: 16
  display_width_cm: 30
  label_width: 12
