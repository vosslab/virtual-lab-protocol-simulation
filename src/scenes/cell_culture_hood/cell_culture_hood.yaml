    anchorY: tip
    alignStop: right
  - id: micropipette_rack
    label: P20/P200/P1000
    shortLabel: Micropipettes
    zone: back_row
    depthTier: 7.5
    svgAsset: micropipette_rack
    kind: rack
    widthScale: 0.9
    anchorY: bottom
    alignStop: right
  - id: micropipette
