zones:
  # Hood interior back row: spans the full hood interior, tab-stop
  # groups of 3 left / 1 center (flask) / 3 right (pipettes)
  - id: back_row
    x0: 7
    x1: 93
    baseline: 50
    gap: 2
    align: tab-stops
  # Hood interior front row: three tab-stop groups
  - id: front_row
    x0: 7
    x1: 93
    baseline: 68
    gap: 2
    align: tab-stops
  # Shelf row above back_row: reagent storage
  - id: shelf_row
    x0: 7
    x1: 93
    baseline: 22
    gap: 2
    align: tab-stops

sceneBounds:
  left: 1
  right: 99
  top: 1
  bottom: 98

layoutRules:
  labelFontSize: 9
  labelLineHeight: 1.1
  labelOffsetY: 3

wrongOrderMessage:
  template: "Try the {expectedLabel}."
  toastDurationMs: 2000
