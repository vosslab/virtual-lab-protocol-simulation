sceneId: cell_culture_hood
elementId: hood-scene
workspace: wet_lab_hood
capabilities:
  - itemWorkspace

items:
  # Back row, three tab-stop groups:
  #   left  : well_plate, media_bottle, trypsin_bottle
  #   center: flask (dominant working object)
  #   right : serological, aspirating, multichannel pipettes
  - id: well_plate
    label: 24-Well Plate
    zone: back_row
    depthTier: 1
    svgAsset: well_plate
    kind: plate
    widthScale: 1.0
    anchorY: bottom
    alignStop: left
  - id: media_bottle
    label: DMEM Media
    zone: back_row
    depthTier: 2
    svgAsset: media_bottle
    kind: bottle
    widthScale: 1.0
    anchorY: bottom
    alignStop: left
  - id: trypsin_bottle
    label: Trypsin-EDTA
    zone: back_row
    depthTier: 3
    svgAsset: trypsin_bottle
    kind: bottle
    widthScale: 1.0
    anchorY: bottom
    alignStop: left
  - id: flask
    label: T-75 Flask
    zone: back_row
    depthTier: 4
    svgAsset: flask
    kind: flask
    widthScale: 1.2
    anchorY: bottom
    alignStop: center
    baselineOverride: 52
  - id: serological_pipette
    label: Serological Pipette
    shortLabel: Serological
    zone: back_row
    depthTier: 5
    svgAsset: serological_pipette
    kind: pipette
    widthScale: 1.0
