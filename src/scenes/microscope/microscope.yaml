sceneId: microscope
workspace: modal_overlay
# instrument-overlay is a shared modal slot used by microscope and plate_reader.
# See docs/SCENE_YAML_FORMAT.md for the design rationale.
elementId: instrument-overlay
capabilities:
  - instrumentWorkspace
  - modalWorkspace
  - gridCountingWorkspace

items:
  - id: quadrant_0
    label: "Top-Left Quadrant"
  - id: quadrant_1
    label: "Top-Right Quadrant"
  - id: quadrant_2
    label: "Bottom-Left Quadrant"
  - id: quadrant_3
    label: "Bottom-Right Quadrant"

zones: []

wrongOrderMessage:
  template: "Proceed with the {expectedLabel}."
  toastDurationMs: 2000
