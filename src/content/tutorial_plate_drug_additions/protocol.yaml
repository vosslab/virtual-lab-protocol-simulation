# Step 14: Calculate final metformin concentration in well (multipleChoice)
- id: calc_metformin_final_well
  label: Calculate final metformin concentration in well
  action: Answer the question about the final metformin concentration after adding to the well
  why: Understanding how dilution on the plate works is crucial for dose calculations.
  partId: tutorial_plate_drug_additions_part
  dayId: tutorial_plate_day
  stepIndex: 14
  requiredItems:
  - well_plate
  scene: well_plate_workspace
  errorHints:
    wrong_answer: Use C1V1 = C2V2. Check your units carefully.
  completionPath:
    kind: multipleChoice
    question: "You add 5 µL of 200 mM metformin working solution into a 200 µL final well. What is the final metformin concentration?"
    choices:
      - id: metformin_final_a
        text: "0.5 mM"
        feedback: "Check the working solution and the well volume."
      - id: metformin_final_b
        text: "2.5 mM"
        feedback: "Check the working solution and the well volume."
      - id: metformin_final_c
        text: "5 mM"
        correct: true
        feedback: "Correct. 200 mM × 5 µL / 200 µL = 5 mM."
      - id: metformin_final_d
        text: "10 mM"
        feedback: "That would need 10 µL or a higher stock solution."
    completionEvent: calc_metformin_final_well
  plateMap:
    annotations:
