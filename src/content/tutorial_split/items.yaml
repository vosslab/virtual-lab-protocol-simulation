items:
  # Hood items - pipettes and tools
  serological_pipette:
    label: "Serological pipette"
    role: transfer_tool
    asset: sero_pipette
    scene: hood
    liquidCapable: true
    capacityMl: 10
    allowedLiquids: [pbs]

  aspirating_pipette:
    label: "Aspirating pipette"
    role: aspirate_tool
    asset: aspirating_pipette
    scene: hood
    liquidCapable: true
    capacityMl: 10
    allowedLiquids: [media]

  # Hood items - culture and reagent containers
  flask:
    label: "T-75 Flask"
    role: cell_container
    asset: t75_flask
    scene: hood
    liquidCapable: true
    capacityMl: 20
    allowedLiquids: [media, pbs]

  # Hood items - reagent sources (bottles)
  pbs_bottle:
    label: "1x PBS"
    role: reagent_source
    asset: pbs_bottle
    scene: hood
    liquidCapable: true
    capacityMl: 500
    allowedLiquids: [pbs]
    contains: pbs

  ethanol_bottle:
    label: "70% Ethanol"
    role: reagent_source
    asset: ethanol_spray
    scene: hood
    liquidCapable: true
    capacityMl: 500
    allowedLiquids: [ethanol]
    contains: ethanol

  # Hood items - targets and waste
  waste_container:
    label: "Vacuum waste container"
    role: waste_target
    asset: waste_container
    scene: hood
