parts:
  - id: part1_split
    label: "Part 1: Split"
    dayId: day1
  - id: part2_count
    label: "Part 2: Count"
    dayId: day1
  - id: part3_seed
    label: "Part 3: Seed"
    dayId: day1
  - id: part4_dilute
    label: "Part 4: Dilute"
    dayId: day2
  - id: part5_treat
    label: "Part 5: Treat"
    dayId: day2
  - id: part6_mtt
    label: "Part 6: MTT"
    dayId: day4
  - id: part7_read
    label: "Part 7: Read"
    dayId: day4

days:
  - id: day1
    label: "Day 1"
  - id: day2
    label: "Day 2"
  - id: day4
    label: "Day 4"

steps:
  - id: spray_hood
    label: "Spray the hood with 70% ethanol"
    action: "Spray the hood with 70% ethanol"
    why: "Ethanol kills contaminants on the work surface before you start."
    partId: part1_split
    dayId: day1
    stepIndex: 1
    requiredItems: [ethanol_bottle]
    scene: hood
    errorHints:
      skipped: "Always spray the hood before starting. Contaminants wreck experiments."
    completionPath:
      kind: directTool
      tool: ethanol_bottle
      completionEvent: spray_ethanol
    nextId: aspirate_old_media

  - id: aspirate_old_media
    label: "Aspirate old media from the flask"
    action: "Aspirate old media from the flask"
    why: "Old media has waste and dead cells. Remove it before washing."
    partId: part1_split
    dayId: day1
    stepIndex: 2
    requiredItems: [flask, aspirating_pipette, waste_container]
    scene: hood
    errorHints:
      wrong_tool: "Aspirating pipette is the correct tool. Serological will splash media."
      missed_waste: "Waste went somewhere it should not. Route it to the vacuum waste."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: aspirating_pipette
          source: flask
          destination: waste_container
          completionEvent: aspirate
    nextId: pbs_wash

  - id: pbs_wash
    label: "Wash the flask with 4 mL PBS"
    action: "Wash the flask with 4 mL PBS"
    why: "PBS rinses off leftover serum that would block trypsin."
    partId: part1_split
    dayId: day1
    stepIndex: 3
    requiredItems: [flask, pbs_bottle, serological_pipette]
    scene: hood
    errorHints:
      wrong_reagent: "PBS is the wash buffer. Media will stop trypsin from working."
      volume_off: "Use about 4 mL of PBS so the whole surface is rinsed."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: pbs_bottle
          liquid: pbs
          volumeMl: 4
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: pbs
              volumeMl: 4
              colorKey: pbs
        - tool: serological_pipette
          liquid: pbs
          destination: flask
          completionEvent: pbs_wash
          consumesVolumeMl: 4
    nextId: add_trypsin

  - id: add_trypsin
    label: "Add 3 mL trypsin to detach the cells"
    action: "Add 3 mL trypsin to detach the cells"
    why: "Trypsin breaks the bonds holding cells to the flask."
    partId: part1_split
    dayId: day1
    stepIndex: 4
    requiredItems: [flask, trypsin_bottle, serological_pipette]
    scene: hood
    errorHints:
      volume_off: "Use 3 mL of trypsin. Too much stresses the cells."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: trypsin_bottle
          liquid: trypsin
          volumeMl: 3
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: trypsin
              volumeMl: 3
              colorKey: trypsin
        - tool: serological_pipette
          liquid: trypsin
          destination: flask
          completionEvent: pipette_trypsin
          consumesVolumeMl: 3
    nextId: neutralize_trypsin

  - id: neutralize_trypsin
    label: "Neutralize with 9 mL complete media"
    action: "Neutralize with 9 mL complete media"
    why: "Serum in the media stops trypsin before it damages cells."
    partId: part1_split
    dayId: day1
    stepIndex: 5
    requiredItems: [flask, media_bottle, serological_pipette]
    scene: hood
    correctVolumeMl: 9
    toleranceMl: 1
    errorHints:
      volume_off: "Use 3x the trypsin volume of media (9 mL) so trypsin is fully neutralized."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: media_bottle
          liquid: media
          volumeMl: 9
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: media
              volumeMl: 9
              colorKey: media
        - tool: serological_pipette
          liquid: media
          destination: flask
          completionEvent: pipette_media
          consumesVolumeMl: 9
    nextId: centrifuge

  - id: centrifuge
    label: "Spin cells down in the centrifuge"
    action: "Spin cells down in the centrifuge"
    why: "Spinning pulls cells into a pellet so you can resuspend at known density."
    partId: part2_count
    dayId: day1
    stepIndex: 1
    requiredItems: [centrifuge, conical_15ml_rack]
    scene: bench
    errorHints:
      wrong_tube: "Use a 15 mL conical tube so the pellet is easy to see."
    completionPath:
      kind: directTool
      tool: centrifuge
      completionEvent: centrifuge
    nextId: resuspend

  - id: resuspend
    label: "Resuspend pellet in 12 mL media"
    action: "Resuspend pellet in 12 mL media"
    why: "A known volume lets you calculate cells per mL for seeding."
    partId: part2_count
    dayId: day1
    stepIndex: 2
    requiredItems: [flask, media_bottle, serological_pipette, waste_container]
    scene: hood
    correctVolumeMl: 12
    toleranceMl: 1
    errorHints:
      volume_off: "Use 12 mL so 100 uL per well gives 2e4 cells per well after counting."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: media_bottle
          liquid: media
          volumeMl: 10
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: media
              volumeMl: 10
              colorKey: media
        - tool: serological_pipette
          liquid: media
          destination: flask
          completionEvent: resuspend
          consumesVolumeMl: 10
    nextId: count_cells

  - id: count_cells
    label: "Count cells on the cell counter"
    action: "Count cells on the cell counter"
    why: "Cell count sets the seed density; wrong count ruins the dose response."
    partId: part2_count
    dayId: day1
    stepIndex: 3
    requiredItems: [cell_counter, dilution_tube_rack, microscope]
    scene: bench
    errorHints:
      low_viability: "Viability under 90% means dead cells dominate. Re-split and retry."
    completionPath:
      kind: modal
      openClick: cell_counter
      advanceClick: capture-count
      completionEvent: count-cells-capture
    nextId: seed_plate

  - id: seed_plate
    label: "Seed 100 uL cell suspension per well"
    action: "Seed 100 uL cell suspension per well"
    why: "Seeds the 96-well plate at 2e4 cells per well for dosing tomorrow."
    partId: part3_seed
    dayId: day1
    stepIndex: 1
    requiredItems: [well_plate, serological_pipette, flask]
    scene: hood
    errorHints:
      wrong_volume: "Seed 100 uL per well. Less means sparse wells and noisy readings."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: flask
          liquid: cells
          volumeMl: 10
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: cells
              volumeMl: 10
              colorKey: cells
        - tool: serological_pipette
          liquid: cells
          destination: well_plate
          completionEvent: pipette_to_plate
          consumesVolumeMl: 10
    nextId: incubate_day1

  - id: incubate_day1
    label: "Place plate in the 37C incubator overnight"
    action: "Place plate in the 37C incubator overnight"
    why: "Cells need ~24 h to attach and recover before drug dosing."
    partId: part3_seed
    dayId: day1
    stepIndex: 2
    requiredItems: [incubator, well_plate]
    scene: bench
    isIncubation: true
    errorHints:
      skipped: "The plate must incubate overnight before treatment."
    completionPath:
      kind: directTool
      tool: incubator
      completionEvent: place_in_incubator
    nextId: carb_intermediate

  - id: carb_intermediate
    label: "Set up carboplatin intermediate dilution"
    action: "Set up carboplatin intermediate dilution"
    why: "Intermediate is the source for the low-dose working stocks."
    partId: part4_dilute
    dayId: day2
    stepIndex: 1
    requiredItems: [carboplatin_stock, sterile_water, micropipette, dilution_tube_carb_intermediate]
    scene: hood
    errorHints:
      volume_off: "Use 20 uL drug and 980 uL water. Wrong ratios break the dose series."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: micropipette
          source: carboplatin_stock
          liquid: carboplatin
          volumeMl: 0.020
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: carboplatin
              volumeMl: 0.020
              colorKey: carboplatin
        - tool: micropipette
          destination: dilution_tube_carb_intermediate
          liquid: carboplatin
          consumesVolumeMl: 0.020
        - tool: micropipette
          source: sterile_water
          liquid: water
          volumeMl: 0.980
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: water
              volumeMl: 0.980
              colorKey: water
        - tool: micropipette
          destination: dilution_tube_carb_intermediate
          liquid: water
          consumesVolumeMl: 0.980
          completionEvent: carb_intermediate_complete
    nextId: carb_low_range

  - id: carb_low_range
    label: "Set up 5 low-range working stocks"
    action: "Set up 5 low-range working stocks from the intermediate"
    why: "These give the 10 nM to 500 nM final concentrations for rows B-F."
    partId: part4_dilute
    dayId: day2
    stepIndex: 2
    requiredItems: [micropipette, dilution_tube_carb_intermediate, media_bottle, dilution_tube_carb_b, dilution_tube_carb_c, dilution_tube_carb_d, dilution_tube_carb_e, dilution_tube_carb_f]
    scene: hood
    errorHints:
      wrong_count: "You need 5 low-range working stocks, one per row B-F."
    completionPath:
      kind: interactionSequence
      interactions:
        # Row B: load from intermediate, discharge to B
        - tool: micropipette
          source: dilution_tube_carb_intermediate
          liquid: carboplatin
          volumeMl: 0.050
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: carboplatin
              volumeMl: 0.050
              colorKey: carboplatin
        - tool: micropipette
          destination: dilution_tube_carb_b
          liquid: carboplatin
          consumesVolumeMl: 0.050
        - tool: micropipette
          source: media_bottle
          liquid: media
          volumeMl: 0.450
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: media
              volumeMl: 0.450
              colorKey: media
        - tool: micropipette
          destination: dilution_tube_carb_b
          liquid: media
          consumesVolumeMl: 0.450
        # Row C: load from intermediate, discharge to C
        - tool: micropipette
          source: dilution_tube_carb_intermediate
          liquid: carboplatin
          volumeMl: 0.050
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: carboplatin
              volumeMl: 0.050
              colorKey: carboplatin
        - tool: micropipette
          destination: dilution_tube_carb_c
          liquid: carboplatin
          consumesVolumeMl: 0.050
        - tool: micropipette
          source: media_bottle
          liquid: media
          volumeMl: 0.450
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: media
              volumeMl: 0.450
              colorKey: media
        - tool: micropipette
          destination: dilution_tube_carb_c
          liquid: media
          consumesVolumeMl: 0.450
        # Row D: load from intermediate, discharge to D
        - tool: micropipette
          source: dilution_tube_carb_intermediate
          liquid: carboplatin
          volumeMl: 0.050
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: carboplatin
              volumeMl: 0.050
              colorKey: carboplatin
        - tool: micropipette
          destination: dilution_tube_carb_d
          liquid: carboplatin
          consumesVolumeMl: 0.050
        - tool: micropipette
          source: media_bottle
          liquid: media
          volumeMl: 0.450
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: media
              volumeMl: 0.450
              colorKey: media
        - tool: micropipette
          destination: dilution_tube_carb_d
          liquid: media
          consumesVolumeMl: 0.450
        # Row E: load from intermediate, discharge to E
        - tool: micropipette
          source: dilution_tube_carb_intermediate
          liquid: carboplatin
          volumeMl: 0.050
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: carboplatin
              volumeMl: 0.050
              colorKey: carboplatin
        - tool: micropipette
          destination: dilution_tube_carb_e
          liquid: carboplatin
          consumesVolumeMl: 0.050
        - tool: micropipette
          source: media_bottle
          liquid: media
          volumeMl: 0.450
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: media
              volumeMl: 0.450
              colorKey: media
        - tool: micropipette
          destination: dilution_tube_carb_e
          liquid: media
          consumesVolumeMl: 0.450
        # Row F: load from intermediate, discharge to F
        - tool: micropipette
          source: dilution_tube_carb_intermediate
          liquid: carboplatin
          volumeMl: 0.050
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: carboplatin
              volumeMl: 0.050
              colorKey: carboplatin
        - tool: micropipette
          destination: dilution_tube_carb_f
          liquid: carboplatin
          consumesVolumeMl: 0.050
        - tool: micropipette
          source: media_bottle
          liquid: media
          volumeMl: 0.450
          stateChange:
            heldLiquid:
              tool: micropipette
              liquid: media
              volumeMl: 0.450
              colorKey: media
        - tool: micropipette
          destination: dilution_tube_carb_f
          liquid: media
          consumesVolumeMl: 0.450
          completionEvent: carb-low-range-confirm
    nextId: carb_high_range

  - id: carb_high_range
    label: "Set up 2 high-range working stocks"
    action: "Set up 2 high-range working stocks from the 10 mM stock"
    why: "These give the 5 uM and 25 uM final concentrations for rows G and H."
    partId: part4_dilute
    dayId: day2
    stepIndex: 3
    requiredItems: [carboplatin_stock, dilution_tube_rack, media_bottle]
    scene: hood
    errorHints:
      wrong_count: "You need 2 high-range working stocks (rows G and H)."
    completionPath:
      kind: modal
      openClick: multichannel_pipette
      advanceClick: drug-modal-advance
      completionEvent: carb-high-range-confirm
    nextId: metformin_stock

  - id: metformin_stock
    label: "Set up metformin working stock"
    action: "Set up Metformin 10 mM working stock (10 uL + 990 uL)"
    why: "Fresh metformin working stock is prepared on the day of treatment."
    partId: part4_dilute
    dayId: day2
    stepIndex: 4
    requiredItems: [metformin_stock, sterile_water, dilution_tube_rack]
    scene: hood
    errorHints:
      volume_off: "Use 10 uL stock and 990 uL media for a 10 mM working stock."
    completionPath:
      kind: modal
      openClick: multichannel_pipette
      advanceClick: drug-modal-advance
      completionEvent: metformin-stock-prepare
    nextId: prewarm_media

  - id: prewarm_media
    label: "Pre-warm media adjustments in the 37C water bath"
    action: "Pre-warm media adjustments in the 37C water bath"
    why: "Cold media shocks cells and scatters the dose response."
    partId: part4_dilute
    dayId: day2
    stepIndex: 5
    requiredItems: [water_bath, media_bottle]
    scene: bench
    errorHints:
      skipped: "Warm the media before adding to cells or you will kill some wells."
    completionPath:
      kind: directTool
      tool: water_bath
      completionEvent: prewarm
    nextId: media_adjust

  - id: media_adjust
    label: "Add media adjustment to each well"
    action: "Add media adjustment to each well"
    why: "Media adjustment keeps total volume at 100 uL after adding drugs."
    partId: part5_treat
    dayId: day2
    stepIndex: 1
    requiredItems: [well_plate, multichannel_pipette, media_bottle]
    scene: hood
    errorHints:
      wrong_volume: "Columns 1-6 row A need 100 uL; rows B-H need 95 uL. Columns 7-12 subtract 10 uL."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: multichannel_pipette
          source: media_bottle
          destination: well_plate
          completionEvent: media_adjust
    nextId: add_carboplatin

  - id: add_carboplatin
    label: "Add carboplatin working stocks to the plate"
    action: "Add 5 uL carboplatin working stock per well (rows B-H)"
    why: "The 8-point dose series lets you compute an IC50 curve."
    partId: part5_treat
    dayId: day2
    stepIndex: 2
    requiredItems: [well_plate, multichannel_pipette, dilution_tube_rack]
    scene: hood
    errorHints:
      wrong_volume: "Add 5 uL per well. Row A stays drug-free as a control."
    completionPath:
      kind: modal
      openClick: multichannel_pipette
      advanceClick: drug-modal-advance
      completionEvent: carb-add-confirm
    nextId: add_metformin

  - id: add_metformin
    label: "Add metformin working stocks to columns 7-12"
    action: "Add 5 uL metformin working stock to columns 7-12"
    why: "Metformin sensitizes cells so the +metformin curve shifts left."
    partId: part5_treat
    dayId: day2
    stepIndex: 3
    requiredItems: [well_plate, multichannel_pipette, dilution_tube_rack]
    scene: hood
    errorHints:
      wrong_cols: "Metformin only goes in columns 7-12. Columns 1-6 stay carboplatin only."
    completionPath:
      kind: modal
      openClick: multichannel_pipette
      advanceClick: drug-modal-advance
      completionEvent: metformin-add-confirm
    nextId: incubate_48h

  - id: incubate_48h
    label: "Incubate 48 h at 37C"
    action: "Incubate 48 h at 37C"
    why: "Drug exposure over 48 h lets cells die so viability differences appear."
    partId: part5_treat
    dayId: day2
    stepIndex: 4
    requiredItems: [incubator, well_plate]
    scene: bench
    isIncubation: true
    errorHints:
      skipped: "The plate must incubate 48 h before MTT readout."
    completionPath:
      kind: directTool
      tool: incubator
      completionEvent: place_in_incubator_48h
    nextId: add_mtt

  - id: add_mtt
    label: "Add 25 uL 12 mM MTT per well"
    action: "Add 25 uL 12 mM MTT per well"
    why: "MTT is reduced to formazan only by live cells; the color shows viability."
    partId: part6_mtt
    dayId: day4
    stepIndex: 1
    requiredItems: [well_plate, multichannel_pipette, mtt_vial]
    scene: hood
    errorHints:
      wrong_volume: "Add 25 uL MTT for a 1.5 mM final concentration."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: multichannel_pipette
          source: mtt_vial
          destination: well_plate
          completionEvent: add_mtt
    nextId: incubate_mtt

  - id: incubate_mtt
    label: "Incubate 1.5 h at 37C"
    action: "Incubate 1.5 h at 37C"
    why: "Live cells need time to convert MTT into purple formazan crystals."
    partId: part6_mtt
    dayId: day4
    stepIndex: 2
    requiredItems: [incubator, well_plate]
    scene: bench
    isIncubation: true
    errorHints:
      skipped: "The MTT must incubate 1.5 h or the signal is too weak."
    completionPath:
      kind: directTool
      tool: incubator
      completionEvent: place_in_incubator_mtt
    nextId: decant_mtt

  - id: decant_mtt
    label: "Decant MTT into the biohazard bin"
    action: "Decant MTT into the biohazard bin"
    why: "MTT is toxic. It must leave the plate before DMSO solubilization."
    partId: part6_mtt
    dayId: day4
    stepIndex: 3
    requiredItems: [well_plate, biohazard_decant]
    scene: hood
    errorHints:
      wrong_waste: "MTT goes into the biohazard bin, not the vacuum waste."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: well_plate
          destination: biohazard_decant
          completionEvent: decant_mtt
    nextId: add_dmso

  - id: add_dmso
    label: "Add 200 uL DMSO per well and mix"
    action: "Add 200 uL DMSO per well and mix"
    why: "DMSO dissolves formazan so the plate reader can measure absorbance."
    partId: part6_mtt
    dayId: day4
    stepIndex: 4
    requiredItems: [well_plate, multichannel_pipette, dmso_bottle]
    scene: hood
    errorHints:
      wrong_volume: "Add 200 uL DMSO per well and pipette up and down 10 times."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: multichannel_pipette
          source: dmso_bottle
          destination: well_plate
          completionEvent: add_dmso
    nextId: plate_read

  - id: plate_read
    label: "Read absorbance at 560 nm"
    action: "Read absorbance at 560 nm"
    why: "Formazan absorbs at 560 nm; more signal means more live cells."
    partId: part7_read
    dayId: day4
    stepIndex: 1
    requiredItems: [well_plate]
    scene: plate_reader
    errorHints:
      wrong_wavelength: "Read at 560 nm. Other wavelengths miss the formazan peak."
    completionPath:
      kind: modal
      openClick: plate_reader
      advanceClick: complete-plate-read
      completionEvent: plate-read-complete
    nextId: results

  - id: results
    label: "Review dose-response curves"
    action: "Review dose-response curves"
    why: "Compare the carboplatin-only and +metformin curves to find IC50 shift."
    partId: part7_read
    dayId: day4
    stepIndex: 2
    requiredItems: [well_plate]
    scene: plate_reader
    errorHints: {}
    completionPath:
      kind: modal
      openClick: plate_reader
      advanceClick: modal-close
      completionEvent: results-finalize
    nextId: null
