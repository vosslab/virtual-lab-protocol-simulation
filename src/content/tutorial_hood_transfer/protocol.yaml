sceneRouter: driver

parts:
  - id: tutorial_hood_part
    label: "Tutorial: Hood Transfer"
    dayId: tutorial_hood_day

days:
  - id: tutorial_hood_day
    label: "Tutorial Day"

steps:
  - id: tutorial_hood_pbs_to_flask
    label: "Pipette PBS into flask"
    action: "Load PBS with the serological pipette and discharge into the flask"
    why: "Mini-protocol exercising the source -> destination interactionSequence path with terminal completionEvent."
    partId: tutorial_hood_part
    dayId: tutorial_hood_day
    stepIndex: 1
    requiredItems: [flask, pbs_bottle, serological_pipette]
    scene: hood
    errorHints:
      volume_off: "Use about 4 mL of PBS."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: pbs_bottle
          liquid: pbs
          volumeMl: 4
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: pbs
              volumeMl: 4
              colorKey: pbs
        - tool: serological_pipette
          destination: flask
          liquid: pbs
          consumesVolumeMl: 4
          completionEvent: pbs_wash
    nextId: null
