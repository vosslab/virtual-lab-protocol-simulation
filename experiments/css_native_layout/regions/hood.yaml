# NEW0 semantic regions for hood workspace
# This file declares:
# - The 5 closed regions: rear_shelf, work_surface, front_tools, instrument_station, popup_layer
# - For each region, which object kinds default to it
# - The kind_to_footprint map that assigns semantic footprint categories to object kinds
# - No coordinates / bounds / sizes; structure only

regions:
  - region_name: rear_shelf
    description: reagents, stock bottles, secondary tools
    wrap_policy: flex-wrap-small-tools-only
    default_object_kinds:
      - bottle
      - decoration
      - waste

  - region_name: work_surface
    description: active workspace area; flask, plate, gel cassette
    wrap_policy: nowrap
    default_object_kinds:
      - flask
      - plate

  - region_name: front_tools
    description: pipettes, racks, small handheld tools, small equipment
    wrap_policy: flex-wrap-small-tools-only
    default_object_kinds:
      - pipette
      - rack
    small_equipment_kinds:
      - vortex
      - water_bath
      - rocking_shaker
      - gel_cassette
      - gel_comb
      - gel_opening_tool
      - hemocytometer
      - hemocytometer_slide
      - hood_surface
      - lightbox
      - staining_tray
      - microwave
      - cell_counter
      - electrode_module
      - mini_protean_gel

  - region_name: instrument_station
    description: large equipment; centrifuge, microscope, plate_reader, incubator, heat_block, electrophoresis_tank, power_supply
    wrap_policy: nowrap
    large_equipment_kinds:
      - centrifuge
      - microscope
      - plate_reader
      - incubator
      - heat_block
      - electrophoresis_tank
      - power_supply

  - region_name: popup_layer
    description: overlays (calculation modals, MCQ cards)
    wrap_policy: nowrap
    default_object_kinds: []

kind_to_footprint:
  # Micro-tools
  pipette: small-tool
  decoration: small-tool

  # Handheld items
  bottle: handheld
  waste: handheld

  # Containers
  flask: container
  plate: container

  # Racks
  rack: rack

  # Equipment subdivisions
  equipment_large:
    - centrifuge
    - microscope
    - plate_reader
    - incubator
    - heat_block
    - gel_tank
    - electrophoresis_tank
    - power_supply
    - well_plate_96
    - tube_rack_24
    - tube_rack_15ml
  equipment_small:
    - vortex
    - water_bath
    - hood_surface
    - rocking_shaker
    - gel_cassette
    - hemocytometer
    - mini_protean_gel
    - electrode_module
    - gel_comb
    - gel_opening_tool
    - lightbox
    - microwave
    - cell_counter
    - hemocytometer_slide

exposed_regions:
  - rear_shelf
  - work_surface
  - front_tools
  - instrument_station
  - popup_layer
