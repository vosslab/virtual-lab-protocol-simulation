# NEW0 stress scene manifest: crowded_bench_dense
# Dense bench with 12+ placements testing layout under maximum crowding.
# Combines staining workflow with multiple reagent bottles, instruments, and waste.
# Not a production scene. Does not reference content/base_scenes/.
# Allowed fields only per controlling plan: scene_name, workspace, regions,
# region_name, placements, placement_name, object_name, label, role.

scene_name: crowded_bench_dense
workspace: bench

regions:
  - region_name: rear_shelf
    placements:
      - placement_name: rear_coomassie_stain
        object_name: coomassie_stain_bottle
        label: Coomassie
        role: source
      - placement_name: rear_destain
        object_name: destain_bottle
        label: Destain
        role: source
      - placement_name: rear_ddh2o
        object_name: ddh2o_bottle
        label: ddH2O
        role: source
      - placement_name: rear_coomassie_recycle
        object_name: coomassie_recycle_bottle
        label: Recycle
        role: destination
      - placement_name: rear_destain_waste
        object_name: destain_waste_bottle
        label: Destain Waste
        role: waste
      - placement_name: rear_laemmli_buffer
        object_name: laemmli_4x_bottle
        label: Laemmli
        role: source
      - placement_name: rear_bme_bottle
        object_name: bme_bottle
        label: BME
        role: source

  - region_name: work_surface
    placements:
      - placement_name: center_staining_tray
        object_name: staining_tray
        label: Staining Tray
        role: primary
      - placement_name: center_kimwipe_pad
        object_name: kimwipe_pad
        label: Kimwipes
        role: secondary
      - placement_name: center_gel_cassette
        object_name: gel_cassette
        label: Gel Cassette
        role: secondary

  - region_name: front_tools
    placements:
      - placement_name: front_microwave
        object_name: microwave
        label: Microwave
        role: display
      - placement_name: front_rocking_shaker
        object_name: rocking_shaker
        label: Shaker
        role: display
      - placement_name: front_waste_container
        object_name: waste_container
        label: Waste
        role: waste

  - region_name: instrument_station
    placements: []

  - region_name: popup_layer
    placements: []
