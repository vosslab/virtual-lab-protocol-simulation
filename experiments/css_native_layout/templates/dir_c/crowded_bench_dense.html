<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crowded Bench Dense - NEW0 Direction C (Instrument-First)</title>
    <link rel="stylesheet" href="../../styles/dir_c_bench.css" />
  </head>
  <body>
    <!-- Stress scene: 13 placements, Direction C instrument-first layout -->
    <!-- Microwave + shaker in left column; reagents and staining tray on right -->
    <div
      class="scene-container scene--bench"
      data-scene-mode="composition"
      data-scene-density="crowded"
    >
      <!-- Left column: instruments as primary anchors -->
      <div
        class="region region--instrument_station"
        data-region="instrument_station"
      >
        <span class="region-label">Instruments</span>

        <div
          class="placement"
          data-placement="front_microwave"
          data-placement-name="front_microwave"
          data-object-name="microwave"
          data-primary="true"
        >
          <div class="object-graphic footprint--instrument">
            <img
              src="../../../../assets/equipment/microwave_closed.svg"
              alt="Microwave"
            />
          </div>
          <span class="placement-label">Microwave</span>
        </div>
        <div
          class="placement"
          data-placement="front_rocking_shaker"
          data-placement-name="front_rocking_shaker"
          data-object-name="rocking_shaker"
        >
          <div class="object-graphic footprint--instrument">
            <img
              src="../../../../assets/equipment/rocking_shaker_idle.svg"
              alt="Shaker"
            />
          </div>
          <span class="placement-label">Shaker</span>
        </div>
      </div>

      <!-- Top-right: 7 reagent bottles -->
      <div class="region region--rear_shelf" data-region="rear_shelf">
        <span class="region-label">Reagents</span>

        <div
          class="placement"
          data-placement="rear_coomassie_stain"
          data-placement-name="rear_coomassie_stain"
          data-object-name="coomassie_stain_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/coomassie_stain_bottle_filled.svg"
              alt="Coomassie"
            />
          </div>
          <span class="placement-label">Coomassie</span>
        </div>
        <div
          class="placement"
          data-placement="rear_destain"
          data-placement-name="rear_destain"
          data-object-name="destain_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/destain_bottle_filled.svg"
              alt="Destain"
            />
          </div>
          <span class="placement-label">Destain</span>
        </div>
        <div
          class="placement"
          data-placement="rear_ddh2o"
          data-placement-name="rear_ddh2o"
          data-object-name="ddh2o_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/ddh2o_bottle_filled.svg"
              alt="ddH2O"
            />
          </div>
          <span class="placement-label">ddH2O</span>
        </div>
        <div
          class="placement"
          data-placement="rear_coomassie_recycle"
          data-placement-name="rear_coomassie_recycle"
          data-object-name="coomassie_recycle_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/coomassie_recycle_bottle_filled.svg"
              alt="Recycle"
            />
          </div>
          <span class="placement-label">Recycle</span>
        </div>
        <div
          class="placement"
          data-placement="rear_destain_waste"
          data-placement-name="rear_destain_waste"
          data-object-name="destain_waste_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/destain_waste_bottle_filled.svg"
              alt="D.Waste"
            />
          </div>
          <span class="placement-label">D.Waste</span>
        </div>
        <div
          class="placement"
          data-placement="rear_laemmli_buffer"
          data-placement-name="rear_laemmli_buffer"
          data-object-name="laemmli_4x_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/laemmli_4x_bottle_filled.svg"
              alt="Laemmli"
            />
          </div>
          <span class="placement-label">Laemmli</span>
        </div>
        <div
          class="placement"
          data-placement="rear_bme_bottle"
          data-placement-name="rear_bme_bottle"
          data-object-name="bme_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/bme_bottle_filled.svg"
              alt="BME"
            />
          </div>
          <span class="placement-label">BME</span>
        </div>
      </div>

      <!-- Center-right: staining tray + supporting items -->
      <div class="region region--work_surface" data-region="work_surface">
        <span class="region-label">Work Surface</span>

        <div
          class="placement"
          data-placement="center_staining_tray"
          data-placement-name="center_staining_tray"
          data-object-name="staining_tray"
        >
          <div class="object-graphic footprint--container">
            <img
              src="../../../../assets/equipment/staining_tray_empty.svg"
              alt="Staining Tray"
            />
          </div>
          <span class="placement-label">Staining Tray</span>
        </div>
        <div
          class="placement"
          data-placement="center_kimwipe_pad"
          data-placement-name="center_kimwipe_pad"
          data-object-name="kimwipe_pad"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/kimwipe_pad.svg"
              alt="Kimwipes"
            />
          </div>
          <span class="placement-label">Kimwipes</span>
        </div>
        <div
          class="placement"
          data-placement="center_gel_cassette"
          data-placement-name="center_gel_cassette"
          data-object-name="gel_cassette"
        >
          <div class="object-graphic footprint--instrument">
            <img
              src="../../../../assets/equipment/gel_cassette.svg"
              alt="Gel Cassette"
            />
          </div>
          <span class="placement-label">Gel Cassette</span>
        </div>
      </div>

      <!-- Bottom-right: waste container -->
      <div class="region region--front_tools" data-region="front_tools">
        <span class="region-label">Waste</span>

        <div
          class="placement"
          data-placement="front_waste_container"
          data-placement-name="front_waste_container"
          data-object-name="waste_container"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../../assets/equipment/waste_container.svg"
              alt="Waste"
            />
          </div>
          <span class="placement-label">Waste</span>
        </div>
      </div>

      <div class="region region--popup_layer" data-region="popup_layer"></div>
    </div>
    <script>
      window.sceneData = {
        sceneName: "crowded_bench_dense",
        direction: "C",
        workspace: "bench",
        sceneType: "stress",
        totalPlacements: 13,
      };
    </script>
  </body>
</html>
