<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Microscope Basic - NEW0 Direction C (Instrument-First)</title>
    <link rel="stylesheet" href="../../styles/dir_c_instrument.css" />
  </head>
  <body>
    <!-- Direction C: microscope anchors the left column -->
    <div class="scene-container scene--instrument" data-scene-mode="template">
      <!-- Left column: microscope as primary instrument -->
      <div
        class="region region--instrument_station"
        data-region="instrument_station"
      >
        <span class="region-label">Instrument</span>

        <div
          class="placement"
          data-placement="instrument_main_microscope"
          data-placement-name="instrument_main_microscope"
          data-object-name="microscope"
          data-primary="true"
        >
          <div class="object-graphic footprint--large-equipment">
            <img
              src="../../../../assets/equipment/microscope_new.svg"
              alt="Microscope"
            />
          </div>
          <span class="placement-label">Microscope</span>
        </div>
      </div>

      <!-- Top-right: empty in basic scene -->
      <div class="region region--rear_shelf" data-region="rear_shelf">
        <span class="region-label">Rear Shelf</span>
      </div>

      <!-- Center-right: empty -->
      <div class="region region--work_surface" data-region="work_surface">
        <span class="region-label">Work Surface</span>
      </div>

      <!-- Bottom-right: empty -->
      <div class="region region--front_tools" data-region="front_tools">
        <span class="region-label">Front Tools</span>
      </div>

      <!-- Popup layer: unused -->
      <div class="region region--popup_layer" data-region="popup_layer"></div>
    </div>
    <script>
      window.sceneData = {
        sceneName: "microscope_basic",
        direction: "C",
        workspace: "instrument",
        totalPlacements: 1,
      };
    </script>
  </body>
</html>
