<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well Plate 96 Zoom - NEW0 Direction C (Instrument-First)</title>
    <link rel="stylesheet" href="../../styles/dir_c_bench.css" />
  </head>
  <body>
    <!-- Direction C zoom: scene-mode--detail collapses to single column; plate fills viewport -->
    <div
      class="scene-container scene--bench scene-mode--detail"
      data-scene-mode="composition"
    >
      <div
        class="region region--instrument_station"
        data-region="instrument_station"
      ></div>
      <div class="region region--rear_shelf" data-region="rear_shelf"></div>

      <div class="region region--work_surface" data-region="work_surface">
        <div
          class="placement"
          data-placement="zoom_well_plate_96"
          data-placement-name="zoom_well_plate_96"
          data-object-name="well_plate_96"
          data-primary="true"
        >
          <div class="object-graphic footprint--zoom-view">
            <img
              src="../../../../assets/equipment/96well_pcr_plate.svg"
              alt="Well Plate 96 Detailed View"
            />
          </div>
          <span class="placement-label">96-Well Plate (Zoomed)</span>
        </div>
      </div>

      <div class="region region--front_tools" data-region="front_tools"></div>
      <div class="region region--popup_layer" data-region="popup_layer"></div>
    </div>
    <script>
      window.sceneData = {
        sceneName: "well_plate_96_zoom",
        direction: "C",
        workspace: "bench",
        totalPlacements: 1,
      };
    </script>
  </body>
</html>
