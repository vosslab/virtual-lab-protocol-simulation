<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Drug Dilution Workspace Dense — NEW0 Direction C (Instrument-First)</title>
	<link rel="stylesheet" href="../../styles/dir_c_bench.css">
</head>
<body>
	<!-- Stress scene: 14 placements, Direction C instrument-first layout -->
	<!-- Left column has racks/tools; right panel has plate + reagents -->
	<div class="scene-container scene--bench" data-scene-mode="composition" data-scene-density="crowded">
		<!-- Left column: tool and support cluster -->
		<div class="region region--instrument_station" data-region="instrument_station">
			<span class="region-label">Support</span>

			<div class="placement" data-placement="work_sample_rack_1" data-placement-name="work_sample_rack_1" data-object-name="tube_rack_24">
				<div class="object-graphic footprint--rack">
					<img src="../../../../assets/equipment/dilution_tube_rack.svg" alt="Rack A">
				</div>
				<span class="placement-label">Rack A</span>
			</div>
			<div class="placement" data-placement="work_sample_rack_2" data-placement-name="work_sample_rack_2" data-object-name="tube_rack_24">
				<div class="object-graphic footprint--rack">
					<img src="../../../../assets/equipment/microtube_rack_24_placeholder.svg" alt="Rack B">
				</div>
				<span class="placement-label">Rack B</span>
			</div>
			<div class="placement" data-placement="work_vial_rack" data-placement-name="work_vial_rack" data-object-name="drug_vial_rack">
				<div class="object-graphic footprint--rack">
					<img src="../../../../assets/equipment/drug_vial_rack.svg" alt="Vial Rack">
				</div>
				<span class="placement-label">Vials</span>
			</div>
			<div class="placement" data-placement="tool_p200_micropipette" data-placement-name="tool_p200_micropipette" data-object-name="p200_micropipette">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../../assets/equipment/p200_micropipette_filled.svg" alt="p200">
				</div>
				<span class="placement-label">p200</span>
			</div>
			<div class="placement" data-placement="tool_tip_box" data-placement-name="tool_tip_box" data-object-name="tip_box">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../../assets/equipment/tip_box_new.svg" alt="Tips">
				</div>
				<span class="placement-label">Tips</span>
			</div>
		</div>

		<!-- Top-right: reagent bottles -->
		<div class="region region--rear_shelf" data-region="rear_shelf">
			<span class="region-label">Reagents</span>

			<div class="placement" data-placement="rear_dmso_bottle" data-placement-name="rear_dmso_bottle" data-object-name="dmso_stock_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/destain_bottle_filled.svg" alt="DMSO">
				</div>
				<span class="placement-label">DMSO</span>
			</div>
			<div class="placement" data-placement="rear_pbs_bottle" data-placement-name="rear_pbs_bottle" data-object-name="pbs_buffer_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/ddh2o_bottle_filled.svg" alt="PBS">
				</div>
				<span class="placement-label">PBS</span>
			</div>
			<div class="placement" data-placement="rear_drug_bottle_1" data-placement-name="rear_drug_bottle_1" data-object-name="drug_stock_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/bme_bottle_filled.svg" alt="Drug A">
				</div>
				<span class="placement-label">Drug A</span>
			</div>
			<div class="placement" data-placement="rear_drug_bottle_2" data-placement-name="rear_drug_bottle_2" data-object-name="drug_stock_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/laemmli_4x_bottle_filled.svg" alt="Drug B">
				</div>
				<span class="placement-label">Drug B</span>
			</div>
			<div class="placement" data-placement="rear_drug_bottle_3" data-placement-name="rear_drug_bottle_3" data-object-name="drug_stock_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/coomassie_stain_bottle_filled.svg" alt="Drug C">
				</div>
				<span class="placement-label">Drug C</span>
			</div>
			<div class="placement" data-placement="rear_ethanol_bottle" data-placement-name="rear_ethanol_bottle" data-object-name="ethanol_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/bottle.svg" alt="Ethanol">
				</div>
				<span class="placement-label">Ethanol</span>
			</div>
		</div>

		<!-- Center-right: well plate dominant -->
		<div class="region region--work_surface" data-region="work_surface">
			<span class="region-label">Work Surface</span>

			<div class="placement" data-placement="center_well_plate" data-placement-name="center_well_plate" data-object-name="well_plate_96" data-primary="true">
				<div class="object-graphic footprint--container">
					<img src="../../../../assets/equipment/96well_pcr_plate.svg" alt="96-Well Plate">
				</div>
				<span class="placement-label">96-Well Plate</span>
			</div>
		</div>

		<!-- Bottom-right: waste -->
		<div class="region region--front_tools" data-region="front_tools">
			<span class="region-label">Waste</span>

			<div class="placement" data-placement="waste_container_main" data-placement-name="waste_container_main" data-object-name="waste_container">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/waste_container.svg" alt="Waste">
				</div>
				<span class="placement-label">Waste</span>
			</div>
			<div class="placement" data-placement="waste_tray_secondary" data-placement-name="waste_tray_secondary" data-object-name="waste_tray">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/waste_tray.svg" alt="Tray">
				</div>
				<span class="placement-label">Tray</span>
			</div>
		</div>

		<div class="region region--popup_layer" data-region="popup_layer"></div>
	</div>
	<script>
		window.sceneData = { sceneName: 'drug_dilution_workspace_dense', direction: 'C', workspace: 'bench', sceneType: 'stress', totalPlacements: 14 };
	</script>
</body>
</html>
