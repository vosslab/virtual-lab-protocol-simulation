<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drug Dilution Plate Workspace - NEW0 Direction E</title>
    <link rel="stylesheet" href="../styles/bench.css" />
    <style>
      /* Inline minimal overrides specific to this scene (none needed for now) */
    </style>
  </head>
  <body>
    <div
      class="scene-container scene--bench scene--drug-dilution"
      data-scene-mode="composition"
      data-scene-density="crowded"
    >
      <!-- Region 1: Rear Shelf - reagents, stock bottles -->
      <div class="region region--rear_shelf" data-region="rear_shelf">
        <span class="region-label">Reagents</span>

        <!-- DMSO Stock Bottle -->
        <div
          class="placement"
          data-placement="rear_dmso_bottle"
          data-placement-name="rear_dmso_bottle"
          data-object-name="stock_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/destain_bottle_filled.svg"
              alt="DMSO Stock"
            />
          </div>
          <span class="placement-label">DMSO</span>
        </div>

        <!-- PBS Buffer Bottle -->
        <div
          class="placement"
          data-placement="rear_pbs_bottle"
          data-placement-name="rear_pbs_bottle"
          data-object-name="stock_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/ddh2o_bottle_filled.svg"
              alt="PBS Buffer"
            />
          </div>
          <span class="placement-label">PBS</span>
        </div>

        <!-- Drug Stock Bottle -->
        <div
          class="placement"
          data-placement="rear_drug_bottle"
          data-placement-name="rear_drug_bottle"
          data-object-name="stock_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/bme_bottle_filled.svg"
              alt="Drug Stock"
            />
          </div>
          <span class="placement-label">Drug</span>
        </div>
      </div>

      <!-- Region 2: Work Surface - well plate 96 dominant + support items -->
      <div class="region region--work_surface" data-region="work_surface">
        <span class="region-label">Work Surface</span>

        <!-- Well Plate 96 (primary object, fully visible, dominant) -->
        <div
          class="placement"
          data-placement="center_well_plate"
          data-placement-name="center_well_plate"
          data-object-name="well_plate_96"
          data-primary="true"
        >
          <div class="object-graphic footprint--container">
            <img
              src="../../../assets/equipment/96well_pcr_plate.svg"
              alt="Well Plate 96"
            />
          </div>
          <span class="placement-label">Plate</span>
        </div>

        <!-- Microtube Rack (supporting, positioned left of plate) -->
        <div
          class="placement"
          data-placement="work_sample_rack"
          data-placement-name="work_sample_rack"
          data-object-name="tube_rack_24"
        >
          <div class="object-graphic footprint--rack">
            <img
              src="../../../assets/equipment/microtube_rack_24_placeholder.svg"
              alt="Sample Rack"
            />
          </div>
          <span class="placement-label">Rack</span>
        </div>

        <!-- Tip Box (supporting, positioned right of plate) -->
        <div
          class="placement"
          data-placement="tool_tips"
          data-placement-name="tool_tips"
          data-object-name="tip_box"
        >
          <div class="object-graphic footprint--small-tool">
            <img
              src="../../../assets/equipment/tip_box_new.svg"
              alt="Tip Box"
            />
          </div>
          <span class="placement-label">Tips</span>
        </div>
      </div>

      <!-- Region 3: Front Tools - pipettes and waste -->
      <div class="region region--front_tools" data-region="front_tools">
        <span class="region-label">Tools</span>

        <!-- P200 Micropipette -->
        <div
          class="placement"
          data-placement="tool_p200"
          data-placement-name="tool_p200"
          data-object-name="p200_micropipette"
        >
          <div class="object-graphic footprint--small-tool">
            <img
              src="../../../assets/equipment/p200_micropipette_filled.svg"
              alt="p200"
            />
          </div>
          <span class="placement-label">p200</span>
        </div>

        <!-- Waste Container -->
        <div
          class="placement"
          data-placement="waste_container"
          data-placement-name="waste_container"
          data-object-name="waste_container"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/waste_container.svg"
              alt="Waste"
            />
          </div>
          <span class="placement-label">Waste</span>
        </div>
      </div>

      <!-- Region 6: Popup Layer (overlays, hidden by default) -->
      <div class="region region--popup_layer" data-region="popup_layer">
        <!-- Populated only when a modal or overlay is active -->
      </div>
    </div>

    <script>
      // Data export for testing/verification
      window.sceneData = {
        sceneName: "drug_dilution_plate_workspace",
        workspace: "bench",
        layout: "3-band",
        totalPlacements: 8,
        regions: {
          rear_shelf: 3,
          work_surface: 3,
          front_tools: 2,
          popup_layer: 0,
        },
        placements: [
          {
            placement: "rear_dmso_bottle",
            object: "stock_bottle",
            region: "rear_shelf",
            footprint: "footprint--handheld",
          },
          {
            placement: "rear_pbs_bottle",
            object: "stock_bottle",
            region: "rear_shelf",
            footprint: "footprint--handheld",
          },
          {
            placement: "rear_drug_bottle",
            object: "stock_bottle",
            region: "rear_shelf",
            footprint: "footprint--handheld",
          },
          {
            placement: "center_well_plate",
            object: "well_plate_96",
            region: "work_surface",
            footprint: "footprint--container",
          },
          {
            placement: "work_sample_rack",
            object: "tube_rack_24",
            region: "work_surface",
            footprint: "footprint--rack",
          },
          {
            placement: "tool_tips",
            object: "tip_box",
            region: "work_surface",
            footprint: "footprint--small-tool",
          },
          {
            placement: "tool_p200",
            object: "p200_micropipette",
            region: "front_tools",
            footprint: "footprint--small-tool",
          },
          {
            placement: "waste_container",
            object: "waste_container",
            region: "front_tools",
            footprint: "footprint--handheld",
          },
        ],
      };

      // Verify no overlap, clipping, or migration on load
      function checkLayout() {
        const regions = document.querySelectorAll(".region");
        const sceneContainer = document.querySelector(".scene-container");
        const containerRect = sceneContainer.getBoundingClientRect();

        console.log("=== Direction E Layout Check ===");
        console.log(
          `Scene container: ${containerRect.width.toFixed(0)}x${containerRect.height.toFixed(0)}`,
        );

        // Check each region for overflow and visibility
        const regionRects = new Map();
        regions.forEach((region) => {
          const regionName = region.getAttribute("data-region");
          if (regionName === "popup_layer") return;

          const rect = region.getBoundingClientRect();
          const scrollHeight = region.scrollHeight;
          const scrollWidth = region.scrollWidth;

          regionRects.set(regionName, { rect, scrollHeight, scrollWidth });

          const overflowY = scrollHeight > rect.height ? "YES" : "NO";
          const overflowX = scrollWidth > rect.width ? "YES" : "NO";
          console.log(
            `Region "${regionName}": ${rect.width.toFixed(0)}x${rect.height.toFixed(0)} (overflow: H=${overflowX} V=${overflowY})`,
          );
        });

        // Check plate dominance: plate bbox area / scene area
        const plateImg = document.querySelector(
          '[data-placement-name="center_well_plate"] .object-graphic img',
        );
        if (plateImg) {
          setTimeout(() => {
            const plateGraphic = plateImg.closest(".object-graphic");
            const plateRect = plateGraphic.getBoundingClientRect();
            const plateArea = plateRect.width * plateRect.height;
            const sceneArea = containerRect.width * containerRect.height;
            const dominanceRatio = ((plateArea / sceneArea) * 100).toFixed(1);
            console.log(
              `Plate dominance: ${dominanceRatio}% (area: ${plateArea.toFixed(0)} / ${sceneArea.toFixed(0)})`,
            );
            console.log(
              `Plate fully visible: ${plateRect.top >= containerRect.top && plateRect.left >= containerRect.left && plateRect.bottom <= containerRect.bottom && plateRect.right <= containerRect.right ? "YES" : "NO"}`,
            );
          }, 500);
        }

        // Check microtube + tip box proximity to pipette
        const pipetteGraphic = document.querySelector(
          '[data-placement-name="tool_p200"] .object-graphic',
        );
        const tubeRackGraphic = document.querySelector(
          '[data-placement-name="work_sample_rack"] .object-graphic',
        );
        const tipBoxGraphic = document.querySelector(
          '[data-placement-name="tool_tips"] .object-graphic',
        );

        if (pipetteGraphic && tubeRackGraphic && tipBoxGraphic) {
          const pipetteRect = pipetteGraphic.getBoundingClientRect();
          const tubeRect = tubeRackGraphic.getBoundingClientRect();
          const tipRect = tipBoxGraphic.getBoundingClientRect();

          const pipetteCenterX = pipetteRect.left + pipetteRect.width / 2;
          const pipetteCenterY = pipetteRect.top + pipetteRect.height / 2;
          const tubeCenterX = tubeRect.left + tubeRect.width / 2;
          const tubeCenterY = tubeRect.top + tubeRect.height / 2;
          const tipCenterX = tipRect.left + tipRect.width / 2;
          const tipCenterY = tipRect.top + tipRect.height / 2;

          const pipetteToTubeDistance = Math.sqrt(
            Math.pow(pipetteCenterX - tubeCenterX, 2) +
              Math.pow(pipetteCenterY - tubeCenterY, 2),
          );
          const pipetteToTipDistance = Math.sqrt(
            Math.pow(pipetteCenterX - tipCenterX, 2) +
              Math.pow(pipetteCenterY - tipCenterY, 2),
          );

          console.log(
            `Pipette to Sample Rack distance: ${pipetteToTubeDistance.toFixed(1)}px`,
          );
          console.log(
            `Pipette to Tip Box distance: ${pipetteToTipDistance.toFixed(1)}px`,
          );
          console.log(
            `Proximity rule (<=300px): ${pipetteToTubeDistance <= 300 && pipetteToTipDistance <= 300 ? "PASS" : "FAIL"}`,
          );
        }

        console.log("=== End Layout Check ===");
      }

      window.addEventListener("load", checkLayout);
      window.addEventListener("resize", checkLayout);
    </script>
  </body>
</html>
