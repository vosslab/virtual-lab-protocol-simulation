<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Electrophoresis Bench - NEW0 Reference HTML</title>
	<link rel="stylesheet" href="../styles/bench.css">
	<style>
		/* Inline minimal overrides specific to this scene (none needed for now) */
	</style>
</head>
<body>
	<div class="scene-container scene--bench" data-scene-mode="composition" data-scene-density="crowded">
		<!-- Region 1: Rear Shelf (reagents, stock bottles) -->
		<div class="region region--rear_shelf" data-region="rear_shelf">
			<span class="region-label">Rear Shelf</span>

			<!-- Running Buffer 10x Bottle (handheld) -->
			<div class="placement" data-placement="rear_left_running_buffer_10x" data-placement-name="rear_left_running_buffer_10x" data-object-name="running_buffer_10x_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/running_buffer_10x_bottle_filled.svg" alt="Running Buffer 10x Bottle">
				</div>
				<span class="placement-label">Running Buffer 10x</span>
			</div>

			<!-- Running Buffer 1x Carboy (handheld, moved from center per pedagogy) -->
			<div class="placement" data-placement="center_running_buffer_1x_carboy" data-placement-name="center_running_buffer_1x_carboy" data-object-name="running_buffer_1x_carboy">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/running_buffer_1x_carboy_filled.svg" alt="Running Buffer 1x Carboy">
				</div>
				<span class="placement-label">Running Buffer 1x</span>
			</div>

			<!-- ddH2O Bottle (handheld) -->
			<div class="placement" data-placement="center_ddh2o_bottle" data-placement-name="center_ddh2o_bottle" data-object-name="ddh2o_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/ddh2o_bottle_filled.svg" alt="ddH2O Bottle">
				</div>
				<span class="placement-label">ddH2O Bottle</span>
			</div>

			<!-- Recycle Buffer Bottle (handheld) -->
			<div class="placement" data-placement="rear_left_recycle_buffer_bottle" data-placement-name="rear_left_recycle_buffer_bottle" data-object-name="recycle_buffer_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/running_buffer_10x_bottle_filled.svg" alt="Recycle Buffer Bottle">
				</div>
				<span class="placement-label">Recycle Buffer</span>
			</div>

			<!-- Waste Container (handheld) -->
			<div class="placement" data-placement="center_waste_container" data-placement-name="center_waste_container" data-object-name="waste_container">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/waste_container.svg" alt="Waste Container">
				</div>
				<span class="placement-label">Waste Container</span>
			</div>
		</div>

		<!-- Region 2: Work Surface (active workspace) -->
		<div class="region region--work_surface" data-region="work_surface">
			<span class="region-label">Work Surface</span>

			<!-- Electrophoresis Tank (large-equipment, primary for electrophoresis scene) -->
			<div class="placement" data-placement="center_electrophoresis_tank" data-placement-name="center_electrophoresis_tank" data-object-name="electrophoresis_tank" data-primary="true">
				<div class="object-graphic footprint--large-equipment">
					<img src="../../../assets/equipment/electrophoresis_tank.svg" alt="Electrophoresis Tank">
				</div>
				<span class="placement-label">Electrophoresis Tank</span>
			</div>

			<!-- Gel Cassette (instrument - supporting item) -->
			<div class="placement" data-placement="center_gel_cassette" data-placement-name="center_gel_cassette" data-object-name="gel_cassette">
				<div class="object-graphic footprint--instrument">
					<img src="../../../assets/equipment/gel_cassette.svg" alt="Gel Cassette">
				</div>
				<span class="placement-label">Gel Cassette</span>
			</div>

			<!-- Electrode Module (instrument) -->
			<div class="placement" data-placement="center_electrode_module" data-placement-name="center_electrode_module" data-object-name="electrode_module">
				<div class="object-graphic footprint--instrument">
					<img src="../../../assets/equipment/electrode_module.svg" alt="Electrode Module">
				</div>
				<span class="placement-label">Electrode Module</span>
			</div>

			<!-- Serological Pipette (small-tool, supporting) -->
			<div class="placement" data-placement="center_serological_pipette" data-placement-name="center_serological_pipette" data-object-name="serological_pipette">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/aspirating_pipette.svg" alt="Serological Pipette">
				</div>
				<span class="placement-label">Serological Pipette</span>
			</div>
		</div>

		<!-- Region 3: Front Tools (pipettes, small tools) -->
		<div class="region region--front_tools" data-region="front_tools">
			<span class="region-label">Front Tools</span>

			<!-- p200 Micropipette (small-tool) -->
			<div class="placement" data-placement="right_tool_area_p200_micropipette" data-placement-name="right_tool_area_p200_micropipette" data-object-name="p200_micropipette">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/p200_micropipette_filled.svg" alt="p200 Micropipette">
				</div>
				<span class="placement-label">p200 Pipette</span>
			</div>

			<!-- p10 Gel Loading Tip Box (small-tool) -->
			<div class="placement" data-placement="right_tool_area_p10_gel_loading_tip_box" data-placement-name="right_tool_area_p10_gel_loading_tip_box" data-object-name="p10_gel_loading_tip_box">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/p10_gel_loading_tip_box.svg" alt="p10 Gel Loading Tip Box">
				</div>
				<span class="placement-label">p10 Tip Box</span>
			</div>

			<!-- Protein Ladder Tube (small-tool) -->
			<div class="placement" data-placement="rear_left_protein_ladder_tube" data-placement-name="rear_left_protein_ladder_tube" data-object-name="protein_ladder_tube">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/protein_ladder_tube_filled.svg" alt="Protein Ladder Tube">
				</div>
				<span class="placement-label">Protein Ladder</span>
			</div>

			<!-- Gel Opening Tool (small-tool) -->
			<div class="placement" data-placement="rear_right_gel_opening_tool" data-placement-name="rear_right_gel_opening_tool" data-object-name="gel_opening_tool">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/gel_opening_tool.svg" alt="Gel Opening Tool">
				</div>
				<span class="placement-label">Gel Opening Tool</span>
			</div>

			<!-- Mini Protean Gel (instrument) -->
			<div class="placement" data-placement="front_left_mini_protean_gel" data-placement-name="front_left_mini_protean_gel" data-object-name="mini_protean_gel">
				<div class="object-graphic footprint--instrument">
					<img src="../../../assets/equipment/mini_protean_gel.svg" alt="Mini Protean Gel">
				</div>
				<span class="placement-label">Mini Protean Gel</span>
			</div>

			<!-- Gel Comb (small-tool) -->
			<div class="placement" data-placement="front_right_gel_comb" data-placement-name="front_right_gel_comb" data-object-name="gel_comb">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/gel_comb.svg" alt="Gel Comb">
				</div>
				<span class="placement-label">Gel Comb</span>
			</div>
		</div>

		<!-- Region 4: Instrument Station (hidden; large equipment moved to work_surface) -->
		<div class="region region--instrument_station" data-region="instrument_station">
			<span class="region-label">Instrument Station</span>
		</div>

		<!-- Region 5: Popup Layer (overlays, hidden by default) -->
		<div class="region region--popup_layer" data-region="popup_layer">
			<!-- Populated only when a modal or overlay is active -->
		</div>
	</div>

	<script>
		// Data export for testing/verification
		window.sceneData = {
			sceneName: 'electrophoresis_bench',
			workspace: 'bench',
			totalPlacements: 16,
			regions: {
				rear_shelf: 5,
				work_surface: 3,
				front_tools: 6,
				instrument_station: 2,
				popup_layer: 0
			},
			placements: [
				{ placement: 'rear_left_running_buffer_10x', object: 'running_buffer_10x_bottle', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'center_running_buffer_1x_carboy', object: 'running_buffer_1x_carboy', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'center_ddh2o_bottle', object: 'ddh2o_bottle', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'rear_left_recycle_buffer_bottle', object: 'recycle_buffer_bottle', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'center_waste_container', object: 'waste_container', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'center_serological_pipette', object: 'serological_pipette', region: 'work_surface', footprint: 'footprint--small-tool' },
				{ placement: 'center_gel_cassette', object: 'gel_cassette', region: 'work_surface', footprint: 'footprint--instrument' },
				{ placement: 'center_electrode_module', object: 'electrode_module', region: 'work_surface', footprint: 'footprint--instrument' },
				{ placement: 'right_tool_area_p200_micropipette', object: 'p200_micropipette', region: 'front_tools', footprint: 'footprint--small-tool' },
				{ placement: 'right_tool_area_p10_gel_loading_tip_box', object: 'p10_gel_loading_tip_box', region: 'front_tools', footprint: 'footprint--small-tool' },
				{ placement: 'rear_left_protein_ladder_tube', object: 'protein_ladder_tube', region: 'front_tools', footprint: 'footprint--small-tool' },
				{ placement: 'rear_right_gel_opening_tool', object: 'gel_opening_tool', region: 'front_tools', footprint: 'footprint--small-tool' },
				{ placement: 'front_left_mini_protean_gel', object: 'mini_protean_gel', region: 'front_tools', footprint: 'footprint--instrument' },
				{ placement: 'front_right_gel_comb', object: 'gel_comb', region: 'front_tools', footprint: 'footprint--small-tool' },
				{ placement: 'rear_center_electrophoresis_tank', object: 'electrophoresis_tank', region: 'instrument_station', footprint: 'footprint--large-equipment' },
				{ placement: 'rear_right_power_supply', object: 'power_supply', region: 'instrument_station', footprint: 'footprint--large-equipment' }
			]
		};

		// Verify no overflow on load
		function checkOverflow() {
			const regions = document.querySelectorAll('.region');
			regions.forEach(region => {
				const regionName = region.getAttribute('data-region');
				if (regionName === 'popup_layer') return;  // Skip popup layer

				const rect = region.getBoundingClientRect();
				const scrollHeight = region.scrollHeight;
				const scrollWidth = region.scrollWidth;

				console.log(`Region "${regionName}": height=${rect.height.toFixed(1)} (scroll=${scrollHeight}), width=${rect.width.toFixed(1)} (scroll=${scrollWidth})`);
			});
		}

		window.addEventListener('load', checkOverflow);
		window.addEventListener('resize', checkOverflow);
	</script>
</body>
</html>
