<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hood Basic — NEW0 Reference HTML</title>
	<link rel="stylesheet" href="../styles/hood.css">
	<style>
		/* Inline minimal overrides specific to this scene (none needed for now) */
	</style>
</head>
<body>
	<div class="scene-container scene--hood" data-scene-mode="template">
		<!-- Region 1: Rear Shelf (reagents, stock bottles) -->
		<div class="region region--rear_shelf" data-region="rear_shelf">
			<span class="region-label">Rear Shelf</span>

			<!-- Ethanol Bottle (handheld) -->
			<div class="placement" data-placement="rear_left_ethanol_bottle" data-placement-name="rear_left_ethanol_bottle" data-object-name="ethanol_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/bottle.svg" alt="Ethanol Bottle">
				</div>
				<span class="placement-label">Ethanol</span>
			</div>

			<!-- ddH2O Spray Bottle (handheld) -->
			<div class="placement" data-placement="rear_center_ddh2o_spray" data-placement-name="rear_center_ddh2o_spray" data-object-name="ddh2o_spray_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../assets/equipment/ethanol_spray.svg" alt="ddH2O Spray Bottle">
				</div>
				<span class="placement-label">ddH2O Spray</span>
			</div>
		</div>

		<!-- Region 2: Work Surface (active workspace) -->
		<div class="region region--work_surface" data-region="work_surface">
			<span class="region-label">Work Surface</span>

			<!-- P1000 Pipette (small-tool) -->
			<div class="placement" data-placement="center_p1000_pipette" data-placement-name="center_p1000_pipette" data-object-name="p1000_pipette">
				<div class="object-graphic footprint--small-tool">
					<img src="../../../assets/equipment/aspirating_pipette.svg" alt="P1000 Pipette">
				</div>
				<span class="placement-label">P1000</span>
			</div>
		</div>

		<!-- Region 3: Front Tools (pipettes, racks, small tools) -->
		<div class="region region--front_tools" data-region="front_tools">
			<span class="region-label">Front Tools</span>
		</div>

		<!-- Region 4: Instrument Station (large equipment) -->
		<div class="region region--instrument_station" data-region="instrument_station">
			<span class="region-label">Instrument Station</span>
		</div>

		<!-- Region 5: Popup Layer (overlays, hidden by default) -->
		<div class="region region--popup_layer" data-region="popup_layer">
			<!-- Populated only when a modal or overlay is active -->
		</div>
	</div>

	<script>
		// Data export for testing/verification
		window.sceneData = {
			sceneName: 'hood_basic',
			workspace: 'hood',
			totalPlacements: 3,
			regions: {
				rear_shelf: 2,
				work_surface: 1,
				front_tools: 0,
				instrument_station: 0,
				popup_layer: 0
			},
			placements: [
				{ placement: 'rear_left_ethanol_bottle', object: 'ethanol_bottle', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'rear_center_ddh2o_spray', object: 'ddh2o_spray_bottle', region: 'rear_shelf', footprint: 'footprint--handheld' },
				{ placement: 'center_p1000_pipette', object: 'p1000_pipette', region: 'work_surface', footprint: 'footprint--small-tool' }
			]
		};

		// Verify no overflow on load
		function checkOverflow() {
			const regions = document.querySelectorAll('.region');
			regions.forEach(region => {
				const regionName = region.getAttribute('data-region');
				if (regionName === 'popup_layer') return;

				const rect = region.getBoundingClientRect();
				const scrollHeight = region.scrollHeight;
				const scrollWidth = region.scrollWidth;

				console.log(`Region "${regionName}": height=${rect.height.toFixed(1)} (scroll=${scrollHeight}), width=${rect.width.toFixed(1)} (scroll=${scrollWidth})`);
			});
		}

		window.addEventListener('load', checkOverflow);
		window.addEventListener('resize', checkOverflow);
	</script>
</body>
</html>
