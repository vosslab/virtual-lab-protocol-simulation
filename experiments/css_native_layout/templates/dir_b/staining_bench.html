<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Staining Bench — NEW0 Direction B (Stage/Composition)</title>
	<link rel="stylesheet" href="../../styles/dir_b_bench.css">
</head>
<body>
	<!-- Direction B: staining tray is the primary stage object -->
	<div class="scene-container scene--bench" data-scene-mode="composition" data-scene-density="crowded">
		<!-- Rear shelf: stain and destain bottles -->
		<div class="region region--rear_shelf" data-region="rear_shelf">
			<span class="region-label">Reagents</span>

			<div class="placement" data-placement="rear_left_coomassie_stain" data-placement-name="rear_left_coomassie_stain" data-object-name="coomassie_stain_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/coomassie_stain_bottle_filled.svg" alt="Coomassie Stain">
				</div>
				<div class="placement-label">Coomassie</div>
			</div>

			<div class="placement" data-placement="rear_center_destain" data-placement-name="rear_center_destain" data-object-name="destain_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/destain_bottle_filled.svg" alt="Destain Bottle">
				</div>
				<div class="placement-label">Destain</div>
			</div>

			<div class="placement" data-placement="rear_right_ddh2o" data-placement-name="rear_right_ddh2o" data-object-name="ddh2o_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/ddh2o_bottle_filled.svg" alt="ddH2O Bottle">
				</div>
				<div class="placement-label">ddH2O</div>
			</div>

			<div class="placement" data-placement="rear_left_coomassie_recycle" data-placement-name="rear_left_coomassie_recycle" data-object-name="coomassie_recycle_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/coomassie_recycle_bottle_filled.svg" alt="Recycle Bottle">
				</div>
				<div class="placement-label">Recycle</div>
			</div>

			<div class="placement" data-placement="rear_center_destain_waste" data-placement-name="rear_center_destain_waste" data-object-name="destain_waste_bottle">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/destain_waste_bottle_filled.svg" alt="Destain Waste">
				</div>
				<div class="placement-label">Waste</div>
			</div>
		</div>

		<!-- Center stage: staining tray dominant; accessories around it -->
		<div class="region region--work_surface" data-region="work_surface">
			<span class="region-label">Work Surface</span>

			<div class="placement" data-placement="center_staining_tray" data-placement-name="center_staining_tray" data-object-name="staining_tray" data-primary="true">
				<div class="object-graphic footprint--container">
					<img src="../../../../assets/equipment/staining_tray_empty.svg" alt="Staining Tray">
				</div>
				<div class="placement-label">Staining Tray</div>
			</div>

			<div class="placement" data-placement="center_kimwipe_pad" data-placement-name="center_kimwipe_pad" data-object-name="kimwipe_pad">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/kimwipe_pad.svg" alt="Kimwipe Pad">
				</div>
				<div class="placement-label">Kimwipes</div>
			</div>

			<div class="placement" data-placement="center_waste_container" data-placement-name="center_waste_container" data-object-name="waste_container">
				<div class="object-graphic footprint--handheld">
					<img src="../../../../assets/equipment/waste_container.svg" alt="Waste">
				</div>
				<div class="placement-label">Waste</div>
			</div>
		</div>

		<!-- Front tools: instruments at bottom -->
		<div class="region region--front_tools" data-region="front_tools">
			<span class="region-label">Instruments</span>

			<div class="placement" data-placement="right_tool_area_microwave" data-placement-name="right_tool_area_microwave" data-object-name="microwave">
				<div class="object-graphic footprint--instrument">
					<img src="../../../../assets/equipment/microwave_closed.svg" alt="Microwave">
				</div>
				<div class="placement-label">Microwave</div>
			</div>

			<div class="placement" data-placement="right_tool_area_rocking_shaker" data-placement-name="right_tool_area_rocking_shaker" data-object-name="rocking_shaker">
				<div class="object-graphic footprint--instrument">
					<img src="../../../../assets/equipment/rocking_shaker_idle.svg" alt="Rocking Shaker">
				</div>
				<div class="placement-label">Shaker</div>
			</div>
		</div>

		<!-- Popup layer: unused -->
		<div class="region region--popup_layer" data-region="popup_layer"></div>
	</div>
	<script>
		window.sceneData = { sceneName: 'staining_bench', direction: 'B', workspace: 'bench', totalPlacements: 10 };
	</script>
</body>
</html>
