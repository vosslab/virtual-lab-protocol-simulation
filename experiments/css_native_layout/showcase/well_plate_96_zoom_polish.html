<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well Plate 96 Zoom Polish - NEW2 Showcase</title>
    <link rel="stylesheet" href="../styles/bench.css" />
    <style>
      /*
		 * Polish-demo scoped styles.
		 * Scoped to .scene--polish-demo so production templates are untouched.
		 * CSS-only; no JS or DOM restructure beyond adding the class.
		 */

      /* Trial 1: better plate centering + scale.
		 * The canonical zoom template renders the plate at native footprint
		 * inside a 1920x1080 viewport, leaving the plate visually small in
		 * the upper-middle. Polish: place-content the region and scale up
		 * the object-graphic with a transform-origin centered on itself,
		 * so the plate reads as the subject of a real zoom view. */
      .scene--polish-demo .region--work_surface {
        place-content: center;
        place-items: center;
      }

      .scene--polish-demo .region--work_surface .placement {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
      }

      .scene--polish-demo .object-graphic.footprint--zoom-view {
        transform-origin: center center;
        transform: scale(2.4);
        transition: transform 200ms ease;
      }

      /* Trial 2: subtle stage / background.
		 * Bench surface already provides a warm tan. Add a soft radial
		 * vignette behind the plate and a drop shadow under the artwork
		 * so the plate visually lifts off the bench instead of floating. */
      .scene--polish-demo[data-trial="2"],
      .scene--polish-demo[data-trial="3"] {
        background:
          radial-gradient(
            ellipse 60% 55% at 50% 45%,
            rgba(255, 250, 240, 0.45) 0%,
            rgba(255, 250, 240, 0.18) 45%,
            rgba(0, 0, 0, 0) 75%
          ),
          linear-gradient(180deg, #d9c8a6 0%, #c8b48c 100%);
      }

      .scene--polish-demo[data-trial="2"]
        .object-graphic.footprint--zoom-view
        img,
      .scene--polish-demo[data-trial="3"]
        .object-graphic.footprint--zoom-view
        img {
        filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.22))
          drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
      }

      /* Trial 3: caption / label treatment.
		 * Region label (top-left "Well Plate Detail View") and placement
		 * label ("96-Well Plate (Zoomed)") were thin and low-contrast.
		 * Bump weight, tighten letter-spacing, add a soft chip backdrop. */
      .scene--polish-demo[data-trial="3"] .region--work_surface .region-label {
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #3b2f1c;
        background: rgba(255, 250, 240, 0.65);
        padding: 4px 10px;
        border-radius: 4px;
        text-transform: uppercase;
        font-size: 12px;
      }

      .scene--polish-demo[data-trial="3"]
        .region--work_surface
        .placement-label {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.02em;
        color: #2c2418;
        text-shadow: 0 1px 0 rgba(255, 250, 240, 0.6);
        margin-top: 8px;
      }

      /* Empty side regions: dim labels so the zoom subject dominates. */
      .scene--polish-demo[data-trial="3"] .region--rear_shelf .region-label,
      .scene--polish-demo[data-trial="3"] .region--front_tools .region-label,
      .scene--polish-demo[data-trial="3"]
        .region--instrument_station
        .region-label {
        opacity: 0.45;
      }
    </style>
  </head>
  <body>
    <div
      class="scene-container scene--bench scene-mode--detail scene--polish-demo"
      data-scene-mode="composition"
      data-trial="1"
    >
      <!-- Region 1: Rear Shelf (empty in zoom view) -->
      <div class="region region--rear_shelf" data-region="rear_shelf">
        <span class="region-label">Rear Shelf</span>
      </div>

      <!-- Region 2: Work Surface (zoomed well plate filling the region) -->
      <div class="region region--work_surface" data-region="work_surface">
        <span class="region-label">Well Plate Detail View</span>

        <!-- Well Plate 96 Zoomed (large zoom-view footprint) -->
        <div
          class="placement"
          data-placement="zoom_well_plate_96"
          data-placement-name="zoom_well_plate_96"
          data-object-name="well_plate_96"
          data-primary="true"
        >
          <div class="object-graphic footprint--zoom-view">
            <img
              src="../../../assets/equipment/96well_pcr_plate.svg"
              alt="Well Plate 96 Detailed View"
            />
          </div>
          <span class="placement-label">96-Well Plate (Zoomed)</span>
        </div>
      </div>

      <!-- Region 3: Front Tools (empty in zoom view) -->
      <div class="region region--front_tools" data-region="front_tools">
        <span class="region-label">Front Tools</span>
      </div>

      <!-- Region 4: Instrument Station (empty in zoom view) -->
      <div
        class="region region--instrument_station"
        data-region="instrument_station"
      >
        <span class="region-label">Instrument Station</span>
      </div>

      <!-- Region 5: Popup Layer (not used in zoom view) -->
      <div class="region region--popup_layer" data-region="popup_layer">
        <!-- Not used in zoom view -->
      </div>
    </div>

    <script>
      // Data export mirrors canonical template so the precheck adapter
      // can identify the primary placement unchanged.
      window.sceneData = {
        sceneName: "well_plate_96_zoom_polish",
        workspace: "bench",
        totalPlacements: 1,
        regions: {
          rear_shelf: 0,
          work_surface: 1,
          front_tools: 0,
          instrument_station: 0,
          popup_layer: 0,
        },
        placements: [
          {
            placement: "zoom_well_plate_96",
            object: "well_plate_96",
            region: "work_surface",
            footprint: "footprint--zoom-view",
          },
        ],
      };
    </script>
  </body>
</html>
