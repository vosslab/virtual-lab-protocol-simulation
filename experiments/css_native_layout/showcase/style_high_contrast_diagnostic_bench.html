<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lane H Style - high_contrast_diagnostic - Bench</title>
    <link rel="stylesheet" href="../styles/bench.css" />
    <link rel="stylesheet" href="./styles/high_contrast_diagnostic.css" />
  </head>
  <body>
    <div class="scene-container scene--bench" data-scene-mode="template">
      <div class="region region--rear_shelf" data-region="rear_shelf">
        <span class="region-label">Rear Shelf</span>
        <div
          class="placement"
          data-placement-name="rear_ddh2o"
          data-object-name="ddh2o_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/ddh2o_bottle_filled.svg"
              alt="ddH2O"
            />
          </div>
          <span class="placement-label">ddH2O</span>
        </div>
        <div
          class="placement"
          data-placement-name="rear_bme"
          data-object-name="bme_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/bme_bottle_filled.svg"
              alt="BME"
            />
          </div>
          <span class="placement-label">BME</span>
        </div>
        <div
          class="placement"
          data-placement-name="rear_destain"
          data-object-name="destain_bottle"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/destain_bottle_filled.svg"
              alt="Destain"
            />
          </div>
          <span class="placement-label">Destain</span>
        </div>
      </div>

      <div class="region region--work_surface" data-region="work_surface">
        <span class="region-label">Work Surface</span>
        <div
          class="placement"
          data-placement-name="center_well_plate"
          data-object-name="well_plate_96"
        >
          <div class="object-graphic footprint--container">
            <img
              src="../../../assets/equipment/96well_pcr_plate.svg"
              alt="Well Plate"
            />
          </div>
          <span class="placement-label">Well Plate 96</span>
        </div>
      </div>

      <div class="region region--front_tools" data-region="front_tools">
        <span class="region-label">Front Tools</span>
        <div
          class="placement"
          data-placement-name="front_p200"
          data-object-name="p200_micropipette"
        >
          <div class="object-graphic footprint--small-tool">
            <img
              src="../../../assets/equipment/p200_micropipette_filled.svg"
              alt="p200"
            />
          </div>
          <span class="placement-label">p200</span>
        </div>
        <div
          class="placement"
          data-placement-name="front_p10"
          data-object-name="p10_micropipette"
        >
          <div class="object-graphic footprint--small-tool">
            <img
              src="../../../assets/equipment/p10_micropipette_filled.svg"
              alt="p10"
            />
          </div>
          <span class="placement-label">p10</span>
        </div>
        <div
          class="placement"
          data-placement-name="front_microtube_rack"
          data-object-name="microtube_rack"
        >
          <div class="object-graphic footprint--rack">
            <img
              src="../../../assets/equipment/microtube_rack_24_placeholder.svg"
              alt="Microtube rack"
            />
          </div>
          <span class="placement-label">Microtube Rack</span>
        </div>
        <div
          class="placement"
          data-placement-name="front_tip_box"
          data-object-name="tip_box"
        >
          <div class="object-graphic footprint--handheld">
            <img
              src="../../../assets/equipment/tip_box_new.svg"
              alt="Tip Box"
            />
          </div>
          <span class="placement-label">Tip Box</span>
        </div>
      </div>

      <div
        class="region region--instrument_station"
        data-region="instrument_station"
      >
        <span class="region-label">Instrument Station</span>
        <div
          class="placement"
          data-placement-name="inst_centrifuge"
          data-object-name="centrifuge"
        >
          <div class="object-graphic footprint--large-equipment">
            <img
              src="../../../assets/equipment/centrifuge_new.svg"
              alt="Centrifuge"
            />
          </div>
          <span class="placement-label">Centrifuge</span>
        </div>
        <div
          class="placement"
          data-placement-name="inst_heat_block"
          data-object-name="heat_block"
        >
          <div class="object-graphic footprint--instrument">
            <img
              src="../../../assets/equipment/heat_block_closed.svg"
              alt="Heat Block"
            />
          </div>
          <span class="placement-label">Heat Block</span>
        </div>
      </div>

      <div class="region region--popup_layer" data-region="popup_layer"></div>
    </div>
  </body>
</html>
