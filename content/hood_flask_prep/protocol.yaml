# intended_entry_scene: cell_culture_hood
# Mini-protocol: Hood setup and flask preparation through trypsinization and spin-down.
# Maps the first seven steps of the monolithic cell_culture protocol.

protocolType: mini_protocol

learning:
  objectives: "Students completing this mini-protocol will have achieved proficiency with aseptic hood technique, media aspiration, PBS washing, enzymatic cell detachment with trypsin, protease neutralization, centrifugation, and resuspension of cell pellets."
  outcomes: "Students completing this mini-protocol will be able to prepare an adherent flask culture through complete media removal, enzymatic dissociation, and resuspension at a known cell concentration."
  goals: "Overall, this mini-protocol aims to accomplish the foundational cell-handling workflow: cleaning the hood, removing spent media, enzymatic passaging with trypsin, and producing a single-cell suspension for downstream counting and seeding."

parts:
  - id: flask_prep_part
    label: "Flask Preparation"
    dayId: day1

days:
  - id: day1
    label: "Day 1"

steps:
  - id: spray_hood
    label: "Spray the hood with 70% ethanol"
    action: "Spray the hood with 70% ethanol"
    why: "Ethanol kills surface contaminants before you begin work, protecting the experiment from infection."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 1
    requiredItems: [ethanol_bottle]
    scene: hood
    errorHints:
      skipped: "Always spray the hood before starting. Contaminants wreck experiments."
    completionPath:
      kind: directTool
      tool: ethanol_bottle
      completionEvent: spray_ethanol
    nextId: aspirate_old_media

  - id: aspirate_old_media
    label: "Aspirate old media from the flask"
    action: "Aspirate old media from the flask"
    why: "Old media contains waste products and dead cells that must be removed before washing."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 2
    requiredItems: [flask, aspirating_pipette, waste_container]
    scene: hood
    errorHints:
      wrong_tool: "Use the aspirating pipette. A serological pipette will splash media."
      missed_waste: "Route waste to the vacuum waste container, not elsewhere."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: aspirating_pipette
          source: flask
          destination: waste_container
          completionEvent: aspirate
    nextId: pbs_wash

  - id: pbs_wash
    label: "Wash the flask with 4 mL PBS"
    action: "Wash the flask with 4 mL PBS"
    why: "PBS rinses off leftover serum that would block trypsin from working effectively."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 3
    requiredItems: [flask, pbs_bottle, serological_pipette]
    scene: hood
    errorHints:
      wrong_reagent: "PBS is the wash buffer. Media will stop trypsin from working."
      volume_off: "Use about 4 mL of PBS so the whole surface is rinsed."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: pbs_bottle
          liquid: pbs
          volumeMl: 4
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: pbs
              volumeMl: 4
              colorKey: pbs
        - tool: serological_pipette
          destination: flask
          liquid: pbs
          consumesVolumeMl: 4
          completionEvent: pbs_wash
    nextId: add_trypsin

  - id: add_trypsin
    label: "Add 3 mL trypsin to detach the cells"
    action: "Add 3 mL trypsin to detach the cells"
    why: "Trypsin breaks the adhesion molecules holding cells to the flask surface, releasing them into suspension."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 4
    requiredItems: [flask, trypsin_bottle, serological_pipette]
    scene: hood
    errorHints:
      volume_off: "Use 3 mL of trypsin. Too much stresses the cells and reduces viability."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: trypsin_bottle
          liquid: trypsin
          volumeMl: 3
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: trypsin
              volumeMl: 3
              colorKey: trypsin
        - tool: serological_pipette
          destination: flask
          liquid: trypsin
          consumesVolumeMl: 3
          completionEvent: pipette_trypsin
    nextId: neutralize_trypsin

  - id: neutralize_trypsin
    label: "Neutralize with 9 mL complete media"
    action: "Neutralize with 9 mL complete media"
    why: "Serum proteins in the media inactivate trypsin, stopping the reaction before it damages cells."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 5
    requiredItems: [flask, media_bottle, serological_pipette]
    scene: hood
    correctVolumeMl: 9
    toleranceMl: 1
    errorHints:
      volume_off: "Use 3 times the trypsin volume (9 mL) so trypsin is fully neutralized."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: media_bottle
          liquid: media
          volumeMl: 9
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: media
              volumeMl: 9
              colorKey: media
        - tool: serological_pipette
          destination: flask
          liquid: media
          consumesVolumeMl: 9
          completionEvent: pipette_media
    nextId: centrifuge

  - id: centrifuge
    label: "Spin cells down in the centrifuge"
    action: "Spin cells down in the centrifuge"
    why: "Centrifugation pulls cells into a compact pellet, allowing you to resuspend them at a known density."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 6
    requiredItems: [centrifuge, conical_15ml_rack]
    scene: bench
    errorHints:
      wrong_tube: "Use a 15 mL conical tube so the cell pellet is easy to see and resuspend."
    completionPath:
      kind: directTool
      tool: centrifuge
      completionEvent: centrifuge
    nextId: resuspend

  - id: resuspend
    label: "Resuspend pellet in 12 mL media"
    action: "Resuspend pellet in 12 mL media"
    why: "A known volume of resuspension medium lets you calculate cells per milliliter for accurate seeding."
    partId: flask_prep_part
    dayId: day1
    stepIndex: 7
    requiredItems: [flask, media_bottle, serological_pipette, waste_container]
    scene: hood
    correctVolumeMl: 12
    toleranceMl: 1
    errorHints:
      volume_off: "Use 12 mL so that 100 uL per well gives the target 2e4 cells per well after counting."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: media_bottle
          liquid: media
          volumeMl: 10
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: media
              volumeMl: 10
              colorKey: media
        - tool: serological_pipette
          destination: flask
          liquid: media
          consumesVolumeMl: 10
          completionEvent: resuspend
    nextId: null
