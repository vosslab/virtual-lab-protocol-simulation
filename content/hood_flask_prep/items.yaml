items:
  # Hood items - tools and pipettes
  ethanol_bottle:
    label: "70% Ethanol spray bottle"
    role: transfer_tool
    asset: ethanol_spray
    scene: hood
    liquidCapable: false

  serological_pipette:
    label: "Serological pipette"
    role: transfer_tool
    asset: sero_pipette
    scene: hood
    liquidCapable: true
    capacityMl: 10
    allowedLiquids: [pbs, trypsin, media]

  aspirating_pipette:
    label: "Aspirating pipette"
    role: aspirate_tool
    asset: aspirating_pipette
    scene: hood
    liquidCapable: true
    capacityMl: 10
    allowedLiquids: [media]

  # Hood items - culture and reagent containers
  flask:
    label: "T-75 Flask"
    role: cell_container
    asset: t75_flask
    scene: hood
    liquidCapable: true
    capacityMl: 20
    allowedLiquids: [pbs, trypsin, media, cells]

  # Hood items - reagent sources (bottles)
  pbs_bottle:
    label: "1x PBS"
    role: reagent_source
    asset: pbs_bottle
    scene: hood
    liquidCapable: true
    capacityMl: 500
    allowedLiquids: [pbs]
    contains: pbs

  trypsin_bottle:
    label: "Trypsin solution"
    role: reagent_source
    asset: trypsin_bottle
    scene: hood
    liquidCapable: true
    capacityMl: 100
    allowedLiquids: [trypsin]
    contains: trypsin

  media_bottle:
    label: "Complete media"
    role: reagent_source
    asset: media_bottle
    scene: hood
    liquidCapable: true
    capacityMl: 500
    allowedLiquids: [media]
    contains: media

  # Hood items - waste and targets
  waste_container:
    label: "Waste container"
    role: waste_target
    asset: waste_container
    scene: hood
    liquidCapable: true
    capacityMl: 1000
    allowedLiquids: [pbs, trypsin, media, cells]

  # Bench items - equipment
  centrifuge:
    label: "Centrifuge"
    role: instrument
    asset: centrifuge
    scene: bench
    liquidCapable: false

  conical_15ml_rack:
    label: "15 mL conical tube rack"
    role: culture_vessel
    asset: conical_rack
    scene: bench
    liquidCapable: true
    capacityMl: 50
    allowedLiquids: [cells]
