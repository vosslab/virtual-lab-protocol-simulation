items:
  # Bench items - instruments used in counting and calculation steps
  cell_counter:
    label: "Cell Counter"
    role: instrument
    asset: cell_counter
    scene: bench

  microscope:
    label: "Microscope"
    role: instrument
    asset: microscope
    scene: bench

  hemocytometer:
    label: "Hemocytometer"
    role: instrument
    asset: hemocytometer
    scene: bench

  # Bench items - containers for dilution and preparation
  dilution_tube_rack:
    label: "1.5 mL Tubes"
    role: decoration
    asset: dilution_tube_rack
    scene: bench

  incubator:
    label: "37C Incubator"
    role: instrument
    asset: incubator
    scene: bench

  # Hood items - culture vessels and pipettes
  serological_pipette:
    label: "Serological pipette"
    role: transfer_tool
    asset: sero_pipette
    scene: hood
    liquidCapable: true
    capacityMl: 10
    allowedLiquids: [media, pbs, trypsin, cells]

  flask:
    label: "T-75 Flask"
    role: cell_container
    asset: t75_flask
    scene: hood
    liquidCapable: true
    capacityMl: 20
    allowedLiquids: [media, trypsin, cells]

  well_plate:
    label: "96-Well Plate"
    role: culture_vessel
    asset: well_plate_96
    scene: hood
    liquidCapable: true
    capacityMl: 1
    allowedLiquids: [media, cells, mtt, dmso, carboplatin, metformin]
