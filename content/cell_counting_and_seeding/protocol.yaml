# intended_entry_scene: bench

protocolType: mini_protocol

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with cell counting on an automated cell counter, hemocytometer-based cell dilution calculations, and accurate seeding of defined cell densities into multi-well culture plates for downstream pharmacological assays."
  outcomes: "Students completing this mini-protocol will be able to count cells using both an automated counter and manual hemocytometer, calculate accurate cell dilution factors to achieve target seeding density, and seed a 96-well plate at exactly 2e4 cells per well for dose-response studies."
  goals: "Overall, this mini-protocol aims to accomplish a foundational workflow in tissue culture: preparing a cell suspension of known density and distributing it evenly across a plate at the density required for the downstream assay, while building competence in quantitative liquid handling and cell biology calculations."

parts:
  - id: part1_count_and_dilute
    label: "Count and Dilute Cells"
    dayId: day1
  - id: part2_seed_and_incubate
    label: "Seed Plate and Incubate"
    dayId: day1

days:
  - id: day1
    label: "Day 1"

steps:
  - id: count_cells
    label: "Count cells on the cell counter"
    action: "Count cells on the cell counter"
    why: "Cell count sets the seed density; wrong count ruins the dose response."
    partId: part1_count_and_dilute
    dayId: day1
    stepIndex: 1
    requiredItems: [cell_counter, dilution_tube_rack, microscope]
    scene: bench
    errorHints:
      low_viability: "Viability under 90% means dead cells dominate. Re-split and retry."
    completionPath:
      kind: modal
      openClick: cell_counter
      advanceClick: capture-count
      completionEvent: count-cells-capture
    nextId: load_hemocytometer

  - id: load_hemocytometer
    label: "Load a cell sample onto the hemocytometer"
    action: "Prepare and load a cell sample onto a hemocytometer slide"
    why: "Manual hemocytometer counting provides an independent verification of the automated count and teaches cell counting fundamentals."
    partId: part1_count_and_dilute
    dayId: day1
    stepIndex: 2
    requiredItems: [microscope, hemocytometer, dilution_tube_rack]
    scene: bench
    errorHints:
      not_loaded: "Load the hemocytometer first before examining under the microscope."
    completionPath:
      kind: modal
      openClick: microscope
      advanceClick: confirm-viability
      completionEvent: hemocytometer-viability-confirmed
    nextId: count_hemocytometer_quadrants

  - id: count_hemocytometer_quadrants
    label: "Count cells in four hemocytometer quadrants"
    action: "Count live cells in each of the four corner quadrants"
    why: "Hemocytometer counting teaches proper cell density calculation and provides a backup count to verify the automated counter result."
    partId: part1_count_and_dilute
    dayId: day1
    stepIndex: 3
    requiredItems: [microscope, hemocytometer, dilution_tube_rack]
    scene: microscope
    errorHints:
      incomplete: "Count cells in all four corner quadrants before submitting."
    completionPath:
      kind: modal
      advanceClick: submit-cell-count
      completionEvent: hemocytometer-count-submitted
    nextId: calculate_dilution

  - id: calculate_dilution
    label: "Calculate the dilution factor"
    action: "Determine the volume of media needed to dilute the cell suspension to 2e4 cells per mL"
    why: "Accurate dilution calculation ensures the plate will be seeded at the target density of 2e4 cells per well."
    partId: part1_count_and_dilute
    dayId: day1
    stepIndex: 4
    requiredItems: [dilution_tube_rack]
    scene: bench
    errorHints:
      calculation_error: "Double-check your math: if you have N cells at concentration C, and need concentration C-target, then V-media = (V-cells) * (C - C-target) / C-target."
    completionPath:
      kind: multipleChoice
      question: "How much sterile water should you add to your cell suspension to dilute to exactly 2e4 cells per mL?"
      choices:
        - text: "Add enough media to the original volume to reach the target concentration"
          isCorrect: false
        - text: "Use the formula V-media = (V-cells) * (C-current - C-target) / C-target, then combine them in a new tube"
          isCorrect: true
        - text: "Simply add 1:1 ratio of media to cells regardless of the count"
          isCorrect: false
      completionEvent: dilution-factor-calculated
    nextId: calculate_seeding_volume

  - id: calculate_seeding_volume
    label: "Calculate the seeding volume per well"
    action: "Determine how many microliters of the diluted cell suspension to pipette into each well"
    why: "Each well must receive exactly 100 uL of the diluted suspension to achieve 2e4 cells per well across the plate."
    partId: part1_count_and_dilute
    dayId: day1
    stepIndex: 5
    requiredItems: [well_plate, serological_pipette]
    scene: bench
    errorHints:
      volume_error: "Each well of a 96-well plate should receive 100 uL of the 2e4 cells/mL suspension."
    completionPath:
      kind: multipleChoice
      question: "You have a diluted cell suspension at 2e4 cells per mL. How many microliters should you pipette into each well?"
      choices:
        - text: "50 uL per well"
          isCorrect: false
        - text: "100 uL per well"
          isCorrect: true
        - text: "200 uL per well"
          isCorrect: false
      completionEvent: seeding-volume-calculated
    nextId: seed_plate

  - id: seed_plate
    label: "Seed 100 uL cell suspension per well"
    action: "Seed 100 uL cell suspension per well"
    why: "Seeds the 96-well plate at 2e4 cells per well for dosing tomorrow."
    partId: part2_seed_and_incubate
    dayId: day1
    stepIndex: 1
    requiredItems: [well_plate, serological_pipette, flask]
    scene: hood
    errorHints:
      wrong_volume: "Seed 100 uL per well. Less means sparse wells and noisy readings."
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: serological_pipette
          source: flask
          liquid: cells
          volumeMl: 10
          stateChange:
            heldLiquid:
              tool: serological_pipette
              liquid: cells
              volumeMl: 10
              colorKey: cells
        - tool: serological_pipette
          liquid: cells
          destination: well_plate
          completionEvent: pipette_to_plate
          consumesVolumeMl: 10
    nextId: incubate_day1

  - id: incubate_day1
    label: "Place plate in the 37C incubator overnight"
    action: "Place plate in the 37C incubator overnight"
    why: "Cells need ~24 h to attach and recover before drug dosing."
    partId: part2_seed_and_incubate
    dayId: day1
    stepIndex: 2
    requiredItems: [incubator, well_plate]
    scene: bench
    isIncubation: true
    errorHints:
      skipped: "The plate must incubate overnight before treatment."
    completionPath:
      kind: directTool
      tool: incubator
      completionEvent: place_in_incubator
    nextId: null
