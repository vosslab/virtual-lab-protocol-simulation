items:
  well_plate:
    label: "96-Well plate"
    role: culture_vessel
    asset: well_plate_96
    scene: hood
    liquidCapable: true
    capacityMl: 0.400
    allowedLiquids: [mtt, dmso]

  multichannel_pipette:
    label: "Multichannel pipette"
    role: transfer_tool
    asset: multichannel_pipette
    scene: hood
    liquidCapable: true
    capacityMl: 0.200
    allowedLiquids: [mtt, dmso]

  mtt_vial:
    label: "MTT reagent vial"
    role: reagent_source
    asset: mtt_vial
    scene: hood
    liquidCapable: true
    capacityMl: 10
    allowedLiquids: [mtt]
    contains: mtt

  dmso_bottle:
    label: "DMSO bottle"
    role: reagent_source
    asset: dmso_bottle
    scene: hood
    liquidCapable: true
    capacityMl: 50
    allowedLiquids: [dmso]
    contains: dmso

  biohazard_decant:
    label: "Biohazard waste bin"
    role: waste_target
    asset: biohazard_decant
    scene: hood

  incubator:
    label: "Incubator"
    role: instrument
    asset: incubator
    scene: bench

  plate_reader:
    label: "Plate reader"
    role: instrument
    asset: plate_reader
    scene: bench
