
protocolType: mini_protocol

entry:
  scene: cell_culture_hood
  step: add_mtt

learning:
  objectives: Students completing this mini-protocol will have achieved fluency with the MTT viability assay, from reagent addition through data interpretation and safe waste handling.
  outcomes: Students completing this mini-protocol will be able to perform a complete MTT assay readout, including reagent addition, incubation, safe waste disposal, solubilization, and absorbance measurement at 560 nm.
  goals: Overall, this mini-protocol aims to accomplish teaching the full MTT viability assay workflow as a self-contained practical that bridges cell culture technique to quantitative viability assessment.

parts:
  - id: part1_mtt_incubation
    label: "Part 1: MTT addition and incubation"
    dayId: day1
  - id: part2_mtt_readout
    label: "Part 2: Solubilization and plate reading"
    dayId: day1

days:
  - id: day1
    label: "Day 1"

steps:
  - id: add_mtt
    label: "Add 25 uL 12 mM MTT per well"
    action: "Add 25 uL 12 mM MTT per well"
    why: "MTT is reduced to formazan only by live cells; the color shows viability."
    partId: part1_mtt_incubation
    dayId: day1
    stepIndex: 1
    scene: cell_culture_hood
    requiredItems: [well_plate, multichannel_pipette, mtt_vial]
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: multichannel_pipette
          source: mtt_vial
          liquid: mtt
          volumeMl: 0.025
          stateChange:
            heldLiquid:
              tool: multichannel_pipette
              liquid: mtt
              volumeMl: 0.025
              colorKey: mtt
        - tool: multichannel_pipette
          destination: well_plate
          liquid: mtt
          consumesVolumeMl: 0.025
          completionEvent: add_mtt
    errorHints:
      wrong_volume: "Add 25 uL MTT for a 1.5 mM final concentration."
    nextId: incubate_mtt

  - id: incubate_mtt
    label: "Incubate 1.5 h at 37C"
    action: "Incubate 1.5 h at 37C"
    why: "Live cells need time to convert MTT into purple formazan crystals."
    partId: part1_mtt_incubation
    dayId: day1
    stepIndex: 2
    scene: bench
    requiredItems: [incubator, well_plate]
    isIncubation: true
    completionPath:
      kind: directTool
      tool: incubator
      completionEvent: place_in_incubator_mtt
    errorHints:
      skipped: "The MTT must incubate 1.5 h or the signal is too weak."
    nextId: decant_mtt

  - id: decant_mtt
    label: "Remove spent MTT with multichannel pipette"
    action: "Remove spent MTT into the biohazard bin"
    why: "MTT is toxic. Safe removal with a pipette prevents spills and proper waste containment."
    partId: part1_mtt_incubation
    dayId: day1
    stepIndex: 3
    scene: cell_culture_hood
    requiredItems: [well_plate, multichannel_pipette, biohazard_decant]
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: multichannel_pipette
          source: well_plate
          liquid: mtt
          volumeMl: 0.025
          stateChange:
            heldLiquid:
              tool: multichannel_pipette
              liquid: mtt
              volumeMl: 0.025
              colorKey: mtt
        - tool: multichannel_pipette
          destination: biohazard_decant
          liquid: mtt
          consumesVolumeMl: 0.025
          completionEvent: decant_mtt
    errorHints:
      wrong_waste: "Use the multichannel pipette to safely remove MTT into the biohazard bin."
    nextId: add_dmso

  - id: add_dmso
    label: "Add 200 uL DMSO per well and mix"
    action: "Add 200 uL DMSO per well and mix"
    why: "DMSO dissolves formazan so the plate reader can measure absorbance."
    partId: part2_mtt_readout
    dayId: day1
    stepIndex: 1
    scene: cell_culture_hood
    requiredItems: [well_plate, multichannel_pipette, dmso_bottle]
    completionPath:
      kind: interactionSequence
      interactions:
        - tool: multichannel_pipette
          source: dmso_bottle
          liquid: dmso
          volumeMl: 0.200
          stateChange:
            heldLiquid:
              tool: multichannel_pipette
              liquid: dmso
              volumeMl: 0.200
              colorKey: dmso
        - tool: multichannel_pipette
          destination: well_plate
          liquid: dmso
          consumesVolumeMl: 0.200
          completionEvent: add_dmso
    errorHints:
      wrong_volume: "Add 200 uL DMSO per well and pipette up and down 10 times."
    nextId: plate_read

  - id: plate_read
    label: "Read absorbance at 560 nm"
    action: "Read absorbance at 560 nm"
    why: "Formazan absorbs at 560 nm; more signal means more live cells."
    partId: part2_mtt_readout
    dayId: day1
    stepIndex: 2
    scene: bench
    requiredItems: [well_plate, plate_reader]
    completionPath:
      kind: modal
      openClick: plate_reader
      advanceClick: complete-plate-read
      completionEvent: plate-read-complete
    errorHints:
      wrong_wavelength: "Read at 560 nm. Other wavelengths miss the formazan peak."
    nextId: review_results

  - id: review_results
    label: "Interpret viability data"
    action: "Review and interpret the absorbance data"
    why: "Comparing absorbance values across wells reveals which conditions impact cell viability."
    partId: part2_mtt_readout
    dayId: day1
    stepIndex: 3
    scene: bench
    requiredItems: [plate_reader]
    completionPath:
      kind: multipleChoice
      question: "If untreated cells show an absorbance of 0.8 and drug-treated cells show 0.3, what does this suggest?"
      choices:
        - id: choice_reduced_viability
          text: "The drug reduces cell viability"
          feedback: "Correct! The lower absorbance in drug-treated cells (0.3 vs 0.8) indicates fewer live cells, since higher MTT conversion correlates with more viable cells. The drug is toxic or growth-inhibitory."
          correct: true
        - id: choice_higher_viability
          text: "The drug increases cell viability"
          feedback: "Incorrect. The untreated cells have higher absorbance (0.8), meaning more live cells and more MTT conversion. The drug-treated cells show lower absorbance (0.3), indicating the drug reduces viability."
        - id: choice_no_difference
          text: "There is no difference in viability"
          feedback: "Incorrect. The 0.5 absorbance unit difference (0.8 vs 0.3) is significant and indicates a substantial reduction in cell viability in the drug-treated wells compared to untreated controls."
      completionEvent: results_interpreted
    errorHints:
      wrong_answer: "Review the data: lower absorbance (0.3) means fewer viable cells, indicating the drug reduced viability."
    nextId: null
