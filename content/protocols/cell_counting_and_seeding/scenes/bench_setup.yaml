scene_name: cell_counting_and_seeding_bench_setup
extends: bench_basic

add_placements:
  - placement_name: rear_left_conical_15ml
    object_name: conical_15ml
    zone: rear_left
    depth_tier: 1
  - placement_name: rear_center_hemocytometer
    object_name: hemocytometer
    zone: rear_center
    depth_tier: 1
  - placement_name: rear_right_microscope
    object_name: microscope
    zone: rear_right
    depth_tier: 1
  - placement_name: center_well_plate
    object_name: well_plate_96
    zone: center
    depth_tier: 1
    align_stop: center
  - placement_name: right_tool_micropipette
    object_name: micropipette
    zone: right_tool_area
    depth_tier: 1
  - placement_name: right_tool_serological_pipette
    object_name: serological_pipette
    zone: right_tool_area
    depth_tier: 2
  - placement_name: center_aspirating_pipette
    object_name: aspirating_pipette
    zone: center
    depth_tier: 2
  - placement_name: rear_left_centrifuge
    object_name: centrifuge
    zone: rear_left
    depth_tier: 2
  - placement_name: rear_right_media_bottle
    object_name: media_bottle
    zone: rear_right
    depth_tier: 2

scene_notes: |
  Bench-side scene for cell_counting_and_seeding. Centrifuge, hemocytometer,
  microscope, and the seeding well plate share one bench surface. Centrifuge
  is conventionally adjacent to the bench in the lab, so it lives in the
  rear left zone here rather than its own workspace until traffic requires
  a dedicated centrifuge scene.
