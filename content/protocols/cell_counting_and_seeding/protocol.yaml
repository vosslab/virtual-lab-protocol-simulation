protocol_type: mini_protocol
protocol_name: cell_counting_and_seeding
entry_step: transfer_suspension_to_conical

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with cell suspension handling, centrifugation, hemocytometer counting, and targeted seeding density calculation."
  outcomes: "Students completing this mini-protocol will be able to count cells on a hemocytometer, calculate seeding density, and seed a 96-well plate to a target cell concentration."
  goals: "Overall, this mini-protocol aims to accomplish teaching the critical post-detachment workflow: centrifugation to pellet cells, resuspension in fresh media, accurate cell counting via hemocytometer, and precision seeding at a specified density."

steps:
  - step_name: transfer_suspension_to_conical
    prompt: "Transfer the neutralized cell suspension from the flask to a 15 mL conical tube."
    why: "Transferring to a conical tube prepares the cell suspension for centrifugation."
    sequence:
      - target: serological_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: serological_pipette
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_contents_name: cell_suspension
                held_contents_volume: 4
          feedback:
            correct: "Cell suspension drawn."
            incorrect: "Draw the cell suspension from the flask."
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_15ml
              state:
                contents_name: cell_suspension
                contents_volume: 4
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
          feedback:
            correct: "Cell suspension transferred to conical."
            incorrect: "Dispense into the conical tube."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: adjust_centrifuge

  - step_name: adjust_centrifuge
    prompt: "Set the centrifuge to 300g for 5 minutes (approximately 1200 rpm)."
    why: "A brief centrifugation at 300g pellets cells without damaging them."
    sequence:
      - target: centrifuge
        gesture: adjust
        validator: { preset: target_with_value, value: { set_rpm: 1200 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: centrifuge
              state:
                set_rpm: 1200
          feedback:
            correct: "RPM set to 1200."
            incorrect: "Set the centrifuge speed."
      - target: centrifuge
        gesture: adjust
        validator: { preset: target_with_value, value: { set_time_min: 5 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: centrifuge
              state:
                set_time_min: 5
          feedback:
            correct: "Time set to 5 minutes."
            incorrect: "Set the centrifuge timer."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: start_centrifuge

  - step_name: start_centrifuge
    prompt: "Place the conical in the centrifuge and start the run."
    why: "Starting the centrifuge begins the cell pelleting process."
    sequence:
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: conical_15ml
              operation: attach
      - target: centrifuge
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: conical_15ml
              operation: detach
            - type: ObjectStateChange
              target: centrifuge
              state:
                running: true
            - type: TimedWait
              target: centrifuge
              duration_min: 5
              display: "Centrifuging"
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: retrieve_conical

  - step_name: retrieve_conical
    prompt: "Open the centrifuge and retrieve the conical tube containing the pelleted cells."
    why: "After centrifugation, the cells settle as a pellet at the bottom of the tube."
    sequence:
      - target: centrifuge
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: centrifuge
              state:
                running: false
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: conical_15ml
              operation: attach
          feedback:
            correct: "Conical tube retrieved."
            incorrect: "Retrieve the conical from the centrifuge."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: aspirate_supernatant

  - step_name: aspirate_supernatant
    prompt: "Aspirate the supernatant (media layer above the cell pellet) into the waste container."
    why: "Removing the supernatant leaves only the concentrated cell pellet for resuspension."
    sequence:
      - target: aspirating_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: aspirating_pipette
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_15ml
              state:
                contents_name: cell_pellet
                contents_volume: 0.1
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_contents_name: media
                held_contents_volume: 3.9
          feedback:
            correct: "Supernatant aspirated."
            incorrect: "Aspirate the media from above the cell pellet."
      - target: waste_container
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: waste_container
              state:
                contents_name: mixed
                contents_volume: 3.9
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: resuspend_pellet

  - step_name: resuspend_pellet
    prompt: "Resuspend the cell pellet in 1 mL of fresh complete media."
    why: "Gentle resuspension in fresh media lifts the cells off the tube bottom and redistributes them evenly for counting and seeding."
    sequence:
      - target: media_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: media_bottle
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: media_bottle
              state:
                contents_volume: 499
            - type: ObjectStateChange
              target: conical_15ml
              state:
                contents_name: cell_suspension
                contents_volume: 1
          feedback:
            correct: "Media added and cells resuspended."
            incorrect: "Add fresh media to resuspend the cell pellet."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_hemocytometer

  - step_name: prepare_hemocytometer
    prompt: "Place a small aliquot of cell suspension on the hemocytometer slide and position it under the microscope."
    why: "The hemocytometer chamber allows direct visual counting of cells in a known volume."
    sequence:
      - target: micropipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: micropipette
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: cell_suspension
                held_contents_volume: 0.01
          feedback:
            correct: "Aliquot drawn."
            incorrect: "Draw a small aliquot of cell suspension."
      - target: hemocytometer
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: hemocytometer
              state:
                contents_name: cell_suspension
                contents_volume: 0.01
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
      - target: microscope
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: microscope
              state:
                light_on: true
                objective: high_power
          feedback:
            correct: "Microscope focused on hemocytometer."
            incorrect: "Click the microscope to focus on the hemocytometer grid."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: count_cells

  - step_name: count_cells
    prompt: "Count the cells in all four quadrants of the hemocytometer and enter the count for each quadrant."
    why: "Counting multiple quadrants provides an accurate average cell concentration and detects uneven distribution."
    sequence:
      - target: hemocytometer
        gesture: type
        validator: { preset: target_with_value, value: { count_quadrant_a: 50 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: hemocytometer
              state:
                count_quadrant_a: 50
          feedback:
            correct: "Quadrant A counted."
            incorrect: "Enter the count for quadrant A."
      - target: hemocytometer
        gesture: type
        validator: { preset: target_with_value, value: { count_quadrant_b: 48 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: hemocytometer
              state:
                count_quadrant_b: 48
          feedback:
            correct: "Quadrant B counted."
            incorrect: "Enter the count for quadrant B."
      - target: hemocytometer
        gesture: type
        validator: { preset: target_with_value, value: { count_quadrant_c: 52 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: hemocytometer
              state:
                count_quadrant_c: 52
          feedback:
            correct: "Quadrant C counted."
            incorrect: "Enter the count for quadrant C."
      - target: hemocytometer
        gesture: type
        validator: { preset: target_with_value, value: { count_quadrant_d: 50 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: hemocytometer
              state:
                count_quadrant_d: 50
          feedback:
            correct: "Quadrant D counted."
            incorrect: "Enter the count for quadrant D."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: seed_plate

  - step_name: seed_plate
    prompt: "Seed the first three wells in row A to verify your dispensing technique."
    why: "Accurate seeding ensures consistent cell density across the plate and reproducible assay results."
    sequence:
      - target: micropipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: micropipette
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: cell_suspension
                held_contents_volume: 0.05
          feedback:
            correct: "Seeding volume drawn."
            incorrect: "Draw the calculated seeding volume."
      - target: well_plate_96.A1
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.A1
              state:
                contents_name: cell_suspension
                contents_volume: 50
      - target: well_plate_96.A2
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.A2
              state:
                contents_name: cell_suspension
                contents_volume: 50
      - target: well_plate_96.A3
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.A3
              state:
                contents_name: cell_suspension
                contents_volume: 50
    step_validator: { preset: final_state_matches, target: well_plate_96.A3, contains: { contents_name: cell_suspension, contents_volume: 50 } }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
