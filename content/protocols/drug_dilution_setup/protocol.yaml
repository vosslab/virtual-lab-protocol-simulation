protocol_type: mini_protocol
protocol_name: drug_dilution_setup
entry_step: prep_workspace

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with serial dilution of stock solutions into working concentrations, micropipette volume adjustment, and the math-to-practice connection between molar concentrations and physical volumes."
  outcomes: "Students completing this mini-protocol will be able to prepare carboplatin and metformin working stocks for plate drug treatment using serial dilution and micropipette adjustment."
  goals: "Overall, this mini-protocol aims to accomplish teaching the critical skill of preparing drug working stocks that feed the plate treatment protocol."

steps:
  - step_name: prep_workspace
    prompt: "Gather supplies and prepare your workspace for drug preparation."
    why: "Organization and asepsis prevent contamination and lost materials during precise dilution work."
    sequence:
      - target: micropipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: micropipette
              operation: attach
      - target: micropipette_tip_box
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
          feedback:
            correct: "Micropipette loaded with tips."
            incorrect: "Gather your micropipette and tips."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: set_micropipette_volume_intermediate

  - step_name: set_micropipette_volume_intermediate
    prompt: "Set the micropipette to 40 microliters to prepare the carboplatin intermediate dilution."
    why: "Precise volume adjustment teaches the skill of reading and setting micropipette scales, a core lab competency."
    sequence:
      - target: micropipette
        gesture: adjust
        validator: { preset: target_with_value, value: { set_volume: 40 } }
        response:
          scene_operations: []
          feedback:
            correct: "Micropipette set to 40 microliters."
            incorrect: "Adjust the micropipette volume dial to 40 microliters."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: draw_carboplatin_stock

  - step_name: draw_carboplatin_stock
    prompt: "Draw 40 microliters of 10 mM carboplatin stock solution into the micropipette."
    why: "Drawing the correct volume from the parent stock is the first move in serial dilution."
    sequence:
      - target: carboplatin_stock_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: carboplatin_stock_bottle
              state:
                contents_volume: 9960
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: carboplatin_10mmol
                held_contents_volume: 40
          feedback:
            correct: "Carboplatin stock drawn."
            incorrect: "Draw from the carboplatin stock bottle."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: dispense_into_intermediate

  - step_name: dispense_into_intermediate
    prompt: "Dispense the carboplatin into the 15 mL tube to start the 400 micromolar intermediate dilution."
    why: "This intermediate allows safe handling of a diluted reagent for the series that follows."
    sequence:
      - target: microtube_15ml_intermediate
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
            - type: ObjectStateChange
              target: microtube_15ml_intermediate
              state:
                contents_name: carboplatin_400umol
                contents_volume: 40
          feedback:
            correct: "Carboplatin dispensed into intermediate tube."
            incorrect: "Dispense into the 15 mL intermediate tube."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: top_up_intermediate_water

  - step_name: top_up_intermediate_water
    prompt: "Top up the intermediate tube with sterile water to reach 10 mL total, creating the 400 micromolar dilution."
    why: "The math of dilution connects concentration to volume: 40 &micro;L of 10 mM into 10 mL total yields 400 &micro;M."
    sequence:
      - target: sterile_water_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: sterile_water_bottle
              state:
                contents_volume: 9960
            - type: ObjectStateChange
              target: microtube_15ml_intermediate
              state:
                contents_volume: 10000
          feedback:
            correct: "Intermediate diluted to 400 micromolar."
            incorrect: "Top up the intermediate tube with sterile water."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: vortex_intermediate

  - step_name: vortex_intermediate
    prompt: "Vortex the intermediate tube to mix the dilution thoroughly."
    why: "Mixing ensures even distribution of the diluted reagent before it is used as a source for the working series."
    sequence:
      - target: vortex
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: vortex
              state:
                running: true
            - type: TimedWait
              target: vortex
              duration_min: 5
              display: "mixing"
            - type: ObjectStateChange
              target: vortex
              state:
                running: false
          feedback:
            correct: "Intermediate mixed and ready."
            incorrect: "Vortex the intermediate tube."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_metformin_working_stock

  - step_name: prepare_metformin_working_stock
    prompt: "Prepare a 10 mM metformin working stock by drawing 10 microliters of 1 M metformin stock and adding to a tube with 990 microliters of media."
    why: "Metformin requires a single dilution step (1 M to 10 mM) to reach its working concentration for the plate assay."
    sequence:
      - target: micropipette
        gesture: adjust
        validator: { preset: target_with_value, value: { set_volume: 10 } }
        response:
          scene_operations: []
          feedback:
            correct: "Micropipette set to 10 microliters."
            incorrect: "Adjust the micropipette to 10 microliters."
      - target: metformin_stock_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: metformin_stock_bottle
              state:
                contents_volume: 9990
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: metformin_1mol
                held_contents_volume: 10
          feedback:
            correct: "Metformin stock drawn."
            incorrect: "Draw from the 1 M metformin stock bottle."
      - target: metformin_working_tube
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
            - type: ObjectStateChange
              target: metformin_working_tube
              state:
                contents_name: metformin_10mmol
                contents_volume: 1000
          feedback:
            correct: "Metformin working stock prepared."
            incorrect: "Dispense into the metformin working tube."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: vortex_metformin

  - step_name: vortex_metformin
    prompt: "Vortex the metformin working stock to ensure uniform mixing."
    why: "Complete mixing guarantees consistent dosing in the plate treatment step."
    sequence:
      - target: vortex
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: vortex
              state:
                running: true
            - type: TimedWait
              target: vortex
              duration_min: 5
              display: "mixing"
            - type: ObjectStateChange
              target: vortex
              state:
                running: false
          feedback:
            correct: "Metformin working stock mixed and ready."
            incorrect: "Vortex the metformin working stock."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
