protocol_type: mini_protocol
protocol_name: drug_dilution_setup
entry_step: prepare_carb_intermediate

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with multi-step parallel C1V1 = C2V2 dilution calculations, independent working-stock preparation from a master stock, and quality-assurance validation of working-stock volumes."
  outcomes: "Students completing this mini-protocol will be able to prepare carboplatin working stocks across an 8-dose series from a single intermediate, prepare a fixed-concentration metformin working stock independently, and verify that sufficient metformin volume is available for the full treatment experiment."
  goals: "Overall, this mini-protocol aims to accomplish the working-stock preparation phase for a two-drug dose-response experiment: carboplatin as a variable dose series and metformin as a fixed modifier. This step bridges the raw master stocks (10 mM carboplatin, 1 M metformin) to the treatment-ready working stocks that will be added to plate wells on Day 2. Each carboplatin working stock (400 nM through 2 mM) is prepared as its own pedagogical step, following one-stock-per-step architecture; metformin is a fixed working stock with its own step; volume verification closes the mini-protocol."

steps:
  # Carboplatin intermediate preparation (A47)
  - step_name: prepare_carb_intermediate
    prompt: "Prepare the carboplatin 200 uM intermediate stock from the 10 mM master stock. Calculate the volume needed using C1V1 = C2V2: 10 mM x V1 = 200 uM x 1000 uL, so V1 = 20 uL. Aspirate 20 uL from the master stock and dispense into the intermediate tube, then add 980 uL of sterile water to reach 1 mL total, and vortex."
    sequence:
      - target: micropipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: micropipette
        gesture: adjust
        validator: { preset: target_with_value, value: { set_volume: 20 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 20
      - target: carboplatin_stock_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: microtube_15ml_intermediate
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: microtube_15ml_intermediate
              state:
                material_name: carboplatin
                material_volume: 0.02
      - target: micropipette
        gesture: adjust
        validator: { preset: target_with_value, value: { set_volume: 980 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 980
      - target: sterile_water_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: microtube_15ml_intermediate
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: microtube_15ml_intermediate
              state:
                material_volume: 1.0
      - target: vortex
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: microtube_15ml_intermediate
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: TimedWait
              target: vortex
              duration_min: 0.05
              display: "vortexing"
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_carb_working_stocks

