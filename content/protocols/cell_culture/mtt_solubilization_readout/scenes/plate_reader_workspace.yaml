scene_name: mtt_solubilization_readout_plate_reader_workspace
extends: bench_basic

scene_notes: |
  Plate reader workspace for MTT solubilization absorbance readout. The plate
  reader instrument is the primary object at center. The treated 96-well plate
  (well_plate_96, inherited from bench_basic at center_well_plate_96) is
  already present; protocols target well_plate_96.all_wells to insert the plate.

remove_placements:
  - center_water_bath
  - center_centrifuge
  - rear_left_media_bottle
  - rear_center_ethanol
  - rear_right_heat_block

add_placements:
  # well_plate_96 is now placed in the inherited bench_basic center band (single
  # plate); the former microtube_rack_24 proxy (rear_center_treated_plate) was
  # removed here. Protocols target well_plate_96.all_wells against the inherited
  # center_well_plate_96 placement.

  # Plate reader instrument at center -- the main instrument for readout
  - placement_name: center_plate_reader
    object_name: plate_reader
    zone: center
    depth_tier: 1
    align_stop: center
