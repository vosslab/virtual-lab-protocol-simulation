scene_name: mtt_solubilization_readout_bench_workspace
extends: bench_basic

scene_notes: |
  Bench workspace for MTT solubilization. DMSO bottle at rear left for adding
  to wells to dissolve formazan crystals. The 96-well treatment plate (inherited
  well_plate_96 from bench_basic) is at center. Micropipette from base for
  adding and triaturating DMSO.

remove_placements:
  - rear_left_media_bottle
  - rear_center_ethanol
  - center_centrifuge
  - rear_right_heat_block

add_placements:
  # DMSO bottle at rear left beside waste container
  - placement_name: rear_left_dmso
    object_name: dmso_bottle
    zone: rear_left
    depth_tier: 1
    align_stop: right

  # well_plate_96 is now placed in the inherited bench_basic center band (single
  # plate); the former microtube_rack_24 placeholder was removed here.
