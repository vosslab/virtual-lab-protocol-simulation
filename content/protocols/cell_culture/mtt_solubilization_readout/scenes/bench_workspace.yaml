scene_name: mtt_solubilization_readout_bench_workspace
extends: bench_basic

scene_notes: |
  Bench workspace for MTT solubilization. DMSO bottle at rear left for adding
  to wells to dissolve formazan crystals. The 96-well treatment plate (using
  microtube_rack_24 as placeholder) is at center. Micropipette from base for
  adding and triaturating DMSO.

remove_placements:
  - rear_left_media_bottle
  - rear_center_ethanol
  - center_rocking_shaker
  - rear_right_heat_block

add_placements:
  # DMSO bottle at rear left beside waste container
  - placement_name: rear_left_dmso
    object_name: dmso_bottle
    zone: rear_left
    depth_tier: 1
    align_stop: right

  # Treatment plate (96-well placeholder) at center -- main work object
  # well_plate_96 object pending; microtube_rack_24 as layout placeholder
  - placement_name: center_treatment_plate
    object_name: microtube_rack_24
    zone: center
    depth_tier: 1
    align_stop: left
