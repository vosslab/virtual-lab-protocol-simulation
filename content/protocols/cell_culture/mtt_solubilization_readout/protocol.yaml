protocol_type: mini_protocol
protocol_name: mtt_solubilization_readout
entry_step: add_dmso_to_wells
learning:
  objectives:
    Students completing this mini-protocol will have achieved fluency with
    dissolving precipitated colorimetric assay products using organic solvent, trituration
    technique for complete dissolution, and wavelength selection and optical absorbance
    measurement on a multi-well plate reader.
  outcomes:
    Students completing this mini-protocol will be able to add DMSO to individual
    wells of a 96-well plate containing formazan, perform manual trituration to dissolve
    precipitated formazan, and measure absorbance at 560 nm on a plate reader, recording
    the optical density for downstream IC50 calculations.
  goals:
    "Overall, this mini-protocol aims to accomplish the final quantification
    step in an MTT viability assay: converting the precipitated, insoluble formazan
    product into a colored solution amenable to spectrophotometric measurement. This
    step bridges the incubated, MTT-treated plate to absorbance readout values that
    indicate cell viability across the dose-response series."
steps:
  - step_name: add_dmso_to_wells
    prompt:
      "Add 200 microL of DMSO uniformly to every well of the treated plate using
      the multichannel pipette. Adjust the pipette to 200 microL per channel, draw DMSO
      from the solvent bottle, and dispense across all 96 wells. In wet-lab practice
      the 8-channel pipette walks across the 12 columns, but the action is uniform:
      each well receives the same 200 microL volume. DMSO dissolves the precipitated
      formazan crystals so absorbance can be read."
    sequence:
      - target: micropipette
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: SceneChange
              to_scene: mtt_solubilization_readout_bench_workspace
      - target: micropipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 200
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 200
      - target: dmso_bottle
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: well_plate_96
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.all_wells
              state:
                material_name: formazan_dmso_solution
                material_volume: 0.2
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: trituration_to_dissolve
  - step_name: trituration_to_dissolve
    prompt:
      Perform trituration to fully dissolve the formazan precipitate. Using the
      multichannel pipette, pipette up and down approximately 10 times per well across
      the whole plate. Mechanical mixing ensures complete dissolution of the yellow
      formazan product.
    sequence:
      - target: micropipette
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: well_plate_96
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.all_wells
              state:
                material_volume: 0.2
              transition: animated
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: read_absorbance
  - step_name: read_absorbance
    prompt:
      Move to the plate reader workspace and measure absorbance. Access the plate
      reader, set the wavelength to 560 nm, insert the treated plate, and take the measurement.
      The optical density readings at 560 nm indicate the extent of formazan formation
      across the dose-response series.
    sequence:
      - target: plate_reader
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: SceneChange
              to_scene: mtt_solubilization_readout_plate_reader_workspace
      - target: plate_reader
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            wavelength_nm: 560
        response:
          scene_operations:
            - type: ObjectStateChange
              target: plate_reader
              state:
                wavelength_nm: 560
      - target: well_plate_96
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: plate_reader
              state:
                reading: true
      - target: plate_reader
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: plate_reader
              state:
                reading: false
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
