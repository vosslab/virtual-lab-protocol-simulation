scene_name: mtt_reagent_prep_bench_workspace
extends: bench_basic

scene_notes: |
  Bench workspace for MTT reagent preparation. MTT powder container at rear left,
  PBS bottle at rear center (additional from base), MTT solution tube in center
  for mixing. Vortex from base used for vortex mixing to dissolve MTT powder.

remove_placements:
  - rear_left_media_bottle
  - rear_center_ethanol
  - center_centrifuge
  - rear_right_heat_block

add_placements:
  # MTT powder container at rear left (right stop beside waste)
  - placement_name: rear_left_mtt_powder
    object_name: mtt_powder_container
    zone: rear_left
    depth_tier: 2
    align_stop: right

  # Additional PBS bottle at rear center for dissolving MTT
  - placement_name: rear_center_pbs_bottle
    object_name: pbs_bottle
    zone: rear_center
    depth_tier: 2
    align_stop: right

  # MTT solution tube at center -- the working vessel for mixing
  - placement_name: center_mtt_solution_tube
    object_name: mtt_solution_tube
    zone: center
    depth_tier: 1
    align_stop: center
