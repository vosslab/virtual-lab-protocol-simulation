scene_name: centrifuge_workspace
extends: bench_basic

scene_notes: |
  Centrifuge workspace for pellet reseed step. Centrifuge is the primary instrument
  at center (left stop). Conical 15 mL rack at rear center holds pellet tubes.
  Conical 15 mL tube at rear left is the active tube. T75 flask at center right
  for cell reseed after centrifugation. Label pen and aspirating pipette at right
  tool area.

remove_placements:
  - center_water_bath
  - center_centrifuge
  - rear_left_media_bottle
  - rear_center_pbs
  - rear_center_ethanol
  - rear_right_heat_block
  # Inherited 96-well plate is never targeted in the centrifuge scene; remove so
  # the center band holds the centrifuge and reseed vessels, not an idle plate.
  - center_well_plate_96

add_placements:
  # Conical tube at rear left -- the pellet tube about to be centrifuged
  - placement_name: rear_left_conical_tube
    object_name: conical_15ml
    zone: rear_left
    depth_tier: 1
    align_stop: right

  # Conical rack at rear center -- holds extra tubes
  - placement_name: rear_center_conical_rack
    object_name: conical_15ml_rack
    zone: rear_center
    depth_tier: 1
    align_stop: center

  # Centrifuge at center (left stop) -- main instrument for spinning pellets
  - placement_name: center_centrifuge_spin
    object_name: centrifuge
    zone: center
    depth_tier: 2
    align_stop: left

  # Media bottle at rear left -- the reseed medium the protocol clicks
  # (media_bottle target) after decanting. Was a target_missing gap.
  - placement_name: rear_left_media_bottle_reseed
    object_name: media_bottle
    zone: rear_left
    depth_tier: 1
    align_stop: center

  # Biohazard decant container at rear right -- the waste vessel the protocol
  # clicks (biohazard_decant target) when pouring off supernatant. Was missing.
  - placement_name: rear_right_biohazard_decant
    object_name: biohazard_decant
    zone: rear_right
    depth_tier: 1
    align_stop: right

  # Aspirating pipette at right tool area
  - placement_name: right_aspirating_pipette
    object_name: aspirating_pipette
    zone: right_tool_area
    depth_tier: 1
    align_stop: center

  # Label pen at right tool area
  - placement_name: right_label_pen
    object_name: label_pen
    zone: right_tool_area
    depth_tier: 2
    align_stop: right

  # Rear right: PBS rinse bottle staged for the reseed step
  - placement_name: rear_right_pbs
    object_name: pbs_bottle
    zone: rear_right
    depth_tier: 1
    align_stop: left
