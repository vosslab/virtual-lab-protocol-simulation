# Simulation design: multi-well dispensing is authored as individual well interactions
# (validation granularity). In wet-lab practice a multichannel pipette covers one column
# per aspirate; a repeater pipette serializes wells without re-aspirating. The per-well
# clicks here are an instrumentation abstraction, not a procedural prescription.
protocol_type: mini_protocol
protocol_name: cell_seeding_plate_setup
entry_step: calculate_dilution_volume
learning:
  objectives:
    Students completing this mini-protocol will have achieved fluency with
    applying C1V1 = C2V2 dilution calculations to prepare a cell suspension at a specified
    target concentration.
  outcomes:
    Students completing this mini-protocol will be able to calculate the volume
    of cell stock needed to prepare 12 mL of 2x10^5 cells/mL suspension, prepare the
    diluted suspension, seed a 96-well plate at 100 microL per well, and incubate
    the seeded plate for overnight cell attachment.
  goals:
    "Overall, this mini-protocol aims to accomplish the cell-seeding phase for
    a dose-response experiment: taking the counted cell suspension from MP-3 and preparing
    a working suspension at the precise concentration and volume needed for experimental
    seeding. Students apply C1V1 = C2V2 to calculate dilution volume (A29), perform
    the physical seeding step (A30), and trigger incubation for cell attachment (A31)."
steps:
  - step_name: calculate_dilution_volume
    prompt:
      Calculate the volume of cell suspension needed to prepare 12 mL of 2x10^5
      cells/mL. Using C1V1 = C2V2, where C1 is your counted cell concentration from
      the hemocytometer (in cells/mL), V1 is the volume of stock cells you need, C2
      is 2x10^5 cells/mL, and V2 is 12 mL. Solve for V1. For example, if the count
      is 1x10^6 cells/mL, then 1x10^6 x V1 = 2x10^5 x 12, so V1 = (2x10^5 x 12) /
      1x10^6 = 2.4 mL (2400 microL). Since this volume is in the milliliter range,
      use a serological pipette (not a micropipette, which tops out at 1000 microL).
      Adjust the serological pipette to 2.4 mL.
    sequence:
      - target: serological_pipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 2.4
        response:
          scene_operations:
            - type: SceneChange
              to_scene: seeding_workspace
            - type: ObjectStateChange
              target: serological_pipette
              state:
                set_volume: 2.4
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_diluted_suspension
  - step_name: prepare_diluted_suspension
    prompt:
      Prepare the working cell suspension at 2x10^5 cells/mL by mixing your calculated
      volume of stock suspension with fresh media to reach 12 mL total. Using the serological
      pipette set to 2.4 mL, transfer cell suspension into a fresh 15 mL conical tube.
      Then re-set the serological pipette to 9.6 mL (12 mL total minus the 2.4 mL stock)
      and add fresh media. Mix gently by inversion or vortex briefly. A serological pipette
      is the correct instrument for milliliter-range transfers; micropipettes are limited
      to volumes at or below 1 mL.
    sequence:
      - target: serological_pipette
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: serological_pipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 2.4
        response:
          scene_operations:
            - type: ObjectStateChange
              target: serological_pipette
              state:
                set_volume: 2.4
      - target: cell_suspension_tube
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_material_name: cell_suspension
                held_material_volume: 2.4
      - target: conical_tube_for_dilution
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_tube_for_dilution
              state:
                material_name: cell_suspension
                material_volume: 2.4
      - target: serological_pipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 9.6
        response:
          scene_operations:
            - type: ObjectStateChange
              target: serological_pipette
              state:
                set_volume: 9.6
      - target: media_bottle
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_material_name: media
                held_material_volume: 9.6
      - target: conical_tube_for_dilution
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_tube_for_dilution
              state:
                material_volume: 12.0
      - target: vortex
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: conical_tube_for_dilution
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: TimedWait
              target: vortex
              duration_min: 0.05
              display: vortexing
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: seed_96_well_plate
  - step_name: seed_96_well_plate
    prompt:
      Seed the 96-well plate by dispensing 100 microL of the prepared 2x10^5 cells/mL
      suspension into each well. You may use a multichannel pipette to fill entire rows
      (columns A-H in one action per row), or a single-channel pipette to fill individual
      wells. Each well receives exactly 100 microL of the diluted cell suspension.
    sequence:
      - target: micropipette
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: micropipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 100
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 100
      - target: conical_tube_for_dilution
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                held_material_name: cell_suspension
                held_material_volume: 100
      - target: well_plate_96
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.all_wells
              state:
                material_name: cells
                material_volume: 100
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: incubate_for_attachment
  - step_name: incubate_for_attachment
    prompt:
      Place the seeded plate into the incubator to allow cells to attach and recover
      from seeding stress overnight. Incubate at 37 C in a humidified 5% CO2 atmosphere
      for approximately 24 hours before proceeding to drug treatment on Day 2.
    sequence:
      - target: well_plate_96
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: incubator
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: incubator
              state:
                door_open: false
            - type: TimedWait
              target: incubator
              duration_min: 1440
              display: overnight incubation (24 hours)
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
