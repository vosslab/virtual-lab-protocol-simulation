scene_name: passage_hood_detachment_microscope_view
extends: microscope_basic

scene_notes: "Microscope workspace for confluence inspection (A1) and detachment confirmation (A9) in passage_hood_detachment mini-protocol."

remove_placements:
  # The inherited hemocytometer slide (a magenta bottle asset) is align_stop
  # left in right_bench, which lands it at the left edge of the bench
  # abutting the microscope base in instrument_area (art-on-art). Re-add it
  # below at the right align stop so it clears the microscope.
  - right_hemocytometer_slide
  # The inherited microtube is align_stop right in right_bench; move it to the
  # left stop (re-added below) so the two right_bench items do not collide once
  # the slide takes the right stop.
  - right_microtube

add_placements:
  - placement_name: instrument_t75_flask
    object_name: t75_flask
    zone: instrument_area
    depth_tier: 2

  # Hemocytometer slide pushed to the far-right of the right bench, clear of
  # the microscope base on the left edge of the zone.
  - placement_name: right_hemocytometer_slide_clear
    object_name: hemocytometer_slide
    zone: right_bench
    depth_tier: 1
    align_stop: right

  # Microtube shares the right stop with the slide so the two pack sequentially
  # along the right edge of the bench, both clear of the microscope base on the
  # left side of the zone.
  - placement_name: right_microtube_left
    object_name: microtube
    zone: right_bench
    depth_tier: 2
    align_stop: right
