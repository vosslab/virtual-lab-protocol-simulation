scene_name: passage_hood_detachment_microscope_view
extends: microscope_basic

scene_notes: "Microscope workspace for confluence inspection (A1) and detachment confirmation (A9) in passage_hood_detachment mini-protocol. The inherited hemocytometer slide and microtube are removed as non-targets: confluence inspection uses neither (the slide belongs to cell counting in trypan_blue_counting), and the slide previously occluded the rear_right_hood_return click target."

remove_placements:
  # The inherited hemocytometer slide is a non-target for confluence
  # inspection (it belongs to cell counting in trypan_blue_counting).
  # Removed outright rather than re-added; it is not re-placed below.
  - right_hemocytometer_slide
  # The inherited microtube is likewise a non-target for confluence
  # inspection. Removed outright rather than re-added.
  - right_microtube
  # Ethanol is a non-target in the microscope view (it is clicked back in the
  # hood scene, not here). Remove the inherited rear_right ethanol so the
  # rear_right shelf is free for the hood-return surface below.
  - rear_ethanol_bottle

add_placements:
  - placement_name: instrument_t75_flask
    object_name: t75_flask
    zone: instrument_area
    depth_tier: 2

  # Hood-return affordance: the protocol clicks hood_surface to SceneChange back
  # to the hood after inspecting the flask. Placed on the freed rear_right shelf
  # so it reads as "step back to the hood," clear of the microscope and benches.
  - placement_name: rear_right_hood_return
    object_name: hood_surface
    zone: rear_right
    depth_tier: 1
    align_stop: center
