protocol_type: mini_protocol
protocol_name: passage_hood_detachment
entry_step: inspect_confluence
learning:
  objectives: Students completing this mini-protocol will have achieved fluency with
    the visual assessment of cell confluence and the technique of enzymatic cell detachment
    from a tissue-culture flask using trypsin.
  outcomes: Students completing this mini-protocol will be able to inspect and confirm
    cell confluence under a microscope, aseptically detach adherent cells from a culture
    flask with trypsin and appropriate incubation, and neutralize the trypsin to preserve
    cell viability during transfer.
  goals: 'Overall, this mini-protocol aims to accomplish the first stage of routine
    cell passage: detaching cells from a T75 flask for subculture and replating. This
    is the entry point for any maintenance-passage or experimental-expansion workflow.
    The 10 steps reflect the full pedagogical pathway from initial confluence assessment
    through trypsin neutralization, including the essential ~2-minute incubation wait.'
steps:
- step_name: inspect_confluence
  prompt: Inspect the T75 flask under the microscope to confirm cells are 70-80% confluent
    before proceeding with passage. After viewing, return to the hood.
  sequence:
  - target: microscope
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: SceneChange
        to_scene: microscope_view
      - type: ObjectStateChange
        target: t75_flask
        state:
          inspection_status: observed_at_confluence
  - target: hood_surface
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: SceneChange
        to_scene: hood_workspace
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: spray_hood_with_ethanol
- step_name: spray_hood_with_ethanol
  prompt: Spray the interior hood surface with 70% ethanol to sterilize the workspace.
  sequence:
  - target: ethanol_bottle
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: hood_surface
        state:
          surface_cleanliness: ethanol_sprayed
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: aspirate_spent_media
- step_name: aspirate_spent_media
  prompt: Aspirate and remove the spent culture media from the flask.
  sequence:
  - target: aspirating_pipette
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: t75_flask
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: t75_flask
        state:
          material_name: empty
          material_volume: 0
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: pbs_wash
- step_name: pbs_wash
  prompt: Wash the cell monolayer with approximately 4 mL of PBS to remove residual
    media.
  sequence:
  - target: aspirating_pipette
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: aspirating_pipette
    gesture: adjust
    validator:
      preset: target_with_value
      value:
        held_material_volume: 4
    response:
      scene_operations:
      - type: CursorAttach
        target: aspirating_pipette
        operation: attach
  - target: pbs_bottle
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: pbs_bottle
        state:
          material_volume: 496
  - target: t75_flask
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: t75_flask
        state:
          material_name: pbs
          material_volume: 4
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: aspirate_pbs
- step_name: aspirate_pbs
  prompt: Aspirate and remove all PBS from the flask.
  sequence:
  - target: aspirating_pipette
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: t75_flask
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: t75_flask
        state:
          material_name: empty
          material_volume: 0
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: add_trypsin
- step_name: add_trypsin
  prompt: Add trypsin to the flask to enzymatically detach cells. For a T75 flask,
    use approximately 3 mL.
  sequence:
  - target: aspirating_pipette
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: aspirating_pipette
    gesture: adjust
    validator:
      preset: target_with_value
      value:
        held_material_volume: 3
    response:
      scene_operations:
      - type: CursorAttach
        target: aspirating_pipette
        operation: attach
  - target: trypsin_bottle
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: trypsin_bottle
        state:
          material_volume: 497
  - target: t75_flask
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: t75_flask
        state:
          material_name: trypsin
          material_volume: 3
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: incubate_for_detachment
- step_name: incubate_for_detachment
  prompt: Incubate the flask at room temperature for approximately 2 minutes to allow
    trypsin to detach the cells.
  sequence:
  - target: incubator
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: TimedWait
        target: incubator
        duration_min: 2
        display: 'Incubating: allow trypsin to work'
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: confirm_detachment
- step_name: confirm_detachment
  prompt: Inspect the flask under the microscope to confirm that cells have detached
    from the culture surface. After viewing, return to the hood to neutralize the
    trypsin.
  sequence:
  - target: microscope
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: SceneChange
        to_scene: microscope_view
      - type: ObjectStateChange
        target: t75_flask
        state:
          material_name: cell_suspension
  - target: hood_surface
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: SceneChange
        to_scene: hood_workspace
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: neutralize_trypsin
- step_name: neutralize_trypsin
  prompt: Neutralize the trypsin by adding fresh culture media (approximately 3 times
    the trypsin volume, or 9 mL for a T75 flask).
  sequence:
  - target: aspirating_pipette
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: aspirating_pipette
    gesture: adjust
    validator:
      preset: target_with_value
      value:
        held_material_volume: 9
    response:
      scene_operations:
      - type: CursorAttach
        target: aspirating_pipette
        operation: attach
  - target: media_bottle
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: media_bottle
        state:
          material_volume: 491
  - target: t75_flask
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: t75_flask
        state:
          material_name: cell_suspension
          material_volume: 12
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: null
