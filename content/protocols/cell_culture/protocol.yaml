protocol_type: mini_protocol
protocol_name: cell_culture
entry_step: inspect_cells

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with the routine adherent-culture passage workflow: inspection, enzymatic detachment, centrifugation, and reseed into fresh media."
  outcomes: "Students completing this mini-protocol will be able to perform a complete aseptic cell passage from confluence assessment through reseed and incubation."
  goals: "Overall, this mini-protocol aims to accomplish teaching the complete one-flask-to-new-flask passage cycle, emphasizing inspection and reseed as the bookend skills of routine cell culture maintenance."

steps:
  - step_name: inspect_cells
    prompt: "Inspect the cells under the microscope to confirm they are at confluence."
    why: "Confluence assessment determines whether cells are ready for passage."
    sequence:
      - target: microscope
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: microscope
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask
              state:
                inspection_status: observed_at_confluence
          feedback:
            correct: "Cells observed at confluence."
            incorrect: "Inspect the flask under the microscope."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_hood

  - step_name: prepare_hood
    prompt: "Decontaminate the hood and warm the required reagents."
    why: "Aseptic technique and proper reagent temperature are essential for healthy cell recovery."
    sequence:
      - target: ethanol_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: ethanol_bottle
              operation: attach
      - target: hood_surface
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: ethanol_bottle
              state:
                material_volume: 490
            - type: ObjectStateChange
              target: hood_surface
              state:
                surface_cleanliness: ethanol_sprayed
            - type: ObjectStateChange
              target: media_bottle
              state:
                temperature_status: warmed
            - type: ObjectStateChange
              target: water_bath
              state:
                stage: warmed
          feedback:
            correct: "Hood decontaminated and reagents warmed."
            incorrect: "Use the ethanol bottle to decontaminate the hood."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: aspirate_and_wash

  - step_name: aspirate_spent_media
    prompt: "Aspirate spent media from the flask into the waste container."
    why: "Removing old media clears dead cells and serum residue before rinsing."
    sequence:
      - target: aspirating_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: aspirating_pipette
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask
              state:
                material_name: empty
                material_volume: 0
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_material_name: media
                held_material_volume: 10
          feedback:
            correct: "Media aspirated."
            incorrect: "Aspirate from the flask."
      - target: waste_container
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: waste_container
              state:
                material_name: media
                material_volume: 10
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_material_name: empty
                held_material_volume: 0
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: pbs_wash

  - step_name: pbs_wash
    prompt: "Rinse the flask with PBS and aspirate the wash."
    why: "Rinsing removes residual serum before enzymatic detachment."
    sequence:
      - target: pbs_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: pbs_bottle
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: pbs_bottle
              state:
                material_volume: 496
            - type: ObjectStateChange
              target: t75_flask
              state:
                material_name: pbs
                material_volume: 4
          feedback:
            correct: "PBS added."
            incorrect: "Add PBS from the bottle."
      - target: aspirating_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: aspirating_pipette
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask
              state:
                material_name: empty
                material_volume: 0
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_material_name: pbs
                held_material_volume: 4
          feedback:
            correct: "PBS aspirated."
            incorrect: "Aspirate from the flask."
      - target: waste_container
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: waste_container
              state:
                material_name: mixed
                material_volume: 14
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_material_name: empty
                held_material_volume: 0
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: trypsinize_and_incubate

  - step_name: trypsinize_and_incubate
    prompt: "Add trypsin and incubate until cells detach."
    why: "Trypsin enzymatically digests the extracellular matrix, allowing cell suspension."
    sequence:
      - target: trypsin_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: trypsin_bottle
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: trypsin_bottle
              state:
                material_volume: 499
            - type: ObjectStateChange
              target: t75_flask
              state:
                material_name: trypsin
                material_volume: 1
          feedback:
            correct: "Trypsin added."
            incorrect: "Add trypsin from the bottle."
      - target: incubator
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: TimedWait
              target: incubator
              duration_min: 2
              display: "Incubating with trypsin..."
          feedback:
            correct: "Cells incubated and detached."
            incorrect: "Place the flask in the incubator to allow trypsin to work."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: neutralize_and_transfer

  - step_name: neutralize_and_transfer
    prompt: "Add fresh media to neutralize trypsin and transfer the cell suspension to a conical tube."
    why: "Serum in fresh media stops the trypsin reaction, and transfer to a conical enables efficient centrifugation."
    sequence:
      - target: media_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: media_bottle
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: media_bottle
              state:
                material_volume: 497
            - type: ObjectStateChange
              target: t75_flask
              state:
                material_name: cell_suspension
                material_volume: 4
          feedback:
            correct: "Media added and trypsin neutralized."
            incorrect: "Add media from the bottle to neutralize trypsin."
      - target: serological_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: serological_pipette
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask
              state:
                material_name: empty
                material_volume: 0
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_material_name: cell_suspension
                held_material_volume: 4
          feedback:
            correct: "Cell suspension drawn into pipette."
            incorrect: "Draw the cell suspension from the flask."
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_15ml
              state:
                material_name: cell_suspension
                material_volume: 4
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_material_name: empty
                held_material_volume: 0
          feedback:
            correct: "Cell suspension transferred to conical tube."
            incorrect: "Transfer the suspension to a conical tube."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: centrifuge_and_aspirate

  - step_name: centrifuge_and_aspirate
    prompt: "Centrifuge the conical tube and aspirate the supernatant."
    why: "Centrifugation pellets cells for resuspension; aspirating supernatant concentrates the cell population."
    sequence:
      - target: centrifuge
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: centrifuge
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: TimedWait
              target: centrifuge
              duration_min: 5
              display: "Centrifuging cell suspension..."
            - type: ObjectStateChange
              target: conical_15ml
              state:
                material_name: cells
                material_volume: 0.5
          feedback:
            correct: "Cells centrifuged and pelleted."
            incorrect: "Place the conical tube in the centrifuge."
      - target: aspirating_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: aspirating_pipette
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_15ml
              state:
                material_name: empty
                material_volume: 0.5
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_material_name: media
                held_material_volume: 3.5
          feedback:
            correct: "Supernatant aspirated."
            incorrect: "Aspirate the supernatant carefully without disturbing the pellet."
      - target: waste_container
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: waste_container
              state:
                material_name: mixed
                material_volume: 17.5
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_material_name: empty
                held_material_volume: 0
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: resuspend_and_reseed

  - step_name: resuspend_and_reseed
    prompt: "Resuspend the cell pellet in fresh media and seed a new flask."
    why: "Resuspension creates a homogeneous cell suspension; reseeding in fresh media at the correct density ensures healthy proliferation."
    sequence:
      - target: media_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: media_bottle
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: media_bottle
              state:
                material_volume: 488
            - type: ObjectStateChange
              target: conical_15ml
              state:
                material_name: cells
                material_volume: 10
          feedback:
            correct: "Cells resuspended in fresh media."
            incorrect: "Add fresh media and resuspend the cell pellet gently."
      - target: serological_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: serological_pipette
              operation: attach
      - target: conical_15ml
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: conical_15ml
              state:
                material_name: empty
                material_volume: 0
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_material_name: cell_suspension
                held_material_volume: 10
          feedback:
            correct: "Cell suspension drawn from conical tube."
            incorrect: "Draw the resuspended cells from the conical tube."
      - target: t75_flask_new
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask_new
              state:
                material_name: cell_suspension
                material_volume: 10
            - type: ObjectStateChange
              target: serological_pipette
              state:
                held_material_name: empty
                held_material_volume: 0
          feedback:
            correct: "Cells seeded into new flask."
            incorrect: "Seed the cell suspension into a fresh t75 flask."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: return_to_incubator

  - step_name: return_to_incubator
    prompt: "Return the new flask to the incubator for recovery and growth."
    why: "Incubation at body temperature allows cells to recover from mechanical stress and resume active proliferation."
    sequence:
      - target: incubator
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: incubator
              operation: attach
      - target: t75_flask_new
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask_new
              state:
                incubation_status: in_incubator
          feedback:
            correct: "New flask returned to incubator."
            incorrect: "Place the new flask in the incubator for recovery."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
