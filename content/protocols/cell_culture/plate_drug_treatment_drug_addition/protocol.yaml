protocol_type: mini_protocol
protocol_name: plate_drug_treatment_drug_addition
entry_step: add_carb_row_b
learning:
  objectives:
    Students completing this mini-protocol will have achieved fluency with
    pipetting techniques, well-by-row targeted addition of variable-concentration
    drugs, coordinated dual-drug treatment administration, and incubation timing for
    cellular drug response.
  outcomes:
    Students completing this mini-protocol will be able to pipette carboplatin
    across 8 different dose concentrations into designated well rows, add metformin
    to appropriate columns, manage simultaneous drug treatments, and set up a timed
    incubation for dose-response assessment.
  goals:
    Overall, this mini-protocol aims to accomplish the drug treatment administration
    phase for a dose-response experiment. Working with pre-prepared carboplatin and
    metformin working stocks from drug_dilution_setup, this mini-protocol applies
    variable carboplatin concentrations (0.1 &micro;M through 10 &micro;M) across
    rows B-H and applies a fixed metformin concentration (5 mM) to columns 7-12, establishing
    the experimental conditions for 48-hour incubation and subsequent MTT readout.
steps:
  - step_name: add_carb_row_b
    prompt:
      "Aspirate 5 &micro;L of 4 &micro;M carboplatin working stock into the micropipette
      and dispense across row B, cols 1-12. Final well concentration: 0.1 &micro;M carboplatin
      in 200 &micro;L total volume."
    sequence:
      - target: micropipette
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: SceneChange
              to_scene: plate_workspace
      - target: micropipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 5
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 5
      - target: dilution_tube_rack_8.tube_A
        gesture: click
        validator:
          preset: correct_target
        response:
