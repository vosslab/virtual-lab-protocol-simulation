      - target: metformin_working_tube
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: TimedWait
              target: vortex
              duration_min: 0.05
              display: vortexing
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: verify_metformin_volume
  # Gesture rubric note: this step is a single directed confirm-click, not a
  # set-point. The target_with_value validator asserts the tube's pre-existing
  # material_volume (300 uL, set by the prior dilution steps); the student reads
  # and confirms that state rather than dialing or typing a value, so click is
  # correct here and this is not the value-on-a-click anti-pattern.
  - step_name: verify_metformin_volume
    prompt:
      Verify that you have prepared sufficient metformin working stock. You need
      at least 300 &micro;L total - 240 &micro;L for dosing 48 wells (48 x 5 &micro;L),
      plus dead volume. Confirm the current volume in the metformin tube is adequate.
    sequence:
      - target: metformin_working_tube
        gesture: click
        validator:
          preset: target_with_value
          value:
            material_volume: 300
        response:
          scene_operations: []
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
