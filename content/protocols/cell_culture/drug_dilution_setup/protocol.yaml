protocol_type: mini_protocol
protocol_name: drug_dilution_setup
entry_step: prepare_carb_parent_stock
learning:
  objectives:
    Students completing this mini-protocol will have achieved fluency with
    independent working-stock preparation from a master stock via C1V1 = C2V2 calculations,
    single-source dilution logic for dose-response series design, and quality-assurance
    validation of working-stock volumes.
  outcomes:
    Students completing this mini-protocol will be able to prepare a carboplatin
    400 &micro;M parent stock from the 10 mM master stock, prepare six carboplatin
    working stocks across a 1-2-5 dose-response series (4, 8, 20, 40, 80, 200 &micro;M)
    all from the single 400 &micro;M parent stock, prepare a fixed-concentration metformin
    200 mM working stock independently, and verify that sufficient working-stock volume
    is available for the full treatment experiment.
  goals:
    "Overall, this mini-protocol aims to accomplish the working-stock preparation
    phase for a two-drug dose-response experiment: carboplatin as a variable dose
    series and metformin as a fixed modifier. This step bridges the raw master stocks
    (10 mM carboplatin, 1 M metformin) to the treatment-ready working stocks that
    will be added to plate wells on Day 2. The carboplatin working stocks follow a
    1-2-5 graph-friendly pattern (0.1, 0.2, 0.5, 1, 2, 5, 10 &micro;M final in well,
    corresponding to 40x multiplier into 200 &micro;L wells). The 400 &micro;M parent
    stock serves as the row-H working stock directly (use as-is, no additional dilution).
    Each diluted working stock is prepared as a separate pedagogical step from the
    single 400 &micro;M parent stock, following single-source dilution architecture;
    metformin is a fixed working stock with its own step; volume verification closes
    the mini-protocol."
steps:
  - step_name: prepare_carb_parent_stock
    prompt:
      "Prepare the carboplatin 400 &micro;M parent stock from the 10 mM master
      stock. Calculate using C1V1 = C2V2: 10 mM x V1 = 400 &micro;M x 1000 &micro;L,
      so V1 = 40 &micro;L. Aspirate 40 &micro;L from the master stock and dispense into
      the parent stock tube, then add 960 &micro;L of sterile media to reach 1000 &micro;L
      total, and vortex."
    sequence:
      - target: micropipette
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: SceneChange
              to_scene: dilution_workspace
      - target: micropipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 40
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 40
      - target: carboplatin_stock_bottle
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: microtube_15ml_intermediate
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: microtube_15ml_intermediate
              state:
                material_name: carboplatin
                material_volume: 0.04
      - target: micropipette
        gesture: adjust
        validator:
          preset: target_with_value
          value:
            set_volume: 960
        response:
          scene_operations:
            - type: ObjectStateChange
              target: micropipette
              state:
                set_volume: 960
      - target: media_bottle
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: microtube_15ml_intermediate
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: ObjectStateChange
              target: microtube_15ml_intermediate
              state:
                material_volume: 1.0
      - target: vortex
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations: []
      - target: microtube_15ml_intermediate
        gesture: click
        validator:
          preset: correct_target
        response:
          scene_operations:
            - type: TimedWait
              target: vortex
              duration_min: 0.05
              display: vortexing
    step_validator:
      preset: sequence_complete
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_carb_working_200um
