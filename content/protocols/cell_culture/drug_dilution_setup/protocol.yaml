  - step_name: prepare_metformin_200mm
    prompt:
      "Prepare the 200 mM metformin working stock from the 1 M master stock. Calculate
      using C1V1 = C2V2: 1 M x V1 = 200 mM x 300 &micro;L, so V1 = 60 &micro;L. Aspirate
      60 &micro;L from master stock, dispense into the working tube, add 240 &micro;L
      media to reach 300 &micro;L total, and vortex to ensure complete mixing. This
      working stock is used directly for dosing (5 &micro;L into 200 &micro;L well =
      5 mM final). Prepare 300 &micro;L to cover 48 wells x 5 &micro;L per well = 240
      &micro;L dosing draw, plus &sim;60 &micro;L dead volume / measurement slack."
