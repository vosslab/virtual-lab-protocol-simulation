scene_name: dilution_workspace
extends: bench_basic

add_placements:
  # Carboplatin stock (master)
  - placement_name: carb_stock
    object_name: carboplatin_stock_bottle
    zone: rear_left
    depth_tier: 1

  # Metformin stock (master)
  - placement_name: met_stock
    object_name: metformin_stock_bottle
    zone: rear_left
    depth_tier: 2

  # Carboplatin intermediate tube (microtube)
  - placement_name: carb_intermediate
    object_name: microtube_15ml_intermediate
    zone: rear_center
    depth_tier: 1

  # Metformin working stock tube
  - placement_name: met_working_tube
    object_name: metformin_working_tube
    zone: rear_right
    depth_tier: 1

  # Serial dilution rack with 8 tubes for carboplatin working stocks
  - placement_name: dilution_rack
    object_name: dilution_tube_rack_8
    zone: center
    depth_tier: 1

  # Sterile water bottle (diluent source)
  - placement_name: water_source
    object_name: sterile_water_bottle
    zone: rear_left
    depth_tier: 3

  # Media bottle (alternative diluent)
  - placement_name: media_source
    object_name: media_bottle
    zone: rear_center
    depth_tier: 2

  # Micropipette for volume transfers
  - placement_name: pipette_tool
    object_name: micropipette
    zone: right_tool_area
    depth_tier: 1

  # Vortex mixer (already in bench_basic)
  # Label pen
  - placement_name: labeling_tool
    object_name: label_pen
    zone: right_tool_area
    depth_tier: 2
