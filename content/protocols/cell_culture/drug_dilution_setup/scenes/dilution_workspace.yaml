scene_name: dilution_workspace
extends: bench_basic

scene_notes: |
  Dilution workspace for drug_dilution_setup. Shows carboplatin and metformin
  stock bottles at rear left, intermediate tubes at rear center, sterile water
  at rear right, and the serial dilution rack at center. Micropipette and label
  pen are at right tool area.

remove_placements:
  # Keep the inherited rear_left_media_bottle: the protocol clicks media_bottle as
  # the diluent in every dilution step, so it must stay placed (was a
  # target_missing bug when removed and only sterile_water was staged).
  - rear_center_pbs
  - rear_right_heat_block
  # Center instruments and ethanol are never targeted here; remove so the center
  # band holds the serial dilution rack, not idle instruments.
  - rear_center_ethanol
  - center_water_bath
  - center_centrifuge
  - center_well_plate_96

add_placements:
  # Carboplatin stock bottle at rear left
  - placement_name: carb_stock
    object_name: carboplatin_stock_bottle
    zone: rear_left
    depth_tier: 1
    align_stop: right

  # Metformin stock at rear center (left stop)
  - placement_name: met_stock
    object_name: metformin_stock_bottle
    zone: rear_center
    depth_tier: 1
    align_stop: left

  # Carboplatin intermediate tube at rear center (center stop)
  - placement_name: carb_intermediate
    object_name: microtube_15ml_intermediate
    zone: rear_center
    depth_tier: 2
    align_stop: center

  # Metformin working stock tube at rear right (right stop)
  - placement_name: met_working_tube
    object_name: metformin_working_tube
    zone: rear_right
    depth_tier: 2
    align_stop: right
    # This short tube tucks beside the taller water_source bottle in a tight
    # rear_right zone. Its top label sat on the water bottle artwork; below is the
    # better side (graze drops from depth 4.4 to ~1.9). A clean clearance needs a
    # taller rear_right zone or shorter labels (scene-geometry fix, out of scope
    # for this label-placement plan); the residual graze is an accepted exception.
    layout:
      label_placement: bottom

  # Serial dilution rack in center -- the main work area
  - placement_name: dilution_rack
    object_name: dilution_tube_rack_8
    zone: center
    depth_tier: 1
    align_stop: left

  # Label pen at right tool area (center)
  - placement_name: labeling_tool
    object_name: label_pen
    zone: right_tool_area
    depth_tier: 1
    align_stop: center
