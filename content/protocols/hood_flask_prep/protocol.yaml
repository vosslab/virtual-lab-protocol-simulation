protocol_type: mini_protocol
name: hood_flask_prep
entry_step: spray_hood

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with the aseptic detachment workflow: hood decontamination, media aspiration, PBS rinsing, trypsin enzymatic detachment, and trypsin neutralization."
  outcomes: "Students completing this mini-protocol will be able to detach adherent cells from a tissue culture flask using trypsin in an aseptic hood environment."
  goals: "Overall, this mini-protocol aims to accomplish teaching the initial 6-step aseptic cell detachment workflow before cell transfer and centrifugation."

steps:
  - name: spray_hood
    prompt: "Decontaminate the hood with 70% ethanol."
    why: "Aseptic technique begins with a sterile work surface."
    sequence:
      - target: ethanol_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: ethanol_bottle
              operation: attach
      - target: hood_surface
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: ethanol_bottle
              state:
                contents_volume: 490
            - type: ObjectStateChange
              target: hood_surface
              state:
                surface_cleanliness: ethanol_sprayed
          feedback:
            correct: "Hood sprayed."
            incorrect: "Use the ethanol bottle."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: aspirate_spent_media

  - name: aspirate_spent_media
    prompt: "Aspirate spent media from the flask into the waste container."
    why: "Remove old media before rinsing to clear dead cells and promote clean detachment."
    sequence:
      - target: aspirating_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: aspirating_pipette
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask
              state:
                contents_name: empty
                contents_volume: 0
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_contents_name: media
                held_contents_volume: 10
          feedback:
            correct: "Media aspirated."
            incorrect: "Aspirate from the flask."
      - target: waste_container
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: waste_container
              state:
                contents_name: media
                contents_volume: 10
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: add_pbs_wash

  - name: add_pbs_wash
    prompt: "Add 4 mL of PBS to rinse the flask."
    why: "Rinsing removes residual serum that would inactivate trypsin in the next step."
    sequence:
      - target: pbs_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: pbs_bottle
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: pbs_bottle
              state:
                contents_volume: 496
            - type: ObjectStateChange
              target: t75_flask
              state:
                contents_name: pbs
                contents_volume: 4
          feedback:
            correct: "PBS added."
            incorrect: "Add PBS from the bottle."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: aspirate_pbs

  - name: aspirate_pbs
    prompt: "Aspirate the PBS wash from the flask."
    why: "Clearing residual PBS prepares the flask for trypsin."
    sequence:
      - target: aspirating_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: aspirating_pipette
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: t75_flask
              state:
                contents_name: empty
                contents_volume: 0
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_contents_name: pbs
                held_contents_volume: 4
          feedback:
            correct: "PBS aspirated."
            incorrect: "Aspirate from the flask."
      - target: waste_container
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: waste_container
              state:
                contents_name: mixed
                contents_volume: 14
            - type: ObjectStateChange
              target: aspirating_pipette
              state:
                held_contents_name: empty
                held_contents_volume: 0
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: add_trypsin

  - name: add_trypsin
    prompt: "Add 1 mL of trypsin to the flask."
    why: "Trypsin digests the extracellular matrix proteins, allowing cells to detach."
    sequence:
      - target: trypsin_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: trypsin_bottle
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: trypsin_bottle
              state:
                contents_volume: 499
            - type: ObjectStateChange
              target: t75_flask
              state:
                contents_name: trypsin
                contents_volume: 1
          feedback:
            correct: "Trypsin added."
            incorrect: "Add trypsin from the bottle."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: neutralize_trypsin

  - name: neutralize_trypsin
    prompt: "Add 3 mL of fresh media to neutralize the trypsin."
    why: "Serum-containing media stops the trypsin reaction, halting cell detachment."
    sequence:
      - target: media_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: media_bottle
              operation: attach
      - target: t75_flask
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: media_bottle
              state:
                contents_volume: 497
            - type: ObjectStateChange
              target: t75_flask
              state:
                contents_name: cell_suspension
                contents_volume: 4
          feedback:
            correct: "Media added and trypsin neutralized."
            incorrect: "Add media from the bottle."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
