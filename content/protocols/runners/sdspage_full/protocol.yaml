protocol_type: sequence_runner
protocol_name: sdspage_full
entry_step: dilute_10x_concentrate

learning:
  objectives: "Students completing this protocol will have achieved comprehensive mastery of the complete SDS-PAGE protein separation workflow, from buffer preparation through gel visualization, integrating sample preparation, gel assembly, electrophoretic separation, and post-separation analysis into a unified experimental pathway."
  outcomes: "Students completing this protocol will be able to execute a complete SDS-PAGE experiment: prepare running buffer, prepare three protein sample mixes with denaturation, heat-denature samples, assemble a gel cassette, prepare the electrode module, fill the electrophoresis tank, attach the lid and connect electrical leads, load a protein ladder standard, load three sample lanes, run electrophoresis at constant voltage, extract the gel from the cassette, recycle the running buffer, stain the gel with Coomassie, perform a two-step destain process, and image the final gel for band visualization."
  goals: "Overall, this protocol aims to accomplish a complete SDS-PAGE gel electrophoresis workflow on three student protein samples with a molecular weight ladder standard. The sequence integrates 17 focused mini-protocols (including two batch-composition runners) covering buffer and sample preparation, gel and hardware assembly, sample loading, electrophoretic separation, post-run gel handling, staining, destaining, and final imaging into a coherent pedagogical pathway aligned with the canonical SDS-PAGE procedure."

