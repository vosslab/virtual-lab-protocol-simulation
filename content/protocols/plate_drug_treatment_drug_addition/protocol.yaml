    sequence:
      - target: multichannel_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: multichannel_pipette
        gesture: adjust
        validator: { preset: target_with_value, value: { set_volume: 5 } }
        response:
