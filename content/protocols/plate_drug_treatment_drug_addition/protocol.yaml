protocol_type: mini_protocol
protocol_name: plate_drug_treatment_drug_addition
entry_step: add_carb_row_b

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with multi-channel pipetting techniques, well-by-row targeted addition of variable-concentration drugs, coordinated dual-drug treatment administration, and incubation timing for cellular drug response."
  outcomes: "Students completing this mini-protocol will be able to pipette carboplatin across 8 different dose concentrations into designated well rows, add metformin to appropriate columns, manage simultaneous drug treatments, and set up a timed incubation for dose-response assessment."
  goals: "Overall, this mini-protocol aims to accomplish the drug treatment administration phase for a dose-response experiment. Working with pre-prepared carboplatin and metformin working stocks from drug_dilution_setup, this mini-protocol applies variable carboplatin concentrations (10 nM through 25 microM) across rows B-H and applies a fixed metformin concentration (5 mM) to columns 7-12, establishing the experimental conditions for 48-hour incubation and subsequent MTT readout."

