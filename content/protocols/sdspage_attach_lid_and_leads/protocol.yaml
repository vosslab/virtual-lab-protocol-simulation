protocol_type: mini_protocol
protocol_name: sdspage_attach_lid_and_leads
entry_step: secure_apparatus
learning:
  objectives: Students completing this mini-protocol will have achieved fluency with
    securing electrophoresis equipment by placing the lid on the tank and connecting
    the high-voltage leads to establish the electrical circuit.
  outcomes: Students completing this mini-protocol will be able to place the electrophoresis
    tank lid in position and attach the red (positive) and black (negative) leads
    from the power supply to the electrode assembly, ensuring correct polarity orientation
    for the subsequent gel run.
  goals: 'Overall, this mini-protocol aims to accomplish the final assembly step before
    electrophoresis: securing the tank and establishing electrical continuity. Once
    the lid is in place and both leads are attached, the apparatus is ready for voltage
    application and sample migration.'
steps:
- step_name: secure_apparatus
  prompt: Ensure the power supply is off (or unplugged) before connecting any leads.
    Secure the electrophoresis apparatus for running the gel. First, place the lid
    on top of the electrophoresis tank. Then connect the red lead from the power supply
    to the positive electrode and the black lead to the negative electrode. Ensure
    both connections are firmly seated.
  sequence:
  - target: electrophoresis_tank
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: SceneChange
        to_scene: sdspage_attach_lid_and_leads_workspace
      - type: ObjectStateChange
        target: electrophoresis_tank
        state:
          lid_present: true
  - target: power_supply
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: power_supply
        state:
          cathode_lead_attached: true
  - target: power_supply
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: power_supply
        state:
          anode_lead_attached: true
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: null
