protocol_type: mini_protocol
protocol_name: mtt_plate_reaction
entry_step: gather_mtt_materials

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with volumetric pipetting of small reagent volumes per well, timed incubation scheduling, biohazard waste handling, and critical plate-preparation steps (drying) before downstream solubilization."
  outcomes: "Students completing this mini-protocol will be able to add MTT reagent uniformly across a 96-well plate at a fixed concentration, manage an incubation timer for metabolic conversion, safely decant cytotoxic waste into a biohazard container, and dry a plate without introducing contamination or cell loss."
  goals: "Overall, this mini-protocol aims to accomplish the MTT colorimetric assay readiness phase: loading MTT dye across treated wells, allowing formazan crystal formation under aerobic incubation, removing excess MTT/media, and preparing the dry plate for DMSO solubilization and absorbance measurement. This step bridges post-treatment cell samples (from Day 2 drug incubation) to the quantitative viability readout (Day 4 absorbance)."

steps:
  # Step 1: Gather MTT materials and obtain the treatment plate
  - step_name: gather_mtt_materials
    prompt: "Obtain the treated 96-well plate from the previous step and the prepared 12 mM MTT solution. Ensure the MTT has been freshly prepared and stored at room temperature. Place both on the incubator workspace."
    sequence:
      - target: mtt_solution_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: prepare_pipette_for_mtt

  # Step 2: Prepare pipette and set volume to 25 microL
  - step_name: prepare_pipette_for_mtt
    prompt: "Obtain a multichannel pipette and set the volume to 25 microL. Each well will receive exactly 25 microL of 12 mM MTT, which gives a final concentration of 1.5 mM in the 100 microL well volume."
    sequence:
      - target: multichannel_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: multichannel_pipette
        gesture: adjust
        validator: { preset: target_with_value, value: { set_volume: 25 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: multichannel_pipette
              state:
                set_volume: 25
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: add_mtt_to_wells

  # Step 3: Add 25 microL MTT to all wells in the plate
  - step_name: add_mtt_to_wells
    prompt: "Using the multichannel pipette set to 25 microL, aspirate MTT from the solution bottle and add 25 microL to each well. Start with the first row (column A) and proceed systematically through all 8 rows (A through H) to ensure uniform coverage. Each well receives exactly 25 microL."
    sequence:
      - target: multichannel_pipette
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: mtt_solution_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: multichannel_pipette
              state:
                held_material_name: mtt
                held_material_volume: 25
      - target: well_plate_96.A1
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96.A1
              state:
                material_name: formazan
