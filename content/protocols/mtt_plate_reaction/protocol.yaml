  # Step 4: Incubate for 1.5 hours to allow formazan conversion
  - step_name: incubate_formazan_conversion
    prompt: "Place the MTT-loaded plate into the incubator and set it for 1.5 hours at 37 degrees Celsius. Aerobic incubation allows viable cells to convert the yellow MTT dye into purple formazan crystals. After the timer completes, proceed to decant the spent MTT."
    sequence:
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: incubator
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: TimedWait
              target: incubator
              duration_min: 90
              display: "formazan conversion (1.5 hours)"
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: decant_mtt_to_waste

  # Step 5: Decant MTT/media into biohazard waste bin
  - step_name: decant_mtt_to_waste
    prompt: "Remove the plate from the incubator. Hold the plate over the biohazard waste container and carefully pour the MTT/media mixture (containing formazan dye and cells) into the waste bin. Do not lose any wells or spill on the work surface. The plate wells should be emptied but retain the formazan crystals at the bottom."
    sequence:
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: biohazard_decant_bin
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96
              state:
                material_name: empty
            - type: ObjectStateChange
              target: biohazard_decant_bin
              state:
                material_name: waste_mtt
                material_volume: 1200
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: pat_plate_dry

  # Step 6: Pat plate dry on paper towels
  - step_name: pat_plate_dry
    prompt: "Place the plate on a stack of paper towels. Using a gentle pressing motion, pat the bottom and top surfaces of the plate to absorb residual liquid without dislodging the formazan crystals. The plate should be completely dry and ready for DMSO solubilization. Ensure no liquid remains on the exterior of the plate that could obscure the absorbance measurement."
    sequence:
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
      - target: paper_towel_pad
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations: []
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
