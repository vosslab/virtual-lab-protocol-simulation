protocol_type: mini_protocol
protocol_name: sdspage_run_electrophoresis
entry_step: set_voltage
learning:
  objectives: Students completing this mini-protocol will have achieved fluency with
    operating a power supply and understanding the voltage settings and timing required
    for SDS-PAGE electrophoresis.
  outcomes: Students completing this mini-protocol will be able to set the power supply
    to the appropriate voltage, initiate the electrophoresis run, monitor the run
    for the required duration, and safely stop the power supply after separation is
    complete.
  goals: Overall, this mini-protocol aims to accomplish the critical step of running
    the SDS-PAGE gel at the correct voltage for the appropriate duration to achieve
    protein separation.
steps:
- step_name: set_voltage
  prompt: 'Set the power supply to 150 volts for electrophoresis. Alternative: 200
    V for 20-25 min produces equivalent results; this protocol uses 150 V for 30 min
    by default.'
  sequence:
  - target: power_supply
    gesture: adjust
    validator:
      preset: target_with_value
      value:
        set_voltage: 150
    response:
      scene_operations:
      - type: SceneChange
        to_scene: sdspage_run_electrophoresis_workspace
      - type: ObjectStateChange
        target: power_supply
        state:
          set_voltage: 150
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: start_run
- step_name: start_run
  prompt: Start the electrophoresis run. Confirm the tank lid is in place and your
    hands are dry before powering on; high voltage is present at the banana plugs
    once the run starts. Do not open the lid mid-run.
  sequence:
  - target: power_supply
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: power_supply
        state:
          running: true
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: wait_and_stop
- step_name: wait_and_stop
  prompt: Allow the gel to run for 30 minutes at 150 volts. When the run is complete,
    stop the power supply.
  sequence:
  - target: power_supply
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: TimedWait
        target: power_supply
        duration_min: 30
        display: Running gel electrophoresis
      - type: ObjectStateChange
        target: power_supply
        state:
          running: false
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: null
