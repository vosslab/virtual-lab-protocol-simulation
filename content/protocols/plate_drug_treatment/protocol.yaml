  - step_name: incubate_for_treatment
    prompt: "Place the plate in the incubator and incubate at 37 degrees Celsius and 5 percent CO2 for 48 hours."
    why: "The 48-hour incubation allows the carboplatin and metformin to take effect, permitting dose-response phenotypes to develop across the seven dose levels."
    scene: well_plate_workspace
    part_name: incubation
    day_name: day2_to_day4
    sequence:
      - target: incubator
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: incubator
              state:
                door_open: true
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: incubator
              state:
                door_open: false
                set_temperature_c: 37
                set_co2_pct: 5
      - target: incubator
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: TimedWait
              target: incubator
              duration_min: 2880
              display: "Incubating cells under drug treatment for 48 hours."
          feedback:
            correct: "Plate incubating at 37C, 5% CO2 for 48 hours."
            incorrect: "Set the incubator and wait for the treatment phase to complete."
    step_validator: { preset: sequence_complete }
