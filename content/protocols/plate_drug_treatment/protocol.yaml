protocol_type: mini_protocol
protocol_name: plate_drug_treatment
entry_step: inspect_seeded_plate

learning:
  objectives: "Students completing this mini-protocol will have achieved fluency with the multichannel pipette workflow, media adjustments in a 96-well plate, and controlled drug addition across replicate dose-response rows."
  outcomes: "Students completing this mini-protocol will be able to apply prepared drug dilutions to a pre-seeded 96-well plate using multichannel pipettes, manage well volumes with media adjustments, and incubate the plate for a 48-hour treatment phase."
  goals: "Overall, this mini-protocol aims to accomplish teaching the drug-treatment dosing workflow for a two-drug (carboplatin + metformin) 72-hour MTT assay on pre-seeded OVCAR8 cells."

parts:
  - id: plate_inspection
    label: "Plate inspection"
    day_name: day2_morning

  - id: media_adjustment
    label: "Media adjustment"
    day_name: day2

  - id: drug_application
    label: "Drug application"
    day_name: day2

  - id: incubation
    label: "Incubation"
    day_name: day2_to_day4

days:
  - id: day2_morning
    label: "Day 2 morning"
  - id: day2
    label: "Day 2"
  - id: day2_to_day4
    label: "Day 2 to Day 4"

steps:
  - step_name: inspect_seeded_plate
    prompt: "Inspect the pre-seeded 96-well plate and confirm that all wells contain healthy cells."
    why: "Confirming cell seeding density and health before drug addition ensures that the dose-response results are valid."
    scene: well_plate_workspace
    part_name: plate_inspection
    day_name: day2_morning
    sequence:
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: well_plate_96
              state:
                inspection_status: cells_healthy
          feedback:
            correct: "Plate inspection confirmed; cells are healthy and ready for dosing."
            incorrect: "Inspect the well plate to verify cell health."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: gather_drug_solutions

  - step_name: gather_drug_solutions
    prompt: "Gather the prepared carboplatin and metformin working-stock solutions, plus fresh media for dose-row adjustments."
    why: "Collecting all reagents before starting dosing prevents interruptions and ensures each row receives doses in the correct sequence."
    scene: well_plate_workspace
    part_name: drug_application
    day_name: day2
    sequence:
      - target: dilution_tube_rack_8
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: dilution_tube_rack_8
              operation: attach
          feedback:
            correct: "Drug dilution racks gathered."
            incorrect: "Gather the dilution rack with prepared drug solutions."
      - target: media_bottle
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: CursorAttach
              target: media_bottle
              operation: attach
          feedback:
            correct: "Fresh media gathered."
            incorrect: "Gather fresh complete media for adjustments."
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: add_media_adjustments

