protocol_type: sequence_runner
protocol_name: sdspage_load_samples_batch
entry_step: swap_tip

mini_protocols:
  - sdspage_load_sample_single_lane
  - sdspage_load_sample_single_lane
  - sdspage_load_sample_single_lane

learning:
  objectives: "Students completing this protocol will have achieved proficiency with repetitive gel-loading workflows, maintaining precise pipetting accuracy across multiple identical sample-loading cycles, and safely handling gel-loading tips under time and attention demands of batch work."
  outcomes: "Students completing this protocol will be able to load three independent protein samples into three sequential gel cassette lanes, each through a complete tip-swap, volume-set, aspiration, and slow-dispense sequence, for a total of three loaded lanes ready for electrophoretic separation."
  goals: "Overall, this protocol aims to accomplish the complete batch loading of three student samples into an SDS-PAGE gel cassette (Part 2, action map P5.1-P5.21 full batch slice). The batch workflow chains three instances of the single-lane sample-load mini-protocol, establishing the repetitive pipette-and-dispense discipline required for multi-lane gel loading and demonstrating precision and consistency under the time and attention demands of batch lab work."
