    zone: center
    depth_tier: 2

  - placement_name: rear_left_fresh_media
    object_name: media_bottle
    zone: rear_left
    depth_tier: 1

  - placement_name: center_fresh_plate
    object_name: well_plate_96
    zone: center
    depth_tier: 1

  - placement_name: right_label_pen
    object_name: label_pen
    zone: right_tool_area
    depth_tier: 1
