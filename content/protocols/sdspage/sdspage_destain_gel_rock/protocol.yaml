protocol_type: mini_protocol
protocol_name: sdspage_destain_gel_rock
entry_step: rock_run
learning:
  objectives: Students completing this mini-protocol will have achieved proficiency
    with running a rocking shaker for gel destaining, managing timed incubation phases,
    and proper disposal of used staining reagents.
  outcomes: Students completing this mini-protocol will be able to set up and run
    a 10-minute rocking cycle for gel destaining, remove supporting materials from
    the staining tray, and safely dispose of used destain solution into a waste container.
  goals: Overall, this mini-protocol aims to accomplish the core mechanical destaining
    phase of SDS-PAGE gel processing -- running the rocking shaker to gently agitate
    the gel in destain solution, then retrieving the tray and disposing the spent
    reagent.
steps:
- step_name: rock_run
  prompt: Start the rocking shaker to destain the gel. Set the rocking shaker time
    to 10 minutes, then click the start button to begin the rocking cycle.
  sequence:
  - target: rocking_shaker
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: SceneChange
        to_scene: sdspage_destain_gel_rock_workspace
  - target: rocking_shaker
    gesture: adjust
    validator:
      preset: target_with_value
      value:
        set_time_min: 10
    response:
      scene_operations:
      - type: ObjectStateChange
        target: rocking_shaker
        state:
          set_time_min: 10
  - target: rocking_shaker
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: rocking_shaker
        state:
          running: true
      - type: TimedWait
        target: rocking_shaker
        duration_min: 10
        display: Rocking gel in destain
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: remove_kimwipes
- step_name: remove_kimwipes
  prompt: After rocking completes, retrieve the staining tray from the shaker and
    remove the kimwipe pad that was protecting the gel during rocking.
  sequence:
  - target: staining_tray
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: kimwipe_pad
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: staining_tray
        state:
          kimwipes_present: false
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: dispose_destain
- step_name: dispose_destain
  prompt: Carefully dispose of the used destain solution into the destain waste bottle,
    and mark the waste bottle as containing spent destain. If background is not sufficiently
    clear after this cycle, repeat MP-16a (destain setup) and MP-16b (rock) once more
    - additional 10 min on the rocker until the gel matrix is transparent. Destain
    contains 20% methanol and 10% acetic acid. Dispose in the designated stain-waste
    container in the fume hood.
  sequence:
  - target: staining_tray
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations: []
  - target: destain_waste_bottle
    gesture: click
    validator:
      preset: correct_target
    response:
      scene_operations:
      - type: ObjectStateChange
        target: destain_waste_bottle
        state:
          material_name: destain_used
          material_volume: 500
      - type: ObjectStateChange
        target: staining_tray
        state:
          material_name: empty
          material_volume: 0
  step_validator:
    preset: sequence_complete
  outcome:
    on_success: complete
    on_failure: retry
  next_step: null
