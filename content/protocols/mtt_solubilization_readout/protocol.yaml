  # A46: Read absorbance at 560 nm on plate reader
  - step_name: read_absorbance
    prompt: "Move to the plate reader workspace and measure absorbance. Access the plate reader, set the wavelength to 560 nm, insert the treated plate, and take the measurement. The optical density readings at 560 nm indicate the extent of formazan formation across the dose-response series."
    sequence:
      - target: plate_reader
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: SceneChange
              to_scene: mtt_solubilization_readout_plate_reader_workspace
      - target: plate_reader
        gesture: adjust
        validator: { preset: target_with_value, value: { wavelength_nm: 560 } }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: plate_reader
              state:
                wavelength_nm: 560
      - target: well_plate_96
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: plate_reader
              state:
                reading: true
      - target: plate_reader
        gesture: click
        validator: { preset: correct_target }
        response:
          scene_operations:
            - type: ObjectStateChange
              target: plate_reader
              state:
                reading: false
    step_validator: { preset: sequence_complete }
    outcome:
      on_success: complete
      on_failure: retry
    next_step: null
