# Simulation note: this mini represents multi-well dispensing as
# individual well interactions for validation granularity. In
# wet-lab practice, the named pipette deposits multiple wells in
# fewer strokes (an 8-channel multichannel covers one column per
# aspirate; a repeater pipette serializes wells without
# re-aspirating). The per-well clicks here are an instrumentation
# abstraction, not a procedural prescription.

protocol_type: mini_protocol
protocol_name: plate_drug_treatment_media_adjustment
entry_step: adjust_media_quadrant_a1_h6

learning:
  objectives: "Students completing this mini-protocol will have achieved understanding of media-volume adjustments needed before multi-drug dosing on a 96-well plate, and how to distribute exact micropipette volumes across multiple wells using a multichannel pipette organized by plate quadrant."
  outcomes: "Students completing this mini-protocol will be able to adjust media volumes in each of four plate quadrants to achieve uniform final well volumes after drug additions, and validate that each quadrant received the correct pre-drug media adjustment."
  goals: "Overall, this mini-protocol aims to accomplish the critical pre-dosing media-adjustment step for a two-drug dose-response experiment. Each quadrant of the 96-well plate receives a specific media volume before carboplatin and metformin are added, ensuring that every well reaches the same final volume (200 microL) and that volumetric dilution factors are uniform across the plate. This step bridges the cell-seeding phase (Day 1, 100 microL per well) and the drug-addition phase (Day 2, adding 5-10 microL per well of working stocks), keeping the assay's quantitative rigor intact."

