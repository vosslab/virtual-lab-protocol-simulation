protocol_type: sequence_runner
protocol_name: sdspage_prepare_sample_mix_batch
entry_step: add_protein_sample

mini_protocols:
  - sdspage_prepare_sample_mix_single_lane
  - sdspage_prepare_sample_mix_single_lane
  - sdspage_prepare_sample_mix_single_lane

learning:
  objectives: "Students completing this protocol will have achieved proficiency with repetitive liquid-transfer workflows, maintaining accuracy and consistency across multiple identical sample-preparation cycles, and safely handling volatile reducing agents at scale."
  outcomes: "Students completing this protocol will be able to accurately prepare three independent protein sample denaturation mixes in sequence, each combining 21 &micro;L protein sample, 7.5 &micro;L 4x Laemmli buffer, and 1.5 &micro;L beta-mercaptoethanol in the correct order, for a total of three ready-to-heat sample tubes."
  goals: "Overall, this protocol aims to accomplish the complete batch preparation of protein sample mixes for three lanes of an SDS-PAGE gel (Part 1, action map P1.1-P1.27 full batch slice). The batch workflow chains three instances of the single-lane sample-mix mini-protocol, establishing the repetitive pipette-and-mix discipline required for multi-lane gel preparation and demonstrating consistency under the time and attention demands of batch lab work."
