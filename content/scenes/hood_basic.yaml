scene_name: hood_basic
workspace: hood
capabilities:
  - itemWorkspace
scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  asset: hood_workspace_bg

zones:
  - id: rear_left
    bounds:
      left: 5
      right: 30
      top: 10
      bottom: 35
    align: center
    label: Rear left zone
  - id: rear_center
    bounds:
      left: 35
      right: 65
      top: 10
      bottom: 35
    align: center
    label: Rear center zone
  - id: rear_right
    bounds:
      left: 70
      right: 95
      top: 10
      bottom: 35
    align: center
    label: Rear right zone
  - id: center
    bounds:
      left: 20
      right: 80
      top: 45
      bottom: 75
    align: center
    label: Work surface center
  - id: right_tool_area
    bounds:
      left: 80
      right: 95
      top: 55
      bottom: 80
    align: center
    label: Right tool rack

placements:
  - placement_name: rear_left_ethanol
    object_name: ethanol_bottle
    zone: rear_left
    depth_tier: 1
  - placement_name: rear_center_waste
    object_name: waste_container
    zone: rear_center
    depth_tier: 1
  - placement_name: center_hood_surface
    object_name: hood_surface
    zone: center
    depth_tier: 2
  - placement_name: right_aspirating_pipette
    object_name: aspirating_pipette
    zone: right_tool_area
    depth_tier: 1

layout_rules:
  label_font_size: 9
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 2

wrong_order_message:
  template: "Try using the {expectedLabel}."
  toast_duration_ms: 2000
