scene_name: sample_prep_bench
workspace: bench
capabilities:
  - item_workspace

scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  type: gradient
  from: "#E8E2D0"
  to: "#D4CBB3"
  angle: 180

zones:
  - id: rear_left
    bounds:
      left: 5
      right: 30
      top: 10
      bottom: 35
    align: center
    label: Rear left zone
  - id: rear_center
    bounds:
      left: 35
      right: 65
      top: 10
      bottom: 35
    align: center
    label: Rear center zone
  - id: rear_right
    bounds:
      left: 70
      right: 95
      top: 10
      bottom: 35
    align: center
    label: Rear right zone
  - id: center
    bounds:
      left: 20
      right: 80
      top: 45
      bottom: 75
    align: center
    label: Bench work surface
  - id: right_tool_area
    bounds:
      left: 80
      right: 95
      top: 55
      bottom: 80
    align: center
    label: Right tool rack

placements:
  - placement_name: rear_left_protein_sample
    object_name: protein_sample_tube
    zone: rear_left
    depth_tier: 1
  - placement_name: rear_center_laemmli
    object_name: laemmli_4x_bottle
    zone: rear_center
    depth_tier: 1
  - placement_name: rear_right_bme
    object_name: bme_bottle
    zone: rear_right
    depth_tier: 1
  - placement_name: center_eppendorf_rack
    object_name: microtube_rack_24
    zone: center
    depth_tier: 2
  - placement_name: center_micropipette
    object_name: micropipette
    zone: center
    depth_tier: 1

layout_rules:
  label_font_size: 9
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 2

wrong_order_message:
  template: "Try using the {expected_label}."
  toast_duration_ms: 2000
