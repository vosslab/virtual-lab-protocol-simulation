scene_name: electrophoresis_bench
workspace: bench
capabilities:
  - item_workspace

scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  asset: bench_workspace_bg

zones:
  # Rear shelf band: reagent bottles at top
  - zone_name: rear_left
    bounds:
      left: 5
      right: 30
      top: 5
      bottom: 36
    baseline: 32
    align: center
    label: Rear left zone
  - zone_name: rear_center
    bounds:
      left: 35
      right: 65
      top: 5
      bottom: 36
    baseline: 32
    align: center
    label: Rear center zone
  - zone_name: rear_right
    bounds:
      left: 70
      right: 95
      top: 5
      bottom: 36
    baseline: 32
    align: center
    label: Rear right zone
  # Center working-surface band: tank, carboys, pipettes center-stage
  - zone_name: center
    bounds:
      left: 10
      right: 85
      top: 38
      bottom: 76
    baseline: 64
    align: tab-stops
    label: Bench work surface
  # Right tool area: pipettes and tip boxes
  - zone_name: right_tool_area
    bounds:
      left: 82
      right: 97
      top: 38
      bottom: 76
    baseline: 64
    align: center
    label: Right tool rack
  # Front working band (~70-92%): gel, cassette, and small consumables
  - zone_name: front_left
    bounds:
      left: 5
      right: 30
      top: 72
      bottom: 94
    baseline: 90
    align: center
    label: Front left zone
  - zone_name: front_center
    bounds:
      left: 35
      right: 65
      top: 72
      bottom: 94
    baseline: 90
    align: tab-stops
    label: Front center zone
  - zone_name: front_right
    bounds:
      left: 70
      right: 95
      top: 72
      bottom: 94
    baseline: 90
    align: center
    label: Front right zone

placements:
  - placement_name: rear_left_running_buffer_10x
    object_name: running_buffer_10x_bottle
    zone: rear_left
    depth_tier: 2
  - placement_name: rear_center_electrophoresis_tank
    object_name: electrophoresis_tank
    zone: rear_center
    depth_tier: 1
  - placement_name: rear_right_power_supply
    object_name: power_supply
    zone: rear_right
    depth_tier: 1
  # Center zone: left cluster = carboys/buffer; center = electrode + tank; right = gel cassette/waste
  - placement_name: center_running_buffer_1x_carboy
    object_name: running_buffer_1x_carboy
    zone: center
    depth_tier: 2
    align_stop: left
  - placement_name: center_ddh2o_bottle
    object_name: ddh2o_bottle
    zone: center
    depth_tier: 2
    align_stop: left
  - placement_name: center_electrode_module
    object_name: electrode_module
    zone: center
    depth_tier: 2
    align_stop: center
  - placement_name: center_serological_pipette
    object_name: serological_pipette
    zone: center
    depth_tier: 1
    align_stop: left
  - placement_name: center_p200_micropipette
    object_name: p200_micropipette
    zone: center
    depth_tier: 2
    align_stop: right
  # Right tool area: just the tip box (single item avoids label collision)
  - placement_name: right_tool_area_p10_gel_loading_tip_box
    object_name: p10_gel_loading_tip_box
    zone: right_tool_area
    depth_tier: 1
  # Rear zone secondary items
  - placement_name: rear_left_protein_ladder_tube
    object_name: protein_ladder_tube
    zone: rear_left
    depth_tier: 2
  - placement_name: rear_left_recycle_buffer_bottle
    object_name: recycle_buffer_bottle
    zone: rear_left
    depth_tier: 2
  - placement_name: rear_right_gel_opening_tool
    object_name: gel_opening_tool
    zone: rear_right
    depth_tier: 2
  # Front band: gel and gel comb at lower canvas
  - placement_name: front_left_mini_protean_gel
    object_name: mini_protean_gel
    zone: front_left
    depth_tier: 1
  - placement_name: front_center_gel_cassette
    object_name: gel_cassette
    zone: front_center
    depth_tier: 1
    align_stop: left
  - placement_name: front_center_waste_container
    object_name: waste_container
    zone: front_center
    depth_tier: 2
    align_stop: right
  - placement_name: front_right_gel_comb
    object_name: gel_comb
    zone: front_right
    depth_tier: 1
    # gel_comb sits in the lower front band; the right_tool_area tip box sits in
    # the mid band directly above and its zone overlaps front_right's x-range in
    # the bottom-right corner. With the default top label, gel_comb's label rises
    # into that corner and collides with the tip box's label (unresolved_label_
    # overlap Error). Placing gel_comb's label below the comb moves it down, clear
    # of the tip box above.
    layout:
      label_placement: bottom

layout_rules:
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 2

wrong_order_message:
  template: "Try using the {expected_label}."
  toast_duration_ms: 2000
