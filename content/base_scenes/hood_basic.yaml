scene_name: hood_basic
workspace: hood
capabilities:
  - item_workspace
scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  type: gradient
  from: "#E8E2D0"
  to: "#D4CBB3"
  angle: 180

zones:
  # Rear shelf band (~top 8-36%): reagent bottles and context items
  - zone_name: rear_left
    bounds:
      left: 5
      right: 33
      top: 5
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear left zone
  - zone_name: rear_center
    bounds:
      left: 34
      right: 66
      top: 5
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear center zone
  - zone_name: rear_right
    bounds:
      left: 67
      right: 95
      top: 5
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear right zone
  # Center working-surface band (~40-88%): primary instruments center-stage
  - zone_name: center
    bounds:
      left: 5
      right: 68
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Work surface center
  # Right tool area: mirrors center band vertically
  - zone_name: right_tool_area
    bounds:
      left: 70
      right: 97
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Right tool rack

placements:
  # Rear left: ethanol spray bottle (left), tip box (right)
  - placement_name: rear_left_ethanol
    object_name: ethanol_bottle
    zone: rear_left
    depth_tier: 1
    align_stop: left

  - placement_name: base_rear_left_tip_box
    object_name: micropipette_tip_box
    zone: rear_left
    depth_tier: 2
    align_stop: right

  # Rear center: PBS (left), waste container (right)
  - placement_name: base_rear_center_pbs
    object_name: pbs_bottle
    zone: rear_center
    depth_tier: 1
    align_stop: left

  - placement_name: rear_center_waste
    object_name: waste_container
    zone: rear_center
    depth_tier: 1
    align_stop: center

  # Rear right: media bottle (left), sterile water (right)
  - placement_name: base_rear_right_media
    object_name: media_bottle
    zone: rear_right
    depth_tier: 1
    align_stop: left

  - placement_name: base_rear_right_sterile_water
    object_name: sterile_water_bottle
    zone: rear_right
    depth_tier: 1
    align_stop: center

  # Center working surface: hood surface placeholder (center)
  - placement_name: center_hood_surface
    object_name: hood_surface
    zone: center
    depth_tier: 2
    align_stop: center

  # Center working surface: 96-well plate sits on the hood surface. Replaces the
  # per-protocol microtube_rack_24 placeholders; protocols target well_plate_96.*
  # and resolve against this single inherited placement. depth_tier 3 keeps it in
  # front of the surface backdrop at the center stop.
  - placement_name: center_well_plate_96
    object_name: well_plate_96
    zone: center
    depth_tier: 3
    align_stop: left

  # Right tool area: aspirating pipette (left), serological pipette (right)
  - placement_name: right_aspirating_pipette
    object_name: aspirating_pipette
    zone: right_tool_area
    depth_tier: 1
    align_stop: left

  - placement_name: base_right_serological_pipette
    object_name: serological_pipette
    zone: right_tool_area
    depth_tier: 1
    align_stop: right

layout_rules:
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 4
  default_align_stop: center

wrong_order_message:
  template: "Try using the {expected_label}."
  toast_duration_ms: 2000
