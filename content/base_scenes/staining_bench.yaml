scene_name: staining_bench
workspace: bench
capabilities:
  - item_workspace

scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  type: gradient
  from: "#E8E2D0"
  to: "#D4CBB3"
  angle: 180

zones:
  # Rear shelf band: reagent bottles at top
  - zone_name: rear_left
    bounds:
      left: 5
      right: 30
      top: 8
      bottom: 36
    baseline: 32
    align: center
    label: Rear left zone
  - zone_name: rear_center
    bounds:
      left: 35
      right: 65
      top: 8
      bottom: 36
    baseline: 32
    align: center
    label: Rear center zone
  - zone_name: rear_right
    bounds:
      left: 70
      right: 95
      top: 8
      bottom: 36
    baseline: 32
    align: center
    label: Rear right zone
  # Center working-surface band: staining tray and tools center-stage
  - zone_name: center
    bounds:
      left: 10
      right: 82
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Bench work surface
  # Right tool area: appliances (microwave/shaker) at lower-right
  - zone_name: right_tool_area
    bounds:
      left: 80
      right: 97
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Right tool rack

placements:
  # Rear shelf: staining reagent bottles
  - placement_name: rear_left_coomassie_stain
    object_name: coomassie_stain_bottle
    zone: rear_left
    depth_tier: 1
  - placement_name: rear_left_coomassie_recycle
    object_name: coomassie_recycle_bottle
    zone: rear_left
    depth_tier: 2
  - placement_name: rear_center_destain
    object_name: destain_bottle
    zone: rear_center
    depth_tier: 1
  - placement_name: rear_center_destain_waste
    object_name: destain_waste_bottle
    zone: rear_center
    depth_tier: 2
  - placement_name: rear_right_ddh2o
    object_name: ddh2o_bottle
    zone: rear_right
    depth_tier: 1
  # Center working surface: staining tray left, microwave center, rocking shaker right
  # microwave (35cm) must live in the wider center zone to avoid edge-clipping
  - placement_name: center_staining_tray
    object_name: staining_tray
    zone: center
    depth_tier: 1
    align_stop: left
  - placement_name: center_microwave
    object_name: microwave
    zone: center
    depth_tier: 1
    align_stop: center
  - placement_name: center_rocking_shaker
    object_name: rocking_shaker
    zone: center
    depth_tier: 1
    align_stop: right
  # Right tool area: waste container (front) with the kimwipe pad stacked behind
  # it. The destain protocols click kimwipe_pad, so it must be a real placed,
  # clickable object. depth_tier 2 stacks it vertically above the waste in the
  # narrow zone, so the two do not collide side-by-side.
  - placement_name: right_tool_area_waste
    object_name: waste_container
    zone: right_tool_area
    depth_tier: 1
  - placement_name: right_tool_area_kimwipe
    object_name: kimwipe_pad
    zone: right_tool_area
    depth_tier: 2

layout_rules:
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 2

wrong_order_message:
  template: "Try using the {expected_label}."
  toast_duration_ms: 2000
