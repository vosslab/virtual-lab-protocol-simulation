scene_name: bench_basic
workspace: bench
capabilities:
  - item_workspace
scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  type: gradient
  from: "#E8E2D0"
  to: "#D4CBB3"
  angle: 180

zones:
  # Rear shelf band (~top 8-36%): reagent bottles and context items
  - zone_name: rear_left
    bounds:
      left: 5
      right: 33
      top: 8
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear left zone
  - zone_name: rear_center
    bounds:
      left: 34
      right: 66
      top: 8
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear center zone
  - zone_name: rear_right
    bounds:
      left: 67
      right: 95
      top: 8
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear right zone
  # Center working-surface band (~38-88%): primary instruments center-stage
  - zone_name: center
    bounds:
      left: 5
      right: 68
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Bench work surface
  # Right tool area: mirrors center band vertically
  - zone_name: right_tool_area
    bounds:
      left: 70
      right: 97
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Right tool rack

placements:
  # Rear left: waste container (left) and media bottle (right)
  - placement_name: rear_left_waste
    object_name: waste_container
    zone: rear_left
    depth_tier: 1
    align_stop: left

  - placement_name: rear_left_media_bottle
    object_name: media_bottle
    zone: rear_left
    depth_tier: 2
    align_stop: right

  # Rear center: PBS (left) and ethanol (right)
  - placement_name: rear_center_pbs
    object_name: pbs_bottle
    zone: rear_center
    depth_tier: 1
    align_stop: left

  - placement_name: rear_center_ethanol
    object_name: ethanol_bottle
    zone: rear_center
    depth_tier: 2
    align_stop: right

  # Rear right: vortex (left) and heat block (right)
  - placement_name: rear_right_vortex
    object_name: vortex
    zone: rear_right
    depth_tier: 1
    align_stop: left

  - placement_name: rear_right_heat_block
    object_name: heat_block
    zone: rear_right
    depth_tier: 2
    align_stop: right

  # Center working surface: water bath (left) and centrifuge (right).
  # The center previously paired water_bath with rocking_shaker, and the bench
  # also carries a vortex; the rocking shaker, vortex, and water bath all read
  # as similar blue control-panel boxes, so the bench looked like repeated
  # filler. The centrifuge has a distinct domed-lid silhouette, so swapping it
  # in for the rocking shaker differentiates the two center instruments. The
  # placement_name stays 'center_rocking_shaker' because sibling scenes that
  # extend bench_basic remove this placement by that name.
  - placement_name: center_water_bath
    object_name: water_bath
    zone: center
    depth_tier: 1
    align_stop: left

  - placement_name: center_rocking_shaker
    object_name: centrifuge
    zone: center
    depth_tier: 1
    align_stop: right

  # Right tool area: tip box and micropipette
  - placement_name: base_right_tip_box
    object_name: micropipette_tip_box
    zone: right_tool_area
    depth_tier: 1
    align_stop: left

  - placement_name: base_right_micropipette
    object_name: micropipette
    zone: right_tool_area
    depth_tier: 2
    align_stop: right

layout_rules:
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 4
  default_align_stop: center

wrong_order_message:
  template: "Try using the {expected_label}."
  toast_duration_ms: 2000
