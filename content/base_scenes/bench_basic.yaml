scene_name: bench_basic
workspace: bench
capabilities:
  - item_workspace
scene_bounds:
  left: 1
  right: 99
  top: 5
  bottom: 95

background:
  type: gradient
  from: "#E8E2D0"
  to: "#D4CBB3"
  angle: 180

zones:
  # Rear shelf band (~top 8-36%): reagent bottles and context items
  - zone_name: rear_left
    bounds:
      left: 5
      right: 33
      top: 5
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear left zone
  - zone_name: rear_center
    bounds:
      left: 34
      right: 66
      top: 5
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear center zone
  - zone_name: rear_right
    bounds:
      left: 67
      right: 95
      top: 5
      bottom: 36
    baseline: 32
    align: tab-stops
    label: Rear right zone
  # Center working-surface band (~38-88%): primary instruments center-stage
  - zone_name: center
    bounds:
      left: 5
      right: 68
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Bench work surface
  # Right tool area: mirrors center band vertically
  - zone_name: right_tool_area
    bounds:
      left: 70
      right: 97
      top: 38
      bottom: 94
    baseline: 84
    align: tab-stops
    label: Right tool rack

placements:
  # Rear shelf: each rear zone holds its two items side by side on a single
  # depth tier (both at depth_tier 1, spread by align_stop left/center/right).
  # Keeping the rear band one tier deep instead of two collapses the rear
  # vertical band so the scene fits without a hard uniform vertical rescale.
  # Rear left: waste container (left) and media bottle (right)
  - placement_name: rear_left_waste
    object_name: waste_container
    zone: rear_left
    depth_tier: 1
    align_stop: left

  - placement_name: rear_left_media_bottle
    object_name: media_bottle
    zone: rear_left
    depth_tier: 1
    align_stop: center

  # Rear center: PBS (left) and ethanol (right)
  - placement_name: rear_center_pbs
    object_name: pbs_bottle
    zone: rear_center
    depth_tier: 1
    align_stop: left

  - placement_name: rear_center_ethanol
    object_name: ethanol_bottle
    zone: rear_center
    depth_tier: 1
    align_stop: center

  # Rear right: vortex (left) and heat block (right)
  - placement_name: rear_right_vortex
    object_name: vortex
    zone: rear_right
    depth_tier: 1
    align_stop: left

  - placement_name: rear_right_heat_block
    object_name: heat_block
    zone: rear_right
    depth_tier: 1
    align_stop: right

  # Center working surface: water bath (left) and centrifuge (right).
  # The centrifuge has a distinct domed-lid silhouette that differentiates
  # the two center instruments from the rear vortex and heat block.
  - placement_name: center_water_bath
    object_name: water_bath
    zone: center
    depth_tier: 1
    align_stop: left

  - placement_name: center_centrifuge
    object_name: centrifuge
    zone: center
    depth_tier: 1
    align_stop: right

  # Center working surface: 96-well plate at the center stop, between the
  # water bath (left) and centrifuge (right). Replaces the per-protocol
  # microtube_rack_24 placeholders; protocols target well_plate_96.* and resolve
  # against this single inherited placement. align_stop center is otherwise free.
  - placement_name: center_well_plate_96
    object_name: well_plate_96
    zone: center
    depth_tier: 2
    align_stop: center

  # Right tool area: tip box and micropipette
  - placement_name: base_right_tip_box
    object_name: micropipette_tip_box
    zone: right_tool_area
    depth_tier: 1
    align_stop: left

  - placement_name: base_right_micropipette
    object_name: micropipette
    zone: right_tool_area
    depth_tier: 2
    align_stop: right

layout_rules:
  label_line_height: 1.1
  label_offset_y: 4
  zone_gap: 4
  default_align_stop: center

wrong_order_message:
  template: "Try using the {expected_label}."
  toast_duration_ms: 2000
