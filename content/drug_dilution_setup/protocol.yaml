# intended_entry_scene: well_plate_workspace

learning:
  objectives: Students completing this mini-protocol will have achieved fluency with the carboplatin and metformin dilution calculations needed to prepare the OVCAR8 dose-response plate, including stock-to-intermediate, intermediate-to-working, and final-concentration-in-well math.
  outcomes: Students completing this mini-protocol will be able to calculate and verify the concentration of each carboplatin working solution in the 1-2-5 dose series, the metformin working solution concentration, and the final drug concentrations in the plate without reference materials.
  goals: Overall, this mini-protocol aims to accomplish bridging single-calculation tutorials (which teach one dilution step in isolation) to the full dose-response protocol (which requires managing a cascade of interdependent dilutions).

entry:
  scene: well_plate_workspace
  step: calc_carb_stock

parts:
  - id: planning_part
    label: "Drug Dilution Planning"
    dayId: planning_day

days:
  - id: planning_day
    label: "Planning Day"

steps:
  # Step 1: "Calculate parent stock (carboplatin 10 mM -> 400 uM)"
  - id: calc_carb_stock
    label: Calculate carboplatin intermediate dilution
    action: Answer the dilution question about making 400 uM intermediate from 10 mM stock
    why: The 400 uM intermediate dilution serves as the parent for all seven carboplatin working stocks (rows B-H).
    partId: planning_part
    dayId: planning_day
    stepIndex: 1
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: Use C1V1 = C2V2. Start with the 10 mM stock and work toward 400 uM target.
    completionPath:
      kind: multipleChoice
      question: "The carboplatin stock solution is 10 mM. You need a 400 uM intermediate dilution. Which recipe makes 1 mL?"
      choices:
        - id: carb_stock_a
          text: "4 uL stock + 996 uL water"
          feedback: "That would make 40 uM."
        - id: carb_stock_b
          text: "40 uL stock + 960 uL water"
          correct: true
          feedback: "Correct. Using C1V1 = C2V2: 10,000 uM x 40 uL = 400 uM x 1000 uL."
        - id: carb_stock_c
          text: "100 uL stock + 900 uL water"
          feedback: "That would make 1,000 uM."
        - id: carb_stock_d
          text: "400 uL stock + 600 uL water"
          feedback: "That would make 4,000 uM."
      completionEvent: calc_carb_stock_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: calc_carb_working_b

  # Step 2: "Calculate Row B (carboplatin 400 uM -> 4 uM via 200 uM intermediate)"
  - id: calc_carb_working_b
    label: Calculate Row B carboplatin concentration (0.1 uM final)
    action: Answer the dilution question about the 4 uM working solution that becomes 0.1 uM in the well
    why: Row B receives the lowest carboplatin dose; understanding the full dilution chain prepares you for the serial dilutions.
    partId: planning_part
    dayId: planning_day
    stepIndex: 2
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: Remember that 400 uM intermediate is further diluted to 4 uM, then added to the 200 uL well.
    completionPath:
      kind: multipleChoice
      question: "You dilute the 400 uM intermediate to 4 uM working stock, then add 5 uL to a 200 uL well. What is the final carboplatin concentration in the well?"
      choices:
        - id: carb_b_a
          text: "0.01 uM"
          feedback: "That is one order of magnitude too small."
        - id: carb_b_b
          text: "0.1 uM"
          correct: true
          feedback: "Correct. 4 uM x 5 uL / 200 uL = 0.1 uM."
        - id: carb_b_c
          text: "1 uM"
          feedback: "That would need a 40 uM working stock or a larger transfer volume."
        - id: carb_b_d
          text: "10 uM"
          feedback: "That would need a much higher working stock."
      completionEvent: calc_carb_working_b_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: calc_carb_series

  # Step 3: Recognize the 1-2-5 pattern
  - id: calc_carb_series
    label: Identify the 1-2-5 dose-series pattern
    action: Choose the pattern that describes the carboplatin dose series
    why: The 1-2-5 pattern (repeated 1x, 2x, 5x across each decade) produces clean log-spaced doses for graphing.
    partId: planning_part
    dayId: planning_day
    stepIndex: 3
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: "Think about the ratios: from 0.1 to 0.2 to 0.5 to 1.0 to 2.0 to 5.0 to 10 uM."
    completionPath:
      kind: multipleChoice
      question: "The rows B-H receive carboplatin at 0.1, 0.2, 0.5, 1, 2, 5, and 10 uM (final). Which pattern describes this series?"
      choices:
        - id: series_a
          text: "Each step is always 2x"
          feedback: "That would give a binary series without the middle step."
        - id: series_b
          text: "The values repeat 1, 2, 5 across each order of magnitude"
          correct: true
          feedback: "Correct. This 1-2-5 pattern gives three points per decade with graph-friendly numbers."
        - id: series_c
          text: "Each step is always 10x"
          feedback: "That would give one point per decade, missing the intermediate doses."
        - id: series_d
          text: "The values are chosen randomly"
          feedback: "The values are deliberately chosen for graphing clarity."
      completionEvent: calc_carb_series_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: calc_carb_low_range

  # Step 4: "Calculate the low-range working stock recipe (400 uM -> 4 uM)"
  - id: calc_carb_low_range
    label: Calculate the recipe for 4 uM carboplatin (Row B)
    action: Choose the correct volumes to make 4 uM working stock from 400 uM intermediate
    why: The first working solution in the series acts as the parent for further serial dilutions.
    partId: planning_part
    dayId: planning_day
    stepIndex: 4
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: Use C1V1 = C2V2 to convert 400 uM to 4 uM in 1 mL.
    completionPath:
      kind: multipleChoice
      question: "You need to dilute the 400 uM carboplatin intermediate to 4 uM. Which recipe makes 1 mL?"
      choices:
        - id: low_a
          text: "10 uL of 400 uM + 990 uL media"
          correct: true
          feedback: "Correct. 400 x 10 / 1000 = 4 uM."
        - id: low_b
          text: "25 uL of 400 uM + 975 uL media"
          feedback: "That would make 10 uM."
        - id: low_c
          text: "50 uL of 400 uM + 950 uL media"
          feedback: "That would make 20 uM."
        - id: low_d
          text: "100 uL of 400 uM + 900 uL media"
          feedback: "That would make 40 uM."
      completionEvent: calc_carb_low_range_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: calc_metformin_stock_prep

  # Step 5: "Calculate metformin working stock (1 M -> 200 mM)"
  - id: calc_metformin_stock_prep
    label: Calculate metformin working stock concentration
    action: Choose the recipe to make 200 mM metformin working stock from 1 M stock
    why: Metformin is the fixed modifier drug (5 mM final in columns 7-12), requiring its own dilution calculation.
    partId: planning_part
    dayId: planning_day
    stepIndex: 5
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: Remember that 1 M = 1000 mM. Use C1V1 = C2V2.
    completionPath:
      kind: multipleChoice
      question: "The metformin stock solution is 1 M. You need 200 mM working stock. Which recipe makes 1 mL?"
      choices:
        - id: metf_a
          text: "20 uL stock + 980 uL media"
          feedback: "That would make 20 mM."
        - id: metf_b
          text: "100 uL stock + 900 uL media"
          feedback: "That would make 100 mM."
        - id: metf_c
          text: "200 uL stock + 800 uL media"
          correct: true
          feedback: "Correct. 1000 mM x 200 / 1000 = 200 mM."
        - id: metf_d
          text: "500 uL stock + 500 uL media"
          feedback: "That would make 500 mM."
      completionEvent: calc_metformin_stock_prep_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: calc_metformin_final

  # Step 6: "Calculate final metformin in well (200 mM -> 5 mM)"
  - id: calc_metformin_final
    label: Calculate final metformin concentration in well
    action: Calculate the final metformin concentration after adding 5 uL working stock to a 200 uL well
    why: Understanding how dilution occurs on the plate is crucial for predicting dose responses.
    partId: planning_part
    dayId: planning_day
    stepIndex: 6
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: Add the working solution volume to the existing well volume, then use C1V1 = C2V2.
    completionPath:
      kind: multipleChoice
      question: "You add 5 uL of 200 mM metformin working stock to a 200 uL well. What is the final metformin concentration?"
      choices:
        - id: metf_final_a
          text: "2.5 mM"
          feedback: "Check the volume of working solution and the final well volume."
        - id: metf_final_b
          text: "5 mM"
          correct: true
          feedback: "Correct. 200 mM x 5 uL / 200 uL = 5 mM."
        - id: metf_final_c
          text: "10 mM"
          feedback: "That would require twice the volume of working solution."
        - id: metf_final_d
          text: "20 mM"
          feedback: "That would require a 10 uL addition or a much higher stock."
      completionEvent: calc_metformin_final_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: prewarm_media_check

  # Step 7: Verify pre-warming requirement
  - id: prewarm_media_check
    label: Explain why media adjustments must be pre-warmed
    action: Choose the best reason for pre-warming media before adding to cells
    why: Pre-warming prevents osmotic shock and maintains consistent dose-response kinetics.
    partId: planning_part
    dayId: planning_day
    stepIndex: 7
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: Think about what happens to cells when you introduce cold medium.
    completionPath:
      kind: multipleChoice
      question: "Why must the media adjustments be pre-warmed in the 37C water bath before adding to the cells?"
      choices:
        - id: warm_a
          text: "Warm media evaporates faster, concentrating the drugs"
          feedback: "That would produce incorrect dose calculations."
        - id: warm_b
          text: "Cold media shocks cells and disrupts the dose response"
          correct: true
          feedback: "Correct. Temperature shock changes cell physiology and scatters the dose-response curve."
        - id: warm_c
          text: "Cold media prevents carboplatin from dissolving"
          feedback: "Carboplatin dissolves in cold media without issue."
        - id: warm_d
          text: "The water bath sterilizes the media"
          feedback: "The media is pre-sterilized; the bath is only for temperature."
      completionEvent: prewarm_media_check_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: planning_summary

  # Step 8: Summary and readiness check
  - id: planning_summary
    label: Review the complete dilution strategy
    action: Confirm your understanding of the full dilution cascade and the plate layout
    why: Before performing the wet-lab work, verifying your mental model reduces errors and speeds execution.
    partId: planning_part
    dayId: planning_day
    stepIndex: 8
    requiredItems: [well_plate]
    scene: well_plate_workspace
    errorHints:
      wrong_answer: "Review the steps: carboplatin 10 mM -> 400 uM -> 4 uM, then 0.1-10 uM series. Metformin 1 M -> 200 mM -> 5 mM in well."
    completionPath:
      kind: multipleChoice
      question: "You have now verified all dilution calculations. Which statement best captures the complete workflow?"
      choices:
        - id: summary_a
          text: "Carboplatin: 10 mM stock -> 400 uM intermediate. Metformin: 1 M stock -> 200 mM working. Both go directly to the plate."
          feedback: "Carboplatin requires further dilution steps to the working stocks for rows B-H; it does not all go directly to the plate."
        - id: summary_b
          text: "Carboplatin: 10 mM -> 400 uM -> four working stocks (4 uM, 8 uM, 20 uM, 40 uM) for the 1-2-5 series. Metformin: 1 M -> 200 mM working stock. Pre-warm before adding."
          correct: true
          feedback: "Correct. This captures the cascade of dilutions, the 1-2-5 pattern for carboplatin, the single metformin working stock, and the pre-warming step."
        - id: summary_c
          text: "All drugs are made as single working stocks at the same concentration, then added to the same wells."
          feedback: "Carboplatin is a dose-response series; metformin is a fixed-concentration modifier. They use different wells."
        - id: summary_d
          text: "The dilution sequence does not matter; any order will work as long as the final concentrations are correct."
          feedback: "Sequential dilutions must follow the correct parent-child chain, or intermediate concentrations will be incorrect."
      completionEvent: planning_summary_done
    plateMap:
      annotations:
        - row: A
          colRange: [1, 6]
          text: Untreated control
        - row: A
          colRange: [7, 12]
          text: Metformin-only control (5 mM)
    nextId: null
