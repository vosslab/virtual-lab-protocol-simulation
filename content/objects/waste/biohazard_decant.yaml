object_name: biohazard_decant
kind: waste
label: Biohazard decant
state_fields:
- field_name: material_name
  type: enum
  allowed:
  - empty
  - mixed
  - mtt
  default: empty
  description: Waste type (empty or mixed biohazard).
- field_name: material_volume
  type: float
  unit: ml
  min: 0
  max: 2000
  default: 0
  description: Volume of accumulated liquid waste, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
    - when: empty
      output:
        asset_name: waste_container
    - when: mixed
      output:
        asset_name: waste_container
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=2000)
capabilities:
- clickable
- material_container
layout:
  default_width: 4
  label_width: 8
