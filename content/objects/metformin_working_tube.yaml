object_name: metformin_working_tube
kind: bottle
label: Metformin 200 mM working stock

state_fields:
  - name: contents_name
    type: enum
    allowed: [empty, metformin, media]
    default: empty
    description: Contents currently in the tube.
  - name: contents_volume
    type: float
    unit: ul
    min: 0
    max: 1000
    default: 0
    description: Volume of contents in the tube, in microliters.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: microtube_1ml_empty }
      - when: metformin
        output: { asset_name: microtube_1ml_filled }
      - when: media
        output: { asset_name: microtube_1ml_filled }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ul=1000)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 2
  label_width: 8
