object_name: mtt_stock_tube
kind: bottle
label: 12 mM MTT solution
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - mtt
    default: mtt
    description: Contents of this bottle (12 mM MTT in PBS).
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 50
    default: 10
    description: Volume of MTT solution remaining in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: falcon_50ml
      - when: mtt
        output:
          asset_name: falcon_50ml
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=50)
capabilities:
  - clickable
  - material_container
layout:
  default_width: 4
  display_width_cm: 6.5
  label_width: 8
