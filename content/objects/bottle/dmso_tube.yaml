object_name: dmso_tube
kind: bottle
label: DMSO

state_fields:
  - field_name: material_name
    type: enum
    allowed: [dmso]
    default: dmso
    description: Contents currently in this bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 50
    default: 50
    description: Volume of DMSO remaining, in milliliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: dmso
        output: { asset_name: falcon_50ml }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=50)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  display_width_cm: 6.5
  label_width: 4
