object_name: microtube
kind: bottle
label: Microtube

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, protein_sample_raw, protein_sample_mixed, protein_sample_denatured]
    default: empty
    description: Contents currently in the tube.
  - field_name: material_volume
    type: float
    unit: ul
    min: 0
    max: 1500
    default: 0
    description: Volume of contents in the tube, in microliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: microtube_empty }
      - when: protein_sample_raw
        output: { asset_name: microtube_filled }
      - when: protein_sample_mixed
        output: { asset_name: microtube_filled }
      - when: protein_sample_denatured
        output: { asset_name: microtube_filled }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ul=1500)

capabilities: [clickable, material_container]

layout:
  default_width: 2
  label_width: 5
