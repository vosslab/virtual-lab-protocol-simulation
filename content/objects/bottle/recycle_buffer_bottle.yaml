object_name: recycle_buffer_bottle
kind: bottle
label: Buffer recycle bottle
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - running_buffer_1x_used
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 1000
    default: 0
    description: Volume of used running buffer collected, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: bottle_green
      - when: running_buffer_1x_used
        output:
          asset_name: bottle_green
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=1000)
capabilities:
  - clickable
  - material_container
  - cursor_attachable
layout:
  default_width: 3
  display_width_cm: 12
  label_width: 8
