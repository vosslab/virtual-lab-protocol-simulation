object_name: destain_bottle
kind: bottle
label: Destain
state_fields:
- field_name: material_name
  type: enum
  allowed:
  - empty
  - destain
  default: empty
  description: Contents currently in the bottle.
- field_name: material_volume
  type: float
  unit: ml
  min: 0
  max: 250
  default: 250
  description: Volume of destain remaining, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
    - when: empty
      output:
        asset_name: destain_bottle
    - when: destain
      output:
        asset_name: destain_bottle
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=250)
capabilities:
- clickable
- material_container
- cursor_attachable
layout:
  default_width: 3
  label_width: 6
