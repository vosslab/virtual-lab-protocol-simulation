object_name: laemmli_4x_tube
kind: bottle
label: Laemmli 4x
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - laemmli_4x
    default: empty
    description: Contents currently in the tube.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 15
    default: 10
    description: Volume of Laemmli 4x remaining, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: falcon_15ml
      - when: laemmli_4x
        output:
          asset_name: falcon_15ml
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=15)
capabilities:
  - clickable
  - material_container
  - cursor_attachable
layout:
  default_width: 2
  display_width_cm: 5
  label_width: 6
