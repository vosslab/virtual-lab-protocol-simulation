object_name: bme_bottle
kind: bottle
label: BME

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, bme]
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 5
    default: 5
    description: Volume of BME remaining, in milliliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: bme_bottle_empty }
      - when: bme
        output: { asset_name: bme_bottle_filled }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=5)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 3
