object_name: running_buffer_1x_carboy
kind: bottle
label: 1x buffer carboy

state_fields:
  - field_name: held_material_name
    type: enum
    allowed: [empty, running_buffer_1x, ddh2o]
    default: empty
    description: Contents currently in the carboy.
  - field_name: held_material_volume
    type: float
    unit: ml
    min: 0
    max: 1000
    default: 1000
    description: Volume of contents remaining, in milliliters.

visual_states:
  held_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: running_buffer_1x_carboy_empty }
      - when: running_buffer_1x
        output: { asset_name: running_buffer_1x_carboy_filled }
      - when: ddh2o
        output: { asset_name: running_buffer_1x_carboy_filled }
  held_material_volume:
    kind: composite
    formula: fill_height(state(held_material_volume), capacity_ml=1000)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 4
  label_width: 8
