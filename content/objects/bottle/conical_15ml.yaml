object_name: conical_15ml
kind: bottle
label: Conical 15 ml tube
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - cells
      - media
      - trypsin
      - cell_suspension
      - cell_pellet
    default: empty
    description: Contents currently in the tube.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 15
    default: 0
    description: Volume of contents in the tube, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: falcon_15ml
      - when: cells
        output:
          asset_name: falcon_15ml
      - when: media
        output:
          asset_name: falcon_15ml
      - when: trypsin
        output:
          asset_name: falcon_15ml
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=15)
capabilities:
  - clickable
  - material_container
layout:
  default_width: 3
  display_width_cm: 5
  label_width: 6
