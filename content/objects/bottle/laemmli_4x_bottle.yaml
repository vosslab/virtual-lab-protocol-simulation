object_name: laemmli_4x_bottle
kind: bottle
label: Laemmli 4x
state_fields:
- field_name: material_name
  type: enum
  allowed:
  - empty
  - laemmli_4x
  default: empty
  description: Contents currently in the bottle.
- field_name: material_volume
  type: float
  unit: ml
  min: 0
  max: 10
  default: 10
  description: Volume of Laemmli 4x remaining, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
    - when: empty
      output:
        asset_name: laemmli_4x_bottle
    - when: laemmli_4x
      output:
        asset_name: laemmli_4x_bottle
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=10)
capabilities:
- clickable
- material_container
- cursor_attachable
layout:
  default_width: 3
  label_width: 6
