object_name: running_buffer_10x_bottle
kind: bottle
label: Running buffer 10x

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, running_buffer_10x]
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of 10x running buffer remaining, in milliliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: running_buffer_10x_bottle_empty }
      - when: running_buffer_10x
        output: { asset_name: running_buffer_10x_bottle_filled }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=500)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 8
