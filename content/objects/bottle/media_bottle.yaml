object_name: media_bottle
kind: bottle
label: Media
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - media
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of media remaining, in milliliters.
  - field_name: temperature_status
    type: enum
    allowed:
      - cold
      - warmed
    default: cold
    description: Whether the media has been warmed in the water bath.
visual_states:
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=500)
  temperature_status:
    kind: composite
    composite: []
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: media_bottle
      - when: media
        output:
          asset_name: media_bottle
capabilities:
  - clickable
  - material_container
  - cursor_attachable
layout:
  default_width: 3
  label_width: 4
