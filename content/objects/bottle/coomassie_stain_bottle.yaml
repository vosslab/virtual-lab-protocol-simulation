object_name: coomassie_stain_bottle
kind: bottle
label: Coomassie stain
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - coomassie_stain
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 250
    default: 250
    description: Volume of Coomassie stain remaining, in milliliters.
visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: coomassie_stain_bottle
      - when: coomassie_stain
        output:
          asset_name: coomassie_stain_bottle
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=250)
capabilities:
  - clickable
  - material_container
  - cursor_attachable
layout:
  default_width: 2
  label_width: 7
