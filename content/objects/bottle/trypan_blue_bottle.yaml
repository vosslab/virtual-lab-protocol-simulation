object_name: trypan_blue_bottle
kind: bottle
label: Trypan Blue
state_fields:
- field_name: material_name
  type: enum
  allowed:
  - empty
  - trypan_blue
  default: empty
  description: Contents currently in the bottle.
- field_name: material_volume
  type: float
  unit: ml
  min: 0
  max: 100
  default: 100
  description: Volume of Trypan Blue stain remaining, in milliliters.
visual_states:
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=100)
  material_name:
    kind: svg
    cases:
    - when: empty
      output:
        asset_name: trypan_blue_bottle_empty
    - when: trypan_blue
      output:
        asset_name: trypan_blue_bottle_filled
capabilities:
- clickable
- material_container
- cursor_attachable
layout:
  default_width: 3
  label_width: 8
