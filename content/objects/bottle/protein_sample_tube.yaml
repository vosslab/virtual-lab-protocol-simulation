object_name: protein_sample_tube
kind: bottle
label: Protein sample tube
state_fields:
- field_name: material_name
  type: enum
  allowed:
  - empty
  - protein_sample_raw
  - protein_sample_mixed
  - protein_sample_denatured
  default: empty
  description: Contents currently in the tube.
- field_name: material_volume
  type: float
  unit: ul
  min: 0
  max: 500
  default: 500
  description: Volume of protein sample, in microliters.
visual_states:
  material_name:
    kind: svg
    cases:
    - when: empty
      output:
        asset_name: protein_sample_tube
    - when: protein_sample_raw
      output:
        asset_name: protein_sample_tube
    - when: protein_sample_mixed
      output:
        asset_name: protein_sample_tube
    - when: protein_sample_denatured
      output:
        asset_name: protein_sample_tube
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ul=500)
capabilities:
- clickable
- material_container
layout:
  default_width: 2
  label_width: 6
