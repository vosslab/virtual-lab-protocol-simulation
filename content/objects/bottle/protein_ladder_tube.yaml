object_name: protein_ladder_tube
kind: bottle
label: Protein ladder tube

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, protein_ladder]
    default: empty
    description: Contents currently in the tube.
  - field_name: material_volume
    type: float
    unit: ul
    min: 0
    max: 500
    default: 500
    description: Volume of protein ladder, in microliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: protein_ladder_tube_empty }
      - when: protein_ladder
        output: { asset_name: protein_ladder_tube_filled }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ul=500)

capabilities: [clickable, material_container]

layout:
  default_width: 2
  label_width: 6
