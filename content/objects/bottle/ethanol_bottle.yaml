object_name: ethanol_bottle
kind: bottle
label: 70% ethanol
state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - ethanol_70
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of ethanol remaining, in milliliters.
visual_states:
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=500)
  material_name:
    kind: svg
    cases:
      - when: empty
        output:
          asset_name: ethanol_bottle
      - when: ethanol_70
        output:
          asset_name: ethanol_bottle
capabilities:
  - clickable
  - material_container
  - cursor_attachable
layout:
  default_width: 3
  label_width: 5
