object_name: metformin_working_tube
kind: bottle
label: Metformin 200 mM working stock

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, metformin, media, metformin_10mmol]
    default: empty
    description: Contents currently in the tube.
  - field_name: material_volume
    type: float
    unit: ul
    min: 0
    max: 1000
    default: 0
    description: Volume of contents in the tube, in microliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: microtube }
      - when: metformin
        output: { asset_name: microtube }
      - when: media
        output: { asset_name: microtube }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ul=1000)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 2
  display_width_cm: 4
  label_width: 8
