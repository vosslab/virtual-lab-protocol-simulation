object_name: sterile_water_bottle
kind: bottle
label: Sterile water

state_fields:
  - field_name: material_name
    type: enum
    allowed: [water]
    default: water
    description: Contents currently in this bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of sterile water remaining, in milliliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: water
        output: { asset_name: bottle }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=500)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 5
