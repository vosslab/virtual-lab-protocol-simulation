object_name: metformin_stock_tube
kind: bottle
label: Metformin 1 M

state_fields:
  - field_name: material_name
    type: enum
    allowed: [metformin]
    default: metformin
    description: Contents currently in this bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 50
    default: 50
    description: Volume of metformin stock remaining, in milliliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: metformin
        output: { asset_name: falcon_50ml }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=50)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  display_width_cm: 6.5
  label_width: 8
