object_name: media_bottle
kind: bottle
label: Media

state_fields:
  - field_name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of media remaining, in milliliters.
  - field_name: temperature_status
    type: enum
    allowed: [cold, warmed]
    default: cold
    description: Whether the media has been warmed in the water bath.

visual_states:
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=500)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 4
