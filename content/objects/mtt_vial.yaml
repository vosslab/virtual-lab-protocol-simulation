object_name: mtt_vial
kind: bottle
label: MTT reagent

state_fields:
  - field_name: contents_name
    type: enum
    allowed: [mtt]
    default: mtt
    description: Contents currently in this vial.
  - field_name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 10
    default: 10
    description: Volume of MTT reagent remaining, in milliliters.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: mtt
        output: { asset_name: mtt_vial }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=10)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 2
  label_width: 5
