object_name: microtube_15ml_intermediate
kind: bottle
label: Carboplatin 400 uM intermediate

state_fields:
  - name: contents_name
    type: enum
    allowed: [empty, carboplatin]
    default: empty
    description: Contents currently in the tube.
  - name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 15
    default: 0
    description: Volume of contents in the tube, in milliliters.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: microtube_15ml_empty }
      - when: carboplatin
        output: { asset_name: microtube_15ml_filled }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=15)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 2
  label_width: 8
