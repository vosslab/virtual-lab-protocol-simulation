object_name: trypsin_bottle
kind: bottle
label: Trypsin

state_fields:
  - name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 100
    default: 100
    description: Volume of trypsin remaining, in milliliters.

visual_states:
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=100)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 5
