object_name: t75_flask
kind: flask
label: T75 flask

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, media, pbs, trypsin, cell_suspension]
    default: empty
    description: Contents currently in the flask.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 25
    default: 0
    description: Volume of contents in the flask, in milliliters.
  - field_name: inspection_status
    type: enum
    allowed: [not_inspected, observed_at_confluence]
    default: not_inspected
    description: Whether the flask has been inspected for confluence under the microscope.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: t75_flask }
      - when: media
        output: { asset_name: t75_flask }
      - when: pbs
        output: { asset_name: t75_flask }
      - when: trypsin
        output: { asset_name: t75_flask }
      - when: cell_suspension
        output: { asset_name: t75_flask }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=25)
  inspection_status:
    kind: composite
    composite: []

capabilities: [clickable, material_container]

layout:
  default_width: 12
  label_width: 8
