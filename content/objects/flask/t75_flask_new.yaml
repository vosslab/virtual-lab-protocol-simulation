object_name: t75_flask_new
kind: flask
label: T75 flask (new)

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, media, pbs, trypsin, cell_suspension]
    default: empty
    description: Contents currently in the flask.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 25
    default: 0
    description: Volume of contents in the flask, in milliliters.
  - field_name: incubation_status
    type: enum
    allowed: [out, in_incubator]
    default: out
    description: Whether the flask is currently in the incubator.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: t75_flask }
      - when: media
        output: { asset_name: t75_flask }
      - when: pbs
        output: { asset_name: t75_flask }
      - when: trypsin
        output: { asset_name: t75_flask }
      - when: cell_suspension
        output: { asset_name: t75_flask }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=25)
  incubation_status:
    kind: composite
    composite: []

capabilities: [clickable, material_container]

layout:
  default_width: 12
  display_width_cm: 20
  label_width: 8
