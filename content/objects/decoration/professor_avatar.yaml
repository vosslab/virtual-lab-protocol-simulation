object_name: professor_avatar
kind: decoration
label: Professor avatar

state_fields:
  - field_name: visible
    type: bool
    default: true
    description: Whether the professor avatar is visible.

visual_states:
  visible:
    kind: svg
    cases:
      - when: true
        output:
          asset_name: angry_professor
      - when: false
        output:
          asset_name: angry_professor

capabilities: [decoration_only]

layout:
  default_width: 8
  display_width_cm: 12
  label_width: 10
