object_name: lens_tissue
kind: decoration
label: Lens-cleaning tissue

state_fields:
  - field_name: visible
    type: bool
    default: true
    description: Whether the lens tissue is visible.

visual_states:
  visible:
    kind: svg
    cases:
      - when: true
        output:
          asset_name: kimwipe_pad
      - when: false
        output:
          asset_name: kimwipe_pad

capabilities: [clickable, cursor_attachable]

layout:
  default_width: 4
  label_width: 6
