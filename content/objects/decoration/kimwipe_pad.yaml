object_name: kimwipe_pad
kind: decoration
label: Kimwipe pad

state_fields:
  - field_name: visible
    type: bool
    default: true
    description: Whether the kimwipe pad is visible.

visual_states:
  visible:
    kind: svg
    cases:
      - when: true
        output:
          asset_name: kimwipe_pad
      - when: false
        output:
          asset_name: kimwipe_pad

capabilities: [clickable]

layout:
  default_width: 3
  display_width_cm: 8
  label_width: 5
