object_name: conical_15ml_rack
kind: rack
label: 15 ml conical rack

structure:
  subpart_kind: slot
  layout: list
  count: 6
  name_pattern: "slot_{index}"

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, cells, media]
    default: empty
    applies_to: subpart
    description: Contents currently in this slot.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 15
    default: 0
    applies_to: subpart
    description: Volume of contents in this slot, in milliliters.

visual_states:
  material_name:
    kind: svg
    applies_to: subpart
    cases:
      - when: empty
        output: { asset_name: conical_15ml_empty }
      - when: cells
        output: { asset_name: conical_15ml_filled }
      - when: media
        output: { asset_name: conical_15ml_filled }
  material_volume:
    kind: composite
    applies_to: subpart
    formula: fill_height(state(material_volume), capacity_ml=15)

capabilities: [clickable, structured_surface, material_container]

layout:
  default_width: 10
  label_width: 8
