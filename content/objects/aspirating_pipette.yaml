object_name: aspirating_pipette
kind: pipette
label: Aspirating pipette

state_fields:
  - field_name: held_material_name
    type: enum
    allowed: [empty, media, pbs, mtt]
    default: empty
    description: Contents currently aspirated (waste stream).
  - field_name: held_material_volume
    type: float
    unit: ml
    min: 0
    max: 10.0
    default: 0
    description: Volume of aspirated waste, in milliliters.

visual_states:
  held_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: aspirating_pipette_empty }
      - when: media
        output: { asset_name: aspirating_pipette_filled }
      - when: pbs
        output: { asset_name: aspirating_pipette_filled }
  held_material_volume:
    kind: composite
    formula: fill_height(state(held_material_volume), capacity_ml=10.0)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 7
  anchor_y: tip
  anchor_y_offset: 0
