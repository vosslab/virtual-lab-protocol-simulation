object_name: mtt_solution_tube
kind: bottle
label: MTT solution tube

state_fields:
  - field_name: material_name
    type: enum
    allowed: [mtt_solution_12mm, empty]
    default: empty
    description: Contents of this tube.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 5
    default: 0
    description: Volume of solution in milliliters.

visual_states:
  material_name:
    kind: svg
    cases:
      - when: mtt_solution_12mm
        output: { asset_name: mtt_solution_tube }
      - when: empty
        output: { asset_name: mtt_solution_tube }
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=5)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 2
  label_width: 5
