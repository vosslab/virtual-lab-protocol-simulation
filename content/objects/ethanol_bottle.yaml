object_name: ethanol_bottle
kind: bottle
label: 70% ethanol

state_fields:
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of ethanol remaining, in milliliters.

visual_states:
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=500)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 5
