object_name: conical_15ml
kind: bottle
label: Conical 15 ml tube

state_fields:
  - name: contents_name
    type: enum
    allowed: [empty, cells, media, trypsin]
    default: empty
    description: Contents currently in the tube.
  - name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 15
    default: 0
    description: Volume of contents in the tube, in milliliters.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: conical_15ml_empty }
      - when: cells
        output: { asset_name: conical_15ml_filled }
      - when: media
        output: { asset_name: conical_15ml_filled }
      - when: trypsin
        output: { asset_name: conical_15ml_filled }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=15)

capabilities: [clickable, contents_container]

layout:
  default_width: 3
  label_width: 6
