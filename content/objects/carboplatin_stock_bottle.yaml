object_name: carboplatin_stock_bottle
kind: bottle
label: Carboplatin 10 mM

state_fields:
  - field_name: contents_name
    type: enum
    allowed: [carboplatin]
    default: carboplatin
    description: Contents currently in this bottle.
  - field_name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 50
    default: 50
    description: Volume of carboplatin stock remaining, in milliliters.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: carboplatin
        output: { asset_name: carboplatin_bottle }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=50)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 8
