object_name: micropipette
kind: pipette
label: Micropipette

state_fields:
  - field_name: set_volume
    type: float
    unit: ul
    min: 0.5
    max: 1000
    step: 0.5
    default: 100
    description: Volume the pipette is set to dispense.
  - field_name: held_material_name
    type: enum
    allowed: [empty, water, carboplatin, metformin, media, carboplatin_10mmol, metformin_1mol, cell_suspension]
    default: empty
    description: Contents currently aspirated in the pipette tip.
  - field_name: held_material_volume
    type: float
    unit: ul
    min: 0
    max: 1000
    default: 0
    description: Volume of contents currently held, in microliters.

visual_states:
  set_volume:
    kind: overlay
    formula: label(state(set_volume), format="{value} ul")
  held_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: micropipette_empty }
      - when: water
        output: { asset_name: micropipette_filled }
      - when: carboplatin
        output: { asset_name: micropipette_filled }
      - when: metformin
        output: { asset_name: micropipette_filled }
      - when: media
        output: { asset_name: micropipette_filled }
  held_material_volume:
    kind: composite
    formula: fill_height(state(held_material_volume), capacity_ul=1000)

capabilities: [clickable, material_container, instrument_with_setpoint, cursor_attachable]

layout:
  default_width: 2
  label_width: 5
  anchor_y: tip
  anchor_y_offset: 0
