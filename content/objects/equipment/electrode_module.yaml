object_name: electrode_module
kind: equipment
label: Electrode module

state_fields:
  - field_name: mounted
    type: bool
    default: false
    description: Whether the module is mounted in the electrophoresis tank.
  - field_name: cassette_mounted
    type: bool
    default: false
    description: Whether a gel cassette is mounted on the module.
  - field_name: wing_clamps_open
    type: bool
    default: true
    description: Whether the wing clamps are open.

visual_states:
  mounted:
    kind: svg
    cases:
      - when: true
        output: { asset_name: electrode_module }
      - when: false
        output: { asset_name: electrode_module }
  cassette_mounted:
    kind: svg
    cases:
      - when: true
        output: { asset_name: electrode_module }
      - when: false
        output: { asset_name: electrode_module }
  wing_clamps_open:
    kind: svg
    cases:
      - when: true
        output: { asset_name: electrode_module }
      - when: false
        output: { asset_name: electrode_module }

capabilities: [clickable]

layout:
  default_width: 16
  display_width_cm: 14
  label_width: 10
