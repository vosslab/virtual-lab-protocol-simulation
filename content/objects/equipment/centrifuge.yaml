object_name: centrifuge
kind: equipment
label: Centrifuge

state_fields:
  - field_name: set_rpm
    type: float
    unit: rpm
    min: 0
    max: 4000
    step: 100
    default: 1200
    description: Rotational speed setting in revolutions per minute.
  - field_name: set_time_min
    type: float
    unit: min
    min: 0
    max: 30
    step: 0.5
    default: 5
    description: Time duration setting in minutes.
  - field_name: running
    type: bool
    default: false
    description: Whether the centrifuge is currently running.

visual_states:
  set_rpm:
    kind: overlay
    formula: label(state(set_rpm), format="{value} rpm")
  set_time_min:
    kind: overlay
    formula: label(state(set_time_min), format="{value} min")
  running:
    kind: svg
    cases:
      - when: false
        output: { asset_name: centrifuge }
      - when: true
        output: { asset_name: centrifuge }

capabilities: [clickable, instrument_with_setpoint]

layout:
  default_width: 20
  label_width: 12
