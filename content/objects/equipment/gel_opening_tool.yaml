object_name: gel_opening_tool
kind: equipment
label: Gel Opening Tool

state_fields:
  - field_name: visible
    type: bool
    default: true
    description: Whether the tool is visible.

visual_states:
  visible:
    kind: svg
    cases:
      - when: true
        output: { asset_name: gel_opening_tool }
      - when: false
        output: { asset_name: gel_opening_tool }

capabilities: [clickable, cursor_attachable]

layout:
  default_width: 2
  display_width_cm: 5
  label_width: 10
