object_name: vortex
kind: equipment
label: Vortex

state_fields:
  - field_name: running
    type: bool
    default: false
    description: Whether the vortex is currently running.

visual_states:
  running:
    kind: svg
    cases:
      - when: false
        output: { asset_name: vortex }
      - when: true
        output: { asset_name: vortex }

capabilities: [clickable]

layout:
  default_width: 6
  label_width: 10
