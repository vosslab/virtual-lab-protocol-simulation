object_name: gel_comb
kind: equipment
label: Gel comb

state_fields:
  - field_name: position
    type: enum
    allowed: [not_in_cassette, in_cassette]
    default: in_cassette
    description: Position state of the comb.

visual_states:
  position:
    kind: svg
    cases:
      - when: in_cassette
        output: { asset_name: gel_comb }
      - when: not_in_cassette
        output: { asset_name: gel_comb }

capabilities: [clickable]

layout:
  default_width: 8
  display_width_cm: 8
  label_width: 6
