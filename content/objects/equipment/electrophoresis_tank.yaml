object_name: electrophoresis_tank
kind: equipment
label: Electrophoresis tank

state_fields:
  - field_name: lid_present
    type: bool
    default: true
    description: Whether the tank lid is in place.
  - field_name: inner_chamber_material_name
    type: enum
    allowed: [empty, running_buffer_1x, running_buffer_1x_used]
    default: empty
    description: Contents currently in the inner chamber.
  - field_name: inner_chamber_material_volume
    type: float
    unit: ml
    min: 0
    max: 800
    default: 0
    description: Volume of contents in the inner chamber, in milliliters.
  - field_name: outer_chamber_material_name
    type: enum
    allowed: [empty, running_buffer_1x, running_buffer_1x_used]
    default: empty
    description: Contents currently in the outer chamber.
  - field_name: outer_chamber_material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 0
    description: Volume of contents in the outer chamber, in milliliters.
  - field_name: module_present
    type: bool
    default: false
    description: Whether the electrode module is mounted in the tank.

visual_states:
  inner_chamber_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: electrophoresis_tank_inner_chamber }
      - when: running_buffer_1x
        output: { asset_name: electrophoresis_tank_inner_chamber }
      - when: running_buffer_1x_used
        output: { asset_name: electrophoresis_tank_inner_chamber }
  inner_chamber_material_volume:
    kind: composite
    formula: fill_height(state(inner_chamber_material_volume), capacity_ml=800)
  outer_chamber_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: electrophoresis_tank_outer_chamber }
      - when: running_buffer_1x
        output: { asset_name: electrophoresis_tank_outer_chamber }
      - when: running_buffer_1x_used
        output: { asset_name: electrophoresis_tank_outer_chamber }
  outer_chamber_material_volume:
    kind: composite
    formula: fill_height(state(outer_chamber_material_volume), capacity_ml=500)
  lid_present:
    kind: svg
    cases:
      - when: true
        output: { asset_name: electrophoresis_tank }
      - when: false
        output: { asset_name: electrophoresis_tank }
  module_present:
    kind: svg
    cases:
      - when: true
        output: { asset_name: electrophoresis_tank }
      - when: false
        output: { asset_name: electrophoresis_tank }

capabilities: [clickable, material_container]

layout:
  default_width: 18
  label_width: 10
