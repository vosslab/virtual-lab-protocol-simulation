object_name: microwave
kind: equipment
label: Microwave

state_fields:
  - field_name: set_time_s
    type: int
    unit: s
    min: 0
    max: 180
    step: 1
    default: 50
    description: Time setting for microwave heating in seconds.
  - field_name: door_open
    type: bool
    default: false
    description: Whether the microwave door is open.
  - field_name: running
    type: bool
    default: false
    description: Whether the microwave is currently running.

visual_states:
  set_time_s:
    kind: overlay
    formula: label(state(set_time_s), format="{value} s")
  door_open:
    kind: svg
    cases:
      - when: false
        output: { asset_name: microwave_closed }
      - when: true
        output: { asset_name: microwave_open }

capabilities: [clickable, instrument_with_setpoint]

layout:
  default_width: 16
  label_width: 9
