object_name: staining_tray
kind: equipment
label: Staining Tray

state_fields:
  - field_name: held_material_name
    type: enum
    allowed: [empty, running_buffer_1x, coomassie_stain, destain, ddh2o]
    default: empty
    description: Contents currently in the staining tray.
  - field_name: held_material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 0
    description: Volume of contents in the tray, in milliliters.
  - field_name: gel_present
    type: bool
    default: false
    description: Whether a gel is present in the tray.
  - field_name: kimwipes_present
    type: bool
    default: false
    description: Whether kimwipes are present in the tray.

visual_states:
  held_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: staining_tray_empty }
      - when: running_buffer_1x
        output: { asset_name: staining_tray_buffer }
      - when: coomassie_stain
        output: { asset_name: staining_tray_stain }
      - when: destain
        output: { asset_name: staining_tray_destain }
      - when: ddh2o
        output: { asset_name: staining_tray_water }
  held_material_volume:
    kind: composite
    formula: fill_height(state(held_material_volume), capacity_ml=500)

capabilities: [clickable, material_container]

layout:
  default_width: 16
  label_width: 12
