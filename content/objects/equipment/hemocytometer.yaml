object_name: hemocytometer
kind: equipment
label: Hemocytometer

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, cell_suspension]
    default: empty
    description: Liquid loaded onto the counting chamber.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 0.1
    default: 0
    description: Volume loaded on the counting chamber, in milliliters.
  - field_name: count_quadrant_a
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant A.
  - field_name: count_quadrant_b
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant B.
  - field_name: count_quadrant_c
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant C.
  - field_name: count_quadrant_d
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant D.

visual_states:
  # material_name and material_volume have no visual rendering; declared explicit for V2 gate
  material_name:
    kind: composite
    composite: []
  material_volume:
    kind: composite
    composite: []
  count_quadrant_a:
    kind: overlay
    formula: 'label(state(count_quadrant_a), format="A: {value}")'
  count_quadrant_b:
    kind: overlay
    formula: 'label(state(count_quadrant_b), format="B: {value}")'
  count_quadrant_c:
    kind: overlay
    formula: 'label(state(count_quadrant_c), format="C: {value}")'
  count_quadrant_d:
    kind: overlay
    formula: 'label(state(count_quadrant_d), format="D: {value}")'

capabilities: [clickable, material_container]

layout:
  default_width: 12
  label_width: 8
