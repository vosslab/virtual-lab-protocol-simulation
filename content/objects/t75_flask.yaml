object_name: t75_flask
kind: flask
label: T75 flask

state_fields:
  - field_name: contents_name
    type: enum
    allowed: [empty, media, pbs, trypsin, cell_suspension]
    default: empty
    description: Contents currently in the flask.
  - field_name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 25
    default: 0
    description: Volume of contents in the flask, in milliliters.
  - field_name: inspection_status
    type: enum
    allowed: [not_inspected, observed_at_confluence]
    default: not_inspected
    description: Whether the flask has been inspected for confluence under the microscope.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: t75_flask_empty }
      - when: media
        output: { asset_name: t75_flask_with_media }
      - when: pbs
        output: { asset_name: t75_flask_with_pbs }
      - when: trypsin
        output: { asset_name: t75_flask_with_trypsin }
      - when: cell_suspension
        output: { asset_name: t75_flask_with_cell_suspension }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=25)

capabilities: [clickable, contents_container]

layout:
  default_width: 12
  label_width: 8
