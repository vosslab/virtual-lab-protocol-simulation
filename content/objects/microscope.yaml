object_name: microscope
kind: equipment
label: Microscope

state_fields:
  - name: objective
    type: enum
    allowed: [4x, 10x, 20x, 40x]
    default: 10x
    description: Selected objective magnification.
  - name: light_on
    type: bool
    default: false
    description: Whether the microscope illumination is on.

visual_states:
  objective:
    kind: overlay
    cases:
      - when: 4x
        output: { overlay_name: microscope_objective_4x }
      - when: 10x
        output: { overlay_name: microscope_objective_10x }
      - when: 20x
        output: { overlay_name: microscope_objective_20x }
      - when: 40x
        output: { overlay_name: microscope_objective_40x }
  light_on:
    kind: svg
    cases:
      - when: false
        output: { asset_name: microscope_dark }
      - when: true
        output: { asset_name: microscope_lit }

capabilities: [clickable]

layout:
  default_width: 16
  label_width: 12
