object_name: metformin_stock_bottle
kind: bottle
label: Metformin 1 M

state_fields:
  - field_name: contents_name
    type: enum
    allowed: [metformin]
    default: metformin
    description: Contents currently in this bottle.
  - field_name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 50
    default: 50
    description: Volume of metformin stock remaining, in milliliters.

visual_states:
  contents_name:
    kind: svg
    cases:
      - when: metformin
        output: { asset_name: metformin_bottle }
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=50)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 8
