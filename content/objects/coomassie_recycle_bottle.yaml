object_name: coomassie_recycle_bottle
kind: bottle
label: Coomassie recycle bottle

state_fields:
  - field_name: held_material_name
    type: enum
    allowed: [empty, coomassie_stain_used]
    default: empty
    description: Contents currently in the bottle.
  - field_name: held_material_volume
    type: float
    unit: ml
    min: 0
    max: 250
    default: 0
    description: Volume of used Coomassie stain collected for reuse, in milliliters.

visual_states:
  held_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: coomassie_recycle_bottle_empty }
      - when: coomassie_stain_used
        output: { asset_name: coomassie_recycle_bottle_filled }
  held_material_volume:
    kind: composite
    formula: fill_height(state(held_material_volume), capacity_ml=250)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 8
