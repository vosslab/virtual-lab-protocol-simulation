object_name: pbs_bottle
kind: bottle
label: PBS

state_fields:
  - name: contents_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of PBS remaining, in milliliters.

visual_states:
  contents_volume:
    kind: composite
    formula: fill_height(state(contents_volume), capacity_ml=500)

capabilities: [clickable, contents_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 4
