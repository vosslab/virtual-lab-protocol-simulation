object_name: dilution_tube_rack_8
kind: rack
label: 8-tube dilution rack

structure:
  subpart_kind: tube
  layout: grid
  rows: 8
  cols: 1
  name_pattern: "tube_{row_letter}"

state_fields:
  - field_name: material_name
    type: enum
    allowed: [empty, carboplatin, media]
    default: empty
    applies_to: subpart
    description: Contents currently in this tube.
  - field_name: material_volume
    type: float
    unit: ul
    min: 0
    max: 1000
    default: 0
    applies_to: subpart
    description: Volume of contents in this tube, in microliters.

visual_states:
  material_name:
    kind: svg
    applies_to: subpart
    cases:
      - when: empty
        output: { asset_name: tube_rack }
      - when: carboplatin
        output: { asset_name: tube_rack }
      - when: media
        output: { asset_name: tube_rack }
  material_volume:
    kind: composite
    applies_to: subpart
    formula: fill_height(state(material_volume), capacity_ul=1000)

capabilities: [clickable, structured_surface, material_container]

layout:
  default_width: 8
  display_width_cm: 25
  label_width: 6
