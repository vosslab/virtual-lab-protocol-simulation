object_name: counter_slide_cartridge
kind: rack
label: Cell counter slide cartridge

structure:
  subpart_kind: slot
  layout: list
  count: 10
  name_pattern: "slide_{index}"

state_fields:
  - field_name: slide_count
    type: int
    min: 0
    max: 10
    default: 5
    description: Number of hemocytometer slides available in the cartridge.
  - field_name: material_name
    type: enum
    allowed: [empty]
    default: empty
    applies_to: subpart
    description: Slide slot always empty (holder only).
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 0
    default: 0
    applies_to: subpart
    description: Slide slot never holds material.

visual_states:
  slide_count:
    kind: overlay
    formula: 'label(state(slide_count), format="Slides: {value}")'
  material_name:
    kind: svg
    applies_to: subpart
    cases:
      - when: empty
        output:
          asset_name: tip_box
  material_volume:
    kind: composite
    applies_to: subpart
    composite: []

capabilities: [clickable, structured_surface, material_container]

layout:
  default_width: 8
  label_width: 10
