# 96-well plate registered as a structured Servier-asset surface with
# per-well material state.
#
# Material model: each well subpart carries its own material_name and
# material_volume (applies_to: subpart), following the dilution_tube_rack_8
# precedent. Per D1 (MATERIAL_YAML_FORMAT.md), a subpart material_name
# validates by sentinel-or-registry membership, not by a per-object value
# enum: the only object-declared allowed values are the closed sentinels
# [empty, mixed]. Curriculum drug/assay material names (carboplatin, mtt,
# formazan, ...) are NOT enumerated here; each protocol registers the
# materials it writes in its own materials.yaml, and the stepper's
# registry-backed predicate (WP-STEPPER) accepts them. This keeps the shared
# plate object decoupled from per-lesson content.
#
# Visual: the identity layer only. material_name drives a material_tint
# render effect on each well's generated geometry (MATERIAL_CONVENTION.md);
# the color comes from the resolved display_color, never a hex here.
# Per D5 there is no fill_height composite on wells in this plan, so
# material_volume carries an explicit empty composite (no visual effect yet).
object_name: well_plate_96
kind: plate
label: 96-well plate

structure:
  subpart_kind: well
  layout: grid
  rows: 8
  cols: 12
  name_pattern: "{row_letter}{col}"
  subpart_groups:
    rows:
      group_kind: row
      members:
        - name: row_A
          contains: [A1, A2, A3, A4, A5, A6, A7, A8, A9, A10, A11, A12]
        - name: row_B
          contains: [B1, B2, B3, B4, B5, B6, B7, B8, B9, B10, B11, B12]
        - name: row_C
          contains: [C1, C2, C3, C4, C5, C6, C7, C8, C9, C10, C11, C12]
        - name: row_D
          contains: [D1, D2, D3, D4, D5, D6, D7, D8, D9, D10, D11, D12]
        - name: row_E
          contains: [E1, E2, E3, E4, E5, E6, E7, E8, E9, E10, E11, E12]
        - name: row_F
          contains: [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12]
        - name: row_G
          contains: [G1, G2, G3, G4, G5, G6, G7, G8, G9, G10, G11, G12]
        - name: row_H
          contains: [H1, H2, H3, H4, H5, H6, H7, H8, H9, H10, H11, H12]
    columns:
      group_kind: column
      members:
        - name: col_1
          contains: [A1, B1, C1, D1, E1, F1, G1, H1]
        - name: col_2
          contains: [A2, B2, C2, D2, E2, F2, G2, H2]
        - name: col_3
          contains: [A3, B3, C3, D3, E3, F3, G3, H3]
        - name: col_4
          contains: [A4, B4, C4, D4, E4, F4, G4, H4]
        - name: col_5
          contains: [A5, B5, C5, D5, E5, F5, G5, H5]
        - name: col_6
          contains: [A6, B6, C6, D6, E6, F6, G6, H6]
        - name: col_7
          contains: [A7, B7, C7, D7, E7, F7, G7, H7]
        - name: col_8
          contains: [A8, B8, C8, D8, E8, F8, G8, H8]
        - name: col_9
          contains: [A9, B9, C9, D9, E9, F9, G9, H9]
        - name: col_10
          contains: [A10, B10, C10, D10, E10, F10, G10, H10]
        - name: col_11
          contains: [A11, B11, C11, D11, E11, F11, G11, H11]
        - name: col_12
          contains: [A12, B12, C12, D12, E12, F12, G12, H12]
    plate_region:
      group_kind: region
      members:
        - name: all_wells
          contains:
            [
              A1, A2, A3, A4, A5, A6, A7, A8, A9, A10, A11, A12,
              B1, B2, B3, B4, B5, B6, B7, B8, B9, B10, B11, B12,
              C1, C2, C3, C4, C5, C6, C7, C8, C9, C10, C11, C12,
              D1, D2, D3, D4, D5, D6, D7, D8, D9, D10, D11, D12,
              E1, E2, E3, E4, E5, E6, E7, E8, E9, E10, E11, E12,
              F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12,
              G1, G2, G3, G4, G5, G6, G7, G8, G9, G10, G11, G12,
              H1, H2, H3, H4, H5, H6, H7, H8, H9, H10, H11, H12,
            ]
    blocks:
      group_kind: region
      members:
        - name: block_A_1_6
          contains: [A1, A2, A3, A4, A5, A6]
        - name: block_A_7_12
          contains: [A7, A8, A9, A10, A11, A12]
        - name: block_B_H_1_6
          contains:
            [
              B1, B2, B3, B4, B5, B6,
              C1, C2, C3, C4, C5, C6,
              D1, D2, D3, D4, D5, D6,
              E1, E2, E3, E4, E5, E6,
              F1, F2, F3, F4, F5, F6,
              G1, G2, G3, G4, G5, G6,
              H1, H2, H3, H4, H5, H6,
            ]
        - name: block_B_H_7_12
          contains:
            [
              B7, B8, B9, B10, B11, B12,
              C7, C8, C9, C10, C11, C12,
              D7, D8, D9, D10, D11, D12,
              E7, E8, E9, E10, E11, E12,
              F7, F8, F9, F10, F11, F12,
              G7, G8, G9, G10, G11, G12,
              H7, H8, H9, H10, H11, H12,
            ]

state_fields:
  - field_name: inspection_status
    type: enum
    allowed: [not_inspected, cells_healthy]
    default: not_inspected
    applies_to: object
    description: Plate-level inspection status from microscopy.
  # Per-well material identity. Per D1 the object declares only the closed
  # sentinel allowlist [empty, mixed]; registry-backed curriculum materials
  # are accepted by the stepper predicate, not enumerated here.
  # SEAM: [empty, mixed] is the SYNTACTIC floor here, NOT the runtime acceptance
  # truth. Runtime acceptance is registry-backed D1: empty OR mixed OR a name in
  # the active protocol's materials.yaml. Both the Python stepper
  # (validation/stepper/state.py) and the TS store
  # (src/scene_runtime/state/scene_store.ts via material_acceptance.ts) apply that
  # predicate; do not read this allowed list as the full set of acceptable values.
  - field_name: material_name
    type: enum
    allowed: [empty, mixed]
    default: empty
    applies_to: subpart
    description: Material currently in this well.
  - field_name: material_volume
    type: float
    unit: ul
    min: 0
    max: 300
    default: 0
    applies_to: subpart
    description: Volume of material in this well, in microliters.

visual_states:
  inspection_status:
    kind: svg
    applies_to: object
    cases:
      - when: not_inspected
        output: { asset_name: 96well_pcr_plate }
      - when: cells_healthy
        output: { asset_name: 96well_pcr_plate }
  # Identity layer: each well is tinted by its own material identity. The
  # color comes from the resolved material display_color; no hex appears here.
  material_name:
    applies_to: subpart
    render_effect: material_tint
    target: subpart_geometry
  # Amount layer is out of scope for this plan (D5: no fill_height on wells).
  # material_volume has no visual effect yet, declared with an explicit empty
  # composite so absence stays loud.
  material_volume:
    kind: composite
    applies_to: subpart
    composite: []

capabilities: [clickable, structured_surface, material_container]

# Asset 96well_pcr_plate.svg viewBox is 0 0 393.3275 278.5243 (aspect ~1.41).
# Size the card to that wide aspect so the plate renders uncropped.
layout:
  default_width: 20
  label_width: 10
