object_name: multichannel_pipette
kind: pipette
label: Multichannel pipette

state_fields:
  - field_name: set_volume
    type: float
    unit: ul
    min: 20
    max: 300
    step: 1
    default: 50
    description: Volume the pipette is set to dispense per channel.
  - field_name: held_material_name
    type: enum
    allowed: [empty, media, drug_combo, dmso, mtt, carboplatin, metformin]
    default: empty
    description: Contents currently held in the channels.
  - field_name: held_material_volume
    type: float
    unit: ul
    min: 0
    max: 300
    default: 0
    description: Volume of contents currently held per channel, in microliters.

visual_states:
  set_volume:
    kind: overlay
    formula: label(state(set_volume), format="{value} ul")
  held_material_name:
    kind: svg
    cases:
      - when: empty
        output: { asset_name: multichannel_pipette_empty }
      - when: media
        output: { asset_name: multichannel_pipette_filled }
      - when: drug_combo
        output: { asset_name: multichannel_pipette_filled }
      - when: dmso
        output: { asset_name: multichannel_pipette_filled }
      - when: mtt
        output: { asset_name: multichannel_pipette_filled }
  held_material_volume:
    kind: composite
    formula: fill_height(state(held_material_volume), capacity_ul=300)

capabilities: [clickable, material_container, instrument_with_setpoint, cursor_attachable]

layout:
  default_width: 6
  label_width: 8
  anchor_y: tip
  anchor_y_offset: 0
