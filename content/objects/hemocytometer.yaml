object_name: hemocytometer
kind: equipment
label: Hemocytometer

state_fields:
  - name: count_quadrant_a
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant A.
  - name: count_quadrant_b
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant B.
  - name: count_quadrant_c
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant C.
  - name: count_quadrant_d
    type: int
    min: 0
    max: 999
    default: 0
    description: Cell count in quadrant D.

visual_states:
  count_quadrant_a:
    kind: overlay
    formula: 'label(state(count_quadrant_a), format="A: {value}")'
  count_quadrant_b:
    kind: overlay
    formula: 'label(state(count_quadrant_b), format="B: {value}")'
  count_quadrant_c:
    kind: overlay
    formula: 'label(state(count_quadrant_c), format="C: {value}")'
  count_quadrant_d:
    kind: overlay
    formula: 'label(state(count_quadrant_d), format="D: {value}")'

capabilities: [clickable]

layout:
  default_width: 12
  label_width: 8
