object_name: trypan_blue_bottle
kind: bottle
label: Trypan Blue

state_fields:
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 100
    default: 100
    description: Volume of Trypan Blue stain remaining, in milliliters.

visual_states:
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=100)

capabilities: [clickable, material_container, cursor_attachable]

layout:
  default_width: 3
  label_width: 8
