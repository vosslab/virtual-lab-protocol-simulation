# QUARANTINED 2026-05-23 by A1x: missing asset_name field; no matching trypsin asset in assets/. Restore when asset lands.
object_name: trypsin_bottle
kind: bottle
label: Trypsin

state_fields:
  - field_name: material_name
    type: enum
    allowed:
      - empty
      - trypsin
    default: empty
    description: Contents currently in the bottle.
  - field_name: material_volume
    type: float
    unit: ml
    min: 0
    max: 500
    default: 500
    description: Volume of trypsin remaining, in milliliters.
visual_states:
  material_volume:
    kind: composite
    formula: fill_height(state(material_volume), capacity_ml=500)
  material_name:
    kind: composite
    composite: []
capabilities: [clickable, material_container, cursor_attachable]
layout:
  default_width: 3
  label_width: 5
